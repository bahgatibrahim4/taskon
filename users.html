<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>إدارة المستخدمين</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <style>
    body {
      margin: 0;
      font-family: 'Cairo', Arial, sans-serif;
      background: #c5d6db;
      direction: rtl;
    }
    .navbar {
      background: #1a3b50;
      color: #fff;
      padding: 7px 0 7px 0;
      text-align: center;
      font-size: 1.15rem;
      font-weight: bold;
      letter-spacing: 1px;
      box-shadow: 0 2px 12px #0001;
      border-bottom: 2px solid #2e8ca3;
      position: relative;
      min-height: 0;
    }
    .container {
      max-width: 1100px;
      margin: 10px auto 0 auto;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 0 18px #0002;
      padding: 10px 10px 8px 10px;
      border: 2px solid #8c969a;
      position: relative;
    }
    h2 {
      text-align: center;
      color: #2e8ca3;
      margin-bottom: 10px;
      font-size: 1rem;
      font-weight: bold;
      letter-spacing: 1px;
      margin-top: 10px;
      border-bottom: 1px solid #7a5230;
      padding-bottom: 4px;
    }
    form {
      display: flex;
      flex-direction: row;
      gap: 8px;
      align-items: flex-end;
      margin-bottom: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    form > div {
      display: flex;
      flex-direction: column;
      min-width: 120px;
    }
    label {
      font-weight: bold;
      color: #2e8ca3;
      margin-bottom: 4px;
      font-size: 0.95rem;
    }
    input[type="text"], input[type="email"], input[type="password"], select[name="jobTitle"], #editJobTitle {
      padding: 6px;
      border-radius: 0px;
      font-size: 0.95rem;
      border: 1.5px solid #c5d6db;
      background: #f7fafd;
      transition: border 0.2s;
      font-family: 'Cairo', Arial, sans-serif;
      /* توحيد الخط مع بقية الحقول */
    }
    input[type="text"]:focus, input[type="email"]:focus, input[type="password"]:focus,
    select[name="jobTitle"]:focus, #editJobTitle:focus {
      border: 1.5px solid #2e8ca3;
      background: #c5d6db;
    }
    button, .permissions-btn {
      background: #2e8ca3;
      color: #fff;
      border: none;
      border-radius: 0px;
      font-size: 0.92rem;
      font-weight: bold;
      padding: 5px 12px;
      cursor: pointer;
      margin-top: 0;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
      justify-content: center;
    }
    button:hover, .permissions-btn:hover {
      background: #1a3b50;
    }
    .delete-btn {
      background: #7a5230 !important;
      color: #fff !important;
      border-radius: 0px;
      padding: 5px 12px;
      font-weight: bold;
      border: none;
      transition: background 0.2s;
    }
    .delete-btn:hover {
      background: #8c969a !important;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      background: #c5d6db;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 12px #8c969a;
      font-size: 0.92rem;
    }
    th, td {
      padding: 4px 2px;
      font-size: 0.92rem;
      border-bottom: 1px solid #8c969a;
      text-align: center;
      word-break: break-word;
      background: transparent;
    }
    th {
      background: #2e8ca3 !important;
      color: #fff !important;
      font-weight: bold;
      font-size: 1rem;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td {
      background: #f7fafd;
      transition: background 0.2s;
    }
    /* نافذة الصلاحيات */
    #permissionsModal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #0005;
      z-index: 999;
      align-items: center;
      justify-content: center;
    }
    #permissionsModal > div {
      background: #fff;
      border-radius: 16px;
      padding: 28px 22px;
      min-width: 320px;
      max-width: 90vw;
      box-shadow: 0 4px 24px #0002;
      position: relative;
      border: 2px solid #2e8ca3;
    }
    #permissionsModal h3 {
      margin-bottom: 18px;
      color: #2e8ca3;
      font-size: 1.15rem;
      text-align: center;
    }
    #permissionsForm label {
      color: #2e8ca3;
      font-weight: 500;
      font-size: 1rem;
      margin-bottom: 0;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    #permissionsForm input[type="checkbox"] {
      accent-color: #2e8ca3;
      width: 18px;
      height: 18px;
      margin-left: 6px;
    }
    #permissionsForm button {
      padding: 7px 18px;
      font-size: 1rem;
      border-radius: 0px;
      margin-top: 0;
    }
    #permissionsForm button[type="button"] {
      background: #7a5230;
      margin-right: 8px;
    }
    #permissionsForm button[type="button"]:hover {
      background: #8c969a;
    }
    /* نافذة تعديل المستخدم */
    #editUserModal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #0005;
      z-index: 1001;
      align-items: center;
      justify-content: center;
    }
    #editUserModal > div {
      background: #f7fafd;
      border-radius: 10px;
      padding: 22px 18px 16px 18px;
      min-width: 260px;
      max-width: 95vw;
      box-shadow: 0 2px 12px #2e8ca355;
      border: 1.5px solid #2e8ca3;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #editUserModal h3 {
      color: #2e8ca3;
      font-size: 1.08rem;
      margin-bottom: 14px;
      text-align: center;
      font-weight: bold;
      letter-spacing: 0.5px;
    }
    #editUserForm {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 320px;
    }
    #editUserForm label {
      color: #2e8ca3;
      font-size: 0.97rem;
      font-weight: 500;
      margin-bottom: 2px;
    }
    #editUserForm input[type="text"],
    #editUserForm input[type="email"],
    #editUserForm input[type="password"] {
      margin-top: 3px;
      width: 100%;
      font-size: 0.97rem;
      padding: 6px;
      border-radius: 4px;
      border: 1px solid #c5d6db;
      background: #fff;
    }
    #editUserForm button {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      justify-content: center;
    }
    #editUserForm button[type="submit"] {
      background: #2e8ca3;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 0.97rem;
      padding: 6px 18px;
      font-weight: bold;
      min-width: 70px;
    }
    #editUserForm button[type="button"] {
      background: #7a5230;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 0.97rem;
      padding: 6px 18px;
      font-weight: bold;
      min-width: 70px;
    }
    #editUserForm button[type="button"]:hover {
      background: #8c969a;
    }
    .actions-cell {
      display: flex;
      flex-direction: row;
      gap: 6px;
      justify-content: center;
      align-items: center;
    }
    .icon-btn {
      background: none;
      border: none;
      padding: 4px;
      margin: 0;
      cursor: pointer;
      color: #2e8ca3;
      font-size: 1.15rem;
      transition: color 0.2s;
    }
    .icon-btn.delete { color: #7a5230; }
    .icon-btn.delete:hover { color: #8c969a; }
    .icon-btn.permissions { color: #2e8ca3; }
    .icon-btn.permissions:hover { color: #1a3b50; }
    .icon-btn.edit { color: #2e8ca3; }
    .icon-btn.edit:hover { color: #1a3b50; }
    @media (max-width: 900px) {
      .container { padding: 4px; }
      th, td { padding: 2px; font-size: .85rem; }
      form > div { min-width: 90px; }
    }
    @media (max-width: 600px) {
      .container { padding: 2px; }
      th, td { padding: 1px; font-size: .8rem; }
      form { flex-direction: column; gap: 6px; }
    }
  </style>
</head>
<body>
  <div id="navbar-container"></div>
  <div class="container">
    <h2>إضافة مستخدم جديد</h2>
    <form id="userForm">
      <div>
        <label><i class="fa fa-briefcase"></i> الوظيفة</label>
        <select name="jobTitle" required>
          <option value="">اختر الوظيفة</option>
          <option value="مدير المشروع">مدير المشروع</option>
          <option value="مهندس مكتب فنى">مهندس مكتب فنى</option>
          <option value="مهندس انشائي">مهندس انشائي</option>
          <option value="مهندس معمارى">مهندس معمارى</option>
          <option value="مهندس كهرباء">مهندس كهرباء</option>
          <option value="مهندس ميكانيكا">مهندس ميكانيكا</option>
          <option value="مراقب">مراقب</option>
          <option value="محاسب">محاسب</option>
          <option value="مدير مشتريات">مدير مشتريات</option>
          <option value="امين مستودع">امين مستودع</option>
        </select>
      </div>
      <div>
        <label><i class="fa fa-user"></i> اسم المستخدم</label>
        <input type="text" name="username" required>
      </div>
      <div>
        <label><i class="fa fa-envelope"></i> الإيميل</label>
        <input type="email" name="email" required>
      </div>
      <div>
        <label><i class="fa fa-lock"></i> كلمة المرور</label>
        <input type="password" name="password" required>
      </div>
      <button type="submit"><i class="fa fa-plus"></i> إضافة المستخدم</button>
    </form>
    <h2 style="margin-top:32px;">قائمة المستخدمين</h2>
    <table>
      <thead>
        <tr>
          <th>الوظيفة</th>
          <th>اسم المستخدم</th>
          <th>الإيميل</th>
          <th>كلمة المرور</th>
          <th>إجراءات</th>
        </tr>
      </thead>
      <tbody id="usersTable"></tbody>
    </table>
  </div>

  <!-- نافذة الصلاحيات -->
  <div id="permissionsModal">
    <div>
      <h3><i class="fa fa-key"></i> تعديل صلاحيات المستخدم</h3>
      <form id="permissionsForm">
        <table style="width:100%; border-collapse:collapse; margin-bottom:18px; border:2px solid #2e8ca3;">
          <tbody>
            <!-- إضافة مستخلص: الصلاحيات الجديدة -->
            <tr>
              <td style="min-width:140px; color:#2e8ca3; font-weight:bold; border:1.5px solid #2e8ca3; border-left:none; border-right:none; background:none;">
                إضافة مستخلص
              </td>
              <td style="padding:7px 0; border:1.5px solid #2e8ca3; border-left:none; border-right:none; background:none;">
                <div style="display:flex; flex-direction:column; gap:7px;">
                  <label style="display:flex; align-items:center; gap:4px;">
                    <input type="checkbox" name="permissions" value="add-extract-edit-all" id="perm-edit-all">
                    تعديل كامل
                  </label>
                  <label style="display:flex; align-items:center; gap:4px;">
                    <input type="checkbox" name="permissions" value="add-extract-add" class="perm-under-edit-all">
                    إضافة مستخلص
                  </label>
                  <label style="display:flex; align-items:center; gap:4px;">
                    <input type="checkbox" name="permissions" value="add-extract-edit-current" class="perm-under-edit-all">
                    تعديل الحالى
                  </label>
                  <label style="display:flex; align-items:center; gap:4px;">
                    <input type="checkbox" name="permissions" value="add-extract-add-lump" class="perm-under-edit-all">
                    إضافة مقطوعيات
                  </label>
                  <label style="display:flex; align-items:center; gap:4px;">
                    <input type="checkbox" name="permissions" value="add-extract-add-daily" class="perm-under-edit-all">
                    إضافة يوميات
                  </label>
                  <label style="display:flex; align-items:center; gap:4px;">
                    <input type="checkbox" name="permissions" value="add-extract-add-separator" class="perm-under-edit-all">
                    إضافة فاصل
                  </label>
                  <label style="display:flex; align-items:center; gap:4px;">
                    <input type="checkbox" name="permissions" value="add-extract-add-workitem" class="perm-under-edit-all">
                    إضافة بنود أعمال
                  </label>
                  <label style="display:flex; align-items:center; gap:4px;">
                    <input type="checkbox" name="permissions" value="add-extract-delete-workitem" class="perm-under-edit-all">
                    حذف بنود أعمال
                  </label>
                  <label style="display:flex; align-items:center; gap:4px;">
                    <input type="checkbox" name="permissions" value="add-extract-max-workitem-percent" class="perm-under-edit-all">
                    النسبة القصوى لبنود الأعمال
                  </label>
                  <label style="display:flex; align-items:center; gap:4px;">
                    <input type="checkbox" name="permissions" value="add-extract-enable-guarantee" class="perm-under-edit-all">
                    تفعيل ضمان الأعمال
                  </label>
                </div>
              </td>
            </tr>
            <!-- مثال: قائمة المستخلصات (بدون تغيير) -->
            <tr>
              <td style="min-width:140px; color:#2e8ca3; font-weight:bold; border:1.5px solid #2e8ca3; border-left:none; border-right:none; background:none;">
                قائمة المستخلصات
              </td>
              <td style="padding:7px 0; border:1.5px solid #2e8ca3; border-left:none; border-right:none; background:none;">
                <div style="display:flex; gap:12px;">
                  <label style="display:flex; align-items:center; gap:4px;">
                    <input type="checkbox" name="permissions" value="list-extracts-view">
                    عرض
                  </label>
                  <label style="display:flex; align-items:center; gap:4px;">
                    <input type="checkbox" name="permissions" value="list-extracts-add">
                    إضافة
                  </label>
                  <label style="display:flex; align-items:center; gap:4px;">
                    <input type="checkbox" name="permissions" value="list-extracts-edit">
                    تعديل
                  </label>
                  <label style="display:flex; align-items:center; gap:4px;">
                    <input type="checkbox" name="permissions" value="list-extracts-delete">
                    حذف
                  </label>
                </div>
              </td>
            </tr>
            <!-- ...أضف المزيد حسب الحاجة... -->
          </tbody>
        </table>
        <div style="margin-top:8px; text-align:left;">
          <button type="submit"><i class="fa fa-save"></i> حفظ</button>
          <button type="button" onclick="closePermissionsModal()"><i class="fa fa-times"></i> إلغاء</button>
        </div>
      </form>
    </div>
  </div>

  <!-- نافذة تعديل المستخدم -->
  <div id="editUserModal" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:#0005; z-index:1001; align-items:center; justify-content:center;">
    <div style="background:#f7fafd; border-radius:10px; padding:22px 18px 16px 18px; min-width:260px; max-width:95vw; box-shadow:0 2px 12px #2e8ca355; border:1.5px solid #2e8ca3; position:relative; display:flex; flex-direction:column; align-items:center;">
      <h3 style="color:#2e8ca3; font-size:1.08rem; margin-bottom:14px; text-align:center; font-weight:bold; letter-spacing:0.5px;">
        <i class="fa fa-edit"></i> تعديل بيانات المستخدم
      </h3>
      <form id="editUserForm" style="display:flex; flex-direction:column; gap:10px; width:100%; max-width:320px; font-family:'Cairo',Arial,sans-serif;">
        <div style="display:flex; flex-direction:column; align-items:flex-start; gap:2px; width:100%;">
          <label for="editJobTitle" style="color:#2e8ca3; font-size:0.93rem; font-weight:500; margin-bottom:0; align-self:flex-start;">الوظيفة</label>
          <select name="jobTitle" id="editJobTitle" required style="margin-top:0; width:100%; box-sizing:border-box; font-size:0.93rem; padding:6px; border-radius:4px; border:1px solid #c5d6db; background:#fff;">
            <option value="">اختر الوظيفة</option>
            <option value="مدير المشروع">مدير المشروع</option>
            <option value="مهندس مكتب فنى">مهندس مكتب فنى</option>
            <option value="مهندس انشائي">مهندس انشائي</option>
            <option value="مهندس معمارى">مهندس معمارى</option>
            <option value="مهندس كهرباء">مهندس كهرباء</option>
            <option value="مهندس ميكانيكا">مهندس ميكانيكا</option>
            <option value="مراقب">مراقب</option>
            <option value="محاسب">محاسب</option>
            <option value="مدير مشتريات">مدير مشتريات</option>
            <option value="امين مستودع">امين مستودع</option>
          </select>
        </div>
        <div style="display:flex; flex-direction:column; align-items:flex-start; gap:2px; width:100%;">
          <label for="editUsername" style="color:#2e8ca3; font-size:0.93rem; font-weight:500; margin-bottom:0; align-self:flex-start;">اسم المستخدم</label>
          <input type="text" name="username" id="editUsername" required style="margin-top:0; width:100%; box-sizing:border-box; font-size:0.93rem; padding:6px; border-radius:4px; border:1px solid #c5d6db; background:#fff; direction:ltr; text-align:left;">
        </div>
        <div style="display:flex; flex-direction:column; align-items:flex-start; gap:2px; width:100%;">
          <label for="editEmail" style="color:#2e8ca3; font-size:0.93rem; font-weight:500; margin-bottom:0; align-self:flex-start;">الإيميل</label>
          <input type="email" name="email" id="editEmail" required style="margin-top:0; width:100%; box-sizing:border-box; font-size:0.93rem; padding:6px; border-radius:4px; border:1px solid #c5d6db; background:#fff; direction:ltr; text-align:left;">
        </div>
        <div style="display:flex; flex-direction:column; align-items:flex-start; gap:2px; width:100%;">
          <label for="editPassword" style="color:#2e8ca3; font-size:0.93rem; font-weight:500; margin-bottom:0; align-self:flex-start;">كلمة المرور الجديدة</label>
          <input type="password" name="password" id="editPassword" style="margin-top:0; width:100%; box-sizing:border-box; font-size:0.93rem; padding:6px; border-radius:4px; border:1px solid #c5d6db; background:#fff; direction:ltr; text-align:left;" placeholder="اتركها فارغة للإبقاء على القديمة">
        </div>
        <div style="display:flex; flex-direction:row; gap:6px; margin-top:8px; justify-content:flex-end;">
          <button type="submit" style="background:#2e8ca3; color:#fff; border:none; border-radius:4px; font-size:0.85rem; padding:4px 12px; font-weight:600; min-width:48px; font-family:'Cairo',Arial,sans-serif;">
            <i class="fa fa-save"></i> حفظ
          </button>
          <button type="button" onclick="closeEditUserModal()" style="background:#7a5230; color:#fff; border:none; border-radius:4px; font-size:0.85rem; padding:4px 12px; font-weight:600; min-width:48px; font-family:'Cairo',Arial,sans-serif;">
            <i class="fa fa-times"></i> إلغاء
          </button>
        </div>
      </form>
    </div>
  </div>

  <script>
    if (!localStorage.getItem('user')) {
      window.location.href = 'login.html';
    }

    const user = JSON.parse(localStorage.getItem('user') || '{}');
    // لا يوجد شرط لصلاحية users.html، فقط تحقق من وجود المستخدم

    let currentPermissionsUserId = null;
    let currentPermissions = [];
    let currentEditUserId = null; // متغير لتخزين معرف المستخدم الجاري تعديله

    async function fetchUsers() {
      const res = await fetch('/users');
      const users = await res.json();
      return users;
    }

    async function renderUsers() {
      const users = await fetchUsers();
      const tbody = document.getElementById('usersTable');
      tbody.innerHTML = '';
      users.forEach(u => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${u.jobTitle || ''}</td>
          <td>${u.username}</td>
          <td>${u.email || ''}</td>
          <td>${u.password}</td>
          <td class="actions-cell">
            <button class="icon-btn delete" title="حذف" onclick="deleteUser('${u._id}')">
              <i class="fa fa-trash"></i>
            </button>
            <button class="icon-btn permissions"
              title="صلاحيات"
              data-userid="${u._id}"
              data-permissions='${JSON.stringify(u.permissions || [])}'>
              <i class="fa fa-key"></i>
            </button>
            <button class="icon-btn edit"
              title="تعديل"
              data-userid="${u._id}"
              data-username="${u.username || ''}"
              data-email="${u.email || ''}"
              data-jobtitle="${u.jobTitle || ''}">
              <i class="fa fa-edit"></i>
            </button>
          </td>
        `;
        tbody.appendChild(tr);
      });

      // اربط الأحداث بعد بناء الجدول
      document.querySelectorAll('.icon-btn.permissions').forEach(btn => {
        btn.onclick = function() {
          const userId = this.getAttribute('data-userid');
          let permissions = [];
          try { permissions = JSON.parse(this.getAttribute('data-permissions') || '[]'); } catch {}
          openPermissionsModal(userId, permissions);
        };
      });

      document.querySelectorAll('.icon-btn.edit').forEach(btn => {
        btn.onclick = function() {
          const userId = this.getAttribute('data-userid');
          const username = this.getAttribute('data-username');
          const email = this.getAttribute('data-email');
          const jobTitle = this.getAttribute('data-jobtitle');
          openEditUserModal(userId, username, email, jobTitle);
        };
      });
    }

    // ربط صلاحية "تعديل كامل" بتفعيل كل الصلاحيات تحتها
    function handleEditAllPermission() {
      const editAll = document.getElementById('perm-edit-all');
      const underAll = document.querySelectorAll('.perm-under-edit-all');
      if (!editAll) return;

      function updateRelatedPermissions() {
        if (editAll.checked) {
          underAll.forEach(cb => {
            cb.checked = true;
            cb.disabled = true;
          });
        } else {
          underAll.forEach(cb => {
            cb.disabled = false;
          });
        }
      }
      editAll.removeEventListener('change', updateRelatedPermissions); // لمنع التكرار
      editAll.addEventListener('change', updateRelatedPermissions);
      updateRelatedPermissions();
    }

    function openPermissionsModal(userId, permissions) {
      currentPermissionsUserId = userId;
      currentPermissions = permissions || [];
      document.getElementById('permissionsModal').style.display = 'flex';
      // ضبط القيم
      document.querySelectorAll('#permissionsForm input[type="checkbox"]').forEach(cb => {
        cb.checked = currentPermissions.includes(cb.value);
      });
      // ربط وتفعيل منطق تعديل كامل
      setTimeout(handleEditAllPermission, 0);
    }

    function closePermissionsModal() {
      document.getElementById('permissionsModal').style.display = 'none';
      currentPermissionsUserId = null;
    }

    document.getElementById('permissionsForm').onsubmit = async function(e) {
      e.preventDefault();
      // اجمع كل الصلاحيات المختارة
      let checked = Array.from(this.querySelectorAll('input[type="checkbox"]:checked')).map(cb => cb.value);

      // إذا كانت "تعديل كامل" مفعلة، أضف كل صلاحيات إضافة مستخلص تلقائياً
      if (checked.includes('add-extract-edit-all')) {
        ['add-extract-add', 'add-extract-edit-current'].forEach(val => {
          if (!checked.includes(val)) checked.push(val);
        });
      }

      await fetch('/users/' + currentPermissionsUserId + '/permissions', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ permissions: checked })
      });
      // تحديث بيانات المستخدم الحالي في localStorage إذا كان هو نفسه
      const currentUser = JSON.parse(localStorage.getItem('user') || '{}');
      if (currentUser && currentUser._id === currentPermissionsUserId) {
        currentUser.permissions = checked;
        localStorage.setItem('user', JSON.stringify(currentUser));
      }
      closePermissionsModal();
      renderUsers();
      alert('تم تحديث الصلاحيات بنجاح');
    };

    document.getElementById('userForm').onsubmit = async function(e) {
      e.preventDefault();
      const jobTitle = this.jobTitle.value.trim();
      const username = this.username.value.trim();
      const email = this.email.value.trim();
      const password = this.password.value;
      if (!jobTitle || !username || !email || !password) return;
      await fetch('/users', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ jobTitle, username, email, password })
      });
      renderUsers();
      this.reset();
      alert('تمت إضافة المستخدم بنجاح');
    };

    async function deleteUser(id) {
      if (!confirm('هل أنت متأكد من حذف هذا المستخدم؟')) return;
      await fetch('/users/' + id, { method: 'DELETE' });
      renderUsers();
    }

    // عرض اسم المستخدم
    const userStr = localStorage.getItem('user');
    if (userStr) {
      try {
        const user = JSON.parse(userStr);
        document.getElementById('username').textContent = user.username || '';
      } catch {}
    }
    function logout() {
      localStorage.removeItem('user');
      window.location.href = 'login.html';
    }

    renderUsers();

    // نافذة التعديل
    function openEditUserModal(userId, username, email, jobTitle) {
      currentEditUserId = userId;
      // set jobTitle select value
      const jobSelect = document.getElementById('editJobTitle');
      if (jobSelect) {
        jobSelect.value = jobTitle || '';
      }
      document.getElementById('editUsername').value = username || '';
      document.getElementById('editEmail').value = email || '';
      document.getElementById('editPassword').value = '';
      document.getElementById('editUserModal').style.display = 'flex';
      window._editingUserRow = document.querySelector(
        `.edit-user-btn[data-userid="${userId}"]`
      )?.closest('tr');
    }
    function closeEditUserModal() {
      document.getElementById('editUserModal').style.display = 'none';
      currentEditUserId = null;
      window._editingUserRow = null;
    }

    document.getElementById('editUserForm').onsubmit = async function(e) {
      e.preventDefault();
      const jobTitle = document.getElementById('editJobTitle').value.trim();
      const username = document.getElementById('editUsername').value.trim();
      const email = document.getElementById('editEmail').value.trim();
      const password = document.getElementById('editPassword').value;
      if (!jobTitle || !username || !email) return;
      const body = { jobTitle, username, email };
      if (password) body.password = password;
      try {
        await fetch('/users/' + currentEditUserId, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        // تحديث الصف مباشرة بدون إعادة تحميل كل الجدول
        const row = window._editingUserRow;
        if (row) {
          row.querySelector('td:nth-child(1)').textContent = jobTitle;
          row.querySelector('td:nth-child(2)').textContent = username;
          row.querySelector('td:nth-child(3)').textContent = email;
          if (password) {
            row.querySelector('td:nth-child(4)').textContent = password;
          }
          const editBtn = row.querySelector('.edit-user-btn');
          if (editBtn) {
            editBtn.setAttribute('data-jobtitle', jobTitle);
            editBtn.setAttribute('data-username', username);
            editBtn.setAttribute('data-email', email);
          }
        }
        closeEditUserModal();
        alert('تم تحديث بيانات المستخدم بنجاح');
      } catch {
        alert('حدث خطأ أثناء التحديث');
      }
    };

    // ربط الصفحة بالشريط العلوي وتنفيذ السكريبتات بداخله
    fetch('components/main-navbar.html')
      .then(res => res.text())
      .then(html => {
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = html;
        const scripts = tempDiv.querySelectorAll('script');
        scripts.forEach(s => s.parentNode.removeChild(s));
        document.getElementById('navbar-container').innerHTML = tempDiv.innerHTML;
        scripts.forEach(oldScript => {
          const newScript = document.createElement('script');
          if (oldScript.src) {
            newScript.src = oldScript.src;
          } else {
            newScript.textContent = oldScript.textContent;
          }
          document.body.appendChild(newScript);
        });
      });
  </script>
</body>
</html>
