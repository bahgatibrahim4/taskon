<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>عرض بيانات Admin - TASKON</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      background: white;
      border-radius: 20px;
      padding: 3rem;
      max-width: 800px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    h1 {
      color: #667eea;
      margin-bottom: 2rem;
      text-align: center;
      font-size: 2.5rem;
      font-weight: 900;
    }

    .company-select {
      margin-bottom: 2rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      color: #2d3748;
      font-weight: 600;
      font-size: 1.1rem;
    }

    select, input {
      width: 100%;
      padding: 1rem;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      font-family: 'Cairo', sans-serif;
      transition: border-color 0.3s;
    }

    select:focus, input:focus {
      outline: none;
      border-color: #667eea;
    }

    .btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 1rem 2rem;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s;
      width: 100%;
      margin-top: 1rem;
      font-family: 'Cairo', sans-serif;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
    }

    .admin-info {
      background: #f7fafc;
      border-radius: 15px;
      padding: 2rem;
      margin-top: 2rem;
      border: 2px solid #e2e8f0;
      display: none;
    }

    .admin-info.show {
      display: block;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem;
      border-bottom: 1px solid #e2e8f0;
      margin-bottom: 1rem;
    }

    .info-row:last-child {
      border-bottom: none;
      margin-bottom: 0;
    }

    .info-label {
      font-weight: 700;
      color: #4a5568;
      font-size: 1.1rem;
    }

    .info-value {
      font-weight: 600;
      color: #667eea;
      font-size: 1.2rem;
      background: white;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
    }

    .copy-btn {
      background: #48bb78;
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.9rem;
      margin-right: 0.5rem;
    }

    .copy-btn:hover {
      background: #38a169;
    }

    .success-message {
      background: #48bb78;
      color: white;
      padding: 1rem;
      border-radius: 10px;
      text-align: center;
      margin-top: 1rem;
      display: none;
    }

    .success-message.show {
      display: block;
    }

    .loading {
      text-align: center;
      color: #667eea;
      font-size: 1.2rem;
      padding: 2rem;
    }

    .no-data {
      text-align: center;
      color: #e53e3e;
      font-size: 1.2rem;
      padding: 2rem;
    }

    .login-link {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      padding: 1rem;
      background: #edf2f7;
      border-radius: 10px;
      text-decoration: none;
      color: #667eea;
      font-weight: 600;
      font-size: 1.1rem;
    }

    .login-link:hover {
      background: #e2e8f0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔑 عرض بيانات مدير الشركة</h1>

    <div class="company-select">
      <label>اختر الشركة:</label>
      <select id="companySelect">
        <option value="">جاري التحميل...</option>
      </select>
    </div>

    <button class="btn" onclick="loadAdminData()">📋 عرض بيانات المدير</button>

    <div class="admin-info" id="adminInfo">
      <h2 style="color: #2d3748; margin-bottom: 1.5rem; text-align: center;">معلومات المدير</h2>
      
      <div class="info-row">
        <span class="info-label">اسم المستخدم:</span>
        <div>
          <button class="copy-btn" onclick="copyText('adminUsername')">📋 نسخ</button>
          <span class="info-value" id="adminUsername">-</span>
        </div>
      </div>

      <div class="info-row">
        <span class="info-label">البريد الإلكتروني:</span>
        <div>
          <button class="copy-btn" onclick="copyText('adminEmail')">📋 نسخ</button>
          <span class="info-value" id="adminEmail">-</span>
        </div>
      </div>

      <div class="info-row">
        <span class="info-label">كلمة المرور:</span>
        <div>
          <button class="copy-btn" onclick="copyText('adminPassword')">📋 نسخ</button>
          <span class="info-value" id="adminPassword">-</span>
        </div>
      </div>

      <div class="info-row">
        <span class="info-label">الدور:</span>
        <span class="info-value" id="adminRole">-</span>
      </div>

      <div class="info-row">
        <span class="info-label">رابط تسجيل الدخول:</span>
        <div>
          <button class="copy-btn" onclick="copyText('loginUrl')">📋 نسخ</button>
          <span class="info-value" id="loginUrl" style="font-size: 0.9rem;">-</span>
        </div>
      </div>

      <a class="login-link" id="loginLink" href="#" target="_blank">
        🚀 تسجيل الدخول الآن
      </a>
    </div>

    <div class="success-message" id="successMessage">
      ✅ تم النسخ بنجاح!
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:4000';

    // Load companies on page load
    async function loadCompanies() {
      try {
        const response = await fetch(`${API_URL}/companies`);
        const companies = await response.json();

        const select = document.getElementById('companySelect');
        select.innerHTML = '<option value="">اختر الشركة...</option>';

        companies.forEach(company => {
          const option = document.createElement('option');
          option.value = company._id;
          option.textContent = `${company.companyName} (${company.subdomain})`;
          option.dataset.subdomain = company.subdomain;
          option.dataset.email = company.email;
          select.appendChild(option);
        });
      } catch (err) {
        console.error('Error loading companies:', err);
        document.getElementById('companySelect').innerHTML = '<option value="">خطأ في تحميل الشركات</option>';
      }
    }

    // Load admin data
    async function loadAdminData() {
      const select = document.getElementById('companySelect');
      const companyId = select.value;
      
      if (!companyId) {
        alert('الرجاء اختيار شركة أولاً');
        return;
      }

      const selectedOption = select.options[select.selectedIndex];
      const subdomain = selectedOption.dataset.subdomain;
      const companyEmail = selectedOption.dataset.email;

      try {
        // Search for admin user
        const response = await fetch(`${API_URL}/users?companyId=${companyId}`);
        const users = await response.json();

        // Find admin user
        const adminUser = users.find(u => u.role === 'admin' || u.username.startsWith('admin_'));

        if (adminUser) {
          // Display admin data
          document.getElementById('adminUsername').textContent = adminUser.username;
          document.getElementById('adminEmail').textContent = adminUser.email;
          document.getElementById('adminPassword').textContent = adminUser.password || '123456';
          document.getElementById('adminRole').textContent = adminUser.role || 'admin';
          
          const loginUrl = `http://${subdomain}.taskon.local:4000/login.html`;
          document.getElementById('loginUrl').textContent = loginUrl;
          
          const loginLink = document.getElementById('loginLink');
          loginLink.href = loginUrl;

          // Show admin info
          document.getElementById('adminInfo').classList.add('show');
        } else {
          alert('لم يتم العثور على مستخدم مدير لهذه الشركة');
        }
      } catch (err) {
        console.error('Error loading admin data:', err);
        alert('حدث خطأ في تحميل البيانات');
      }
    }

    // Copy text to clipboard
    function copyText(elementId) {
      const element = document.getElementById(elementId);
      const text = element.textContent;

      navigator.clipboard.writeText(text).then(() => {
        const successMsg = document.getElementById('successMessage');
        successMsg.classList.add('show');
        setTimeout(() => {
          successMsg.classList.remove('show');
        }, 2000);
      }).catch(err => {
        console.error('Error copying:', err);
        // Fallback
        const textarea = document.createElement('textarea');
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        
        const successMsg = document.getElementById('successMessage');
        successMsg.classList.add('show');
        setTimeout(() => {
          successMsg.classList.remove('show');
        }, 2000);
      });
    }

    // Load companies on page load
    loadCompanies();
  </script>
</body>
</html>
