<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>إضافة مقاول | سعيد أحمد بالبيد</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Cairo', Arial, sans-serif;
      background: #c5d6db;
      direction: rtl;
    }
    .navbar {
      background: #1a3b50;
      color: #fff;
      padding: 2px 0 1px 0;
      text-align: center;
      font-size: 1.05rem;
      font-weight: 900;
      letter-spacing: 2px;
      box-shadow: 0 2px 18px #1a3b5022;
      border-radius: 0;
      border-bottom: 3px solid #2e8ca3;
      margin-bottom: 40px;
      position: relative;
      z-index: 2;
      min-height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .navbar .user-info {
      position: absolute;
      left: 16px;
      right: auto;
      top: 50%;
      transform: translateY(-50%);
      justify-content: flex-start;
      gap: 10px;
      padding: 0;
      height: auto;
    }
    .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #bbb;
      display: inline-block;
      vertical-align: middle;
      object-fit: cover;
      cursor: pointer;
      transition: box-shadow 0.2s;
    }
    .user-avatar:hover {
      box-shadow: 0 0 0 2px #2e8ca3;
    }
    .user-name {
      font-size: 0.93rem;
      font-weight: 500;
      color: #fff;
      margin-right: 6px;
      vertical-align: middle;
      display: inline-block;
      letter-spacing: 0.3px;
      font-family: 'Cairo', Arial, sans-serif;
      text-shadow: 0 1px 6px #0002;
      transition: color 0.2s;
    }
    .user-avatar:hover + .user-name {
      color: #2e8ca3;
    }
    #logoutBtn {
      display: none;
      color: #2e8ca3;
      font-size: 0.78rem;
      font-weight: 600;
      margin-top: 2px;
      cursor: pointer;
      background: #fff;
      border: none;
      padding: 3px 10px;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: 110%;
      white-space: nowrap;
      z-index: 10;
      border-radius: 8px;
      box-shadow: 0 2px 12px #2e8ca322;
      border: 1.2px solid #2e8ca3;
      transition: background 0.2s, color 0.2s;
      font-family: 'Cairo', Arial, sans-serif;
      letter-spacing: 0.3px;
      text-shadow: 0 1px 8px #2e8ca322, 0 1px 6px #0001;
    }
    #logoutBtn:hover {
      background: #2e8ca3;
      color: #fff;
    }
    .show-logout #logoutBtn {
      display: block;
      animation: fadeIn 0.2s;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-50%) translateY(10px);}
      to { opacity: 1; transform: translateX(-50%) translateY(0);}
    }
    .navbar-taskon {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      font-family: 'Cairo', Arial, sans-serif;
      font-size: 1.08rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: 2px;
      background: transparent;
      padding: 2px 14px 2px 10px;
      border-radius: 10px;
      box-shadow: none;
      border: none;
      z-index: 10;
      user-select: none;
    }
    .container {
      max-width: 600px;
      margin: 24px auto 0 auto;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 0 24px #0002;
      padding: 38px 38px 28px 38px;
      border: 2px solid #8c969a;
      position: relative;
    }
    h2 {
      text-align: center;
      margin-bottom: 32px;
      color: #2e8ca3;
      letter-spacing: 1px;
      font-size: 1.35rem;
      font-weight: bold;
      border-bottom: 2px solid #7a5230;
      padding-bottom: 12px;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    input, textarea {
      padding: 10px;
      border-radius: 0px;
      border: 1.5px solid #c5d6db;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #f7fafd;
    }
    input:focus, textarea:focus {
      border-color: #2e8ca3;
      background: #c5d6db;
      box-shadow: 0 0 4px #2e8ca3;
    }
    button[type="submit"] {
      background: #2e8ca3;
      color: #fff;
      border: none;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      box-shadow: 0 2px 8px #0001;
      font-size: 1.08rem;
      border-radius: 0px;
      padding: 7px 18px;
      transition: background 0.2s;
    }
    button[type="submit"]:hover {
      background: #1a3b50;
    }
    .back {
      display: block;
      margin: 0 auto 15px auto;
      text-align: center;
      color: #2e8ca3;
      text-decoration: underline;
      cursor: pointer;
      font-weight: bold;
      transition: color 0.2s;
    }
    .back:hover {
      color: #1a3b50;
    }
    @media (max-width: 600px) {
      .container { padding: 10px; }
      h2 { font-size: 1.1rem; padding-bottom: 8px; }
      input, textarea { font-size: .95rem; padding: 8px; }
      button[type="submit"] { font-size: 1rem; padding: 6px 12px; }
      .navbar { font-size: 1rem; padding: 3px 0 2px 0; border-radius: 0 0 14px 14px; min-height: 22px; }
      .navbar .user-info { left: 4px; font-size: 0.92rem; padding: 2px 6px; height: 22px; }
    }
  </style>
</head>
<body>
  <div id="navbar-container"></div>
  <div class="container">
    <span class="back" onclick="location.href='index.html'">الرجوع للرئيسية</span>
    <h2>إضافة مقاول جديد</h2>
    <form id="contractorForm">
      <input name="name" placeholder="اسم المقاول" required>
      <input name="phone" placeholder="رقم الهاتف" required>
      <input name="workItem" placeholder="بند العمل">
      <textarea name="notes" placeholder="ملاحظات"></textarea>
      <button type="submit">إضافة المقاول</button>
    </form>
  </div>
  <script>
    // تحقق من تسجيل الدخول
    if (!localStorage.getItem('user')) {
      window.location.href = 'login.html';
    }
    // تحقق من الصلاحية
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    if (!user.permissions || !user.permissions.includes('add-contractor.html')) {
      alert('ليس لديك صلاحية الدخول لهذه الصفحة');
      window.location.href = 'index.html';
    }
  </script>
  <script>
    document.getElementById('contractorForm').onsubmit = async function(e) {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(e.target));
      await fetch('/contractors', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
      });
      alert('تم إضافة المقاول بنجاح!');
      e.target.reset();
    }
  </script>
  <script>
    fetch('components/main-navbar.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('navbar-container').innerHTML = html;
        // بعد تحميل الـ navbar، نفذ كود التعامل مع عناصرها
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (user && user.username) {
          const userNameSpan = document.getElementById('userName');
          if (userNameSpan) userNameSpan.textContent = user.username;
        }
        const userAvatar = document.getElementById('userAvatar');
        const userInfo = document.getElementById('userInfo');
        const logoutBtn = document.getElementById('logoutBtn');
        if (userAvatar && userInfo && logoutBtn) {
          userAvatar.onclick = function(e) {
            e.stopPropagation();
            userInfo.classList.toggle('show-logout');
          };
          document.addEventListener('click', function(e) {
            if (!userInfo.contains(e.target)) {
              userInfo.classList.remove('show-logout');
            }
          });
          logoutBtn.onclick = function() {
            localStorage.removeItem('user');
            window.location.href = 'login.html';
          };
        }
      });
  </script>
</body>
</html>
