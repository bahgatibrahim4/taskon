<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل دخول لوحة التحكم - TASKON</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .login-container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 3rem;
      max-width: 450px;
      width: 100%;
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo h1 {
      font-size: 3rem;
      font-weight: 900;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 3px;
      margin-bottom: 0.5rem;
    }

    .logo p {
      color: #718096;
      font-size: 1.1rem;
      font-weight: 600;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: #2d3748;
      font-weight: 600;
      font-size: 0.95rem;
    }

    .form-group input {
      width: 100%;
      padding: 0.9rem;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      font-family: 'Cairo', sans-serif;
      transition: all 0.3s ease;
      background: #f7fafc;
    }

    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      background: white;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }

    .form-group input::placeholder {
      color: #a0aec0;
    }

    .btn-login {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 700;
      font-family: 'Cairo', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
      margin-top: 1rem;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .error-message {
      background: #fed7d7;
      color: #c53030;
      padding: 0.8rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      text-align: center;
      font-weight: 600;
      display: none;
    }

    .error-message.show {
      display: block;
      animation: shake 0.5s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    .back-link {
      text-align: center;
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid #e2e8f0;
    }

    .back-link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .back-link a:hover {
      color: #764ba2;
    }

    .security-badge {
      text-align: center;
      margin-top: 1.5rem;
      color: #718096;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    @media (max-width: 500px) {
      .login-container {
        padding: 2rem 1.5rem;
      }

      .logo h1 {
        font-size: 2.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <h1>TASKON</h1>
      <p>لوحة تحكم المنصة</p>
    </div>

    <div class="error-message" id="errorMessage">
      البريد الإلكتروني أو كلمة المرور غير صحيحة
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">📧 البريد الإلكتروني</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          placeholder="admin@example.com"
          required
          autocomplete="email"
        >
      </div>

      <div class="form-group">
        <label for="password">🔑 كلمة المرور</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          placeholder="••••••••"
          required
          autocomplete="current-password"
        >
      </div>

      <button type="submit" class="btn-login">
        تسجيل الدخول 🚀
      </button>

      <div class="security-badge">
        🔒 تسجيل دخول آمن ومشفر
      </div>
    </form>

    <div class="back-link">
      <a href="platform-landing.html">← العودة للصفحة الرئيسية</a>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:4000';

    // التحقق من تسجيل الدخول المسبق
    if (localStorage.getItem('platformAdmin')) {
      window.location.replace('admin-dashboard.html');
      throw new Error('Already logged in');
    }

    const loginForm = document.getElementById('loginForm');
    const errorMessage = document.getElementById('errorMessage');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      // إخفاء رسالة الخطأ
      errorMessage.classList.remove('show');

      try {
        const response = await fetch(`${API_URL}/platform/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (data.success) {
          // حفظ بيانات المسؤول
          localStorage.setItem('platformAdmin', JSON.stringify(data.admin));
          
          console.log('✅ تم تسجيل الدخول بنجاح:', data.admin.name);
          
          // توجيه للوحة التحكم
          window.location.replace('admin-dashboard.html');
        } else {
          // عرض رسالة الخطأ
          errorMessage.textContent = data.message || 'البريد الإلكتروني أو كلمة المرور غير صحيحة';
          errorMessage.classList.add('show');
        }
      } catch (err) {
        console.error('خطأ في تسجيل الدخول:', err);
        errorMessage.textContent = '❌ حدث خطأ في الاتصال بالسيرفر';
        errorMessage.classList.add('show');
      }
    });
  </script>
</body>
</html>
