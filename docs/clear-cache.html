<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>مسح الـ Cache</title>
  <style>
    body {
      font-family: 'Cairo', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin: 0;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      text-align: center;
      max-width: 500px;
    }
    h1 {
      color: #1a3b50;
      margin-bottom: 20px;
    }
    button {
      background: #2e8ca3;
      color: white;
      border: none;
      padding: 15px 30px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin: 10px;
      transition: all 0.3s;
    }
    button:hover {
      background: #1a3b50;
      transform: scale(1.05);
    }
    .status {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      display: none;
    }
    .status.success {
      background: #d4edda;
      color: #155724;
      display: block;
    }
    .status.info {
      background: #d1ecf1;
      color: #0c5460;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔧 إصلاح مشكلة Refresh المستمر</h1>
    <p>إذا كانت الصفحات تعمل refresh مستمر، اضغط الأزرار التالية:</p>
    
    <button onclick="clearStorage()">1️⃣ مسح localStorage</button>
    <button onclick="clearSessionStorage()">2️⃣ مسح sessionStorage</button>
    <button onclick="clearAllCaches()">3️⃣ مسح Cache</button>
    <button onclick="clearAll()">🚀 مسح كل شيء</button>
    
    <div id="status" class="status"></div>
    
    <hr style="margin: 30px 0;">
    
    <a href="login.html" style="color: #2e8ca3; text-decoration: none; font-weight: bold;">
      ← الذهاب لصفحة تسجيل الدخول
    </a>
  </div>

  <script>
    const statusDiv = document.getElementById('status');
    
    function showStatus(message, type = 'success') {
      statusDiv.textContent = message;
      statusDiv.className = `status ${type}`;
      setTimeout(() => {
        statusDiv.style.display = 'none';
      }, 3000);
    }
    
    function clearStorage() {
      localStorage.clear();
      showStatus('✅ تم مسح localStorage بنجاح!');
    }
    
    function clearSessionStorage() {
      sessionStorage.clear();
      showStatus('✅ تم مسح sessionStorage بنجاح!');
    }
    
    async function clearAllCaches() {
      if ('caches' in window) {
        const cacheNames = await caches.keys();
        await Promise.all(cacheNames.map(name => caches.delete(name)));
        showStatus('✅ تم مسح جميع الـ Caches بنجاح!');
      } else {
        showStatus('⚠️ المتصفح لا يدعم Cache API', 'info');
      }
    }
    
    async function clearAll() {
      localStorage.clear();
      sessionStorage.clear();
      if ('caches' in window) {
        const cacheNames = await caches.keys();
        await Promise.all(cacheNames.map(name => caches.delete(name)));
      }
      showStatus('✅ تم مسح كل شيء بنجاح! يمكنك الآن تسجيل الدخول.');
      
      // إعادة توجيه تلقائي بعد 2 ثانية
      setTimeout(() => {
        window.location.replace('login.html');
      }, 2000);
    }
  </script>
</body>
</html>
