<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المشروع | سعيد أحمد بالبيد</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary-color: #2e8ca3;
      --primary-dark: #1a6a7e;
      --primary-light: #4da9c2;
      --secondary-color: #f8f9fa;
      --accent-color: #ff6b6b;
      --text-dark: #1a3b50;
      --text-light: #6c757d;
      --border-color: #dee2e6;
      --success-color: #28a745;
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      --transition: all 0.3s ease;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Cairo', Arial, sans-serif;
      background: #f5f9fb;
      color: var(--text-dark);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 80px;
    }

    #mainNavbarContainer {
      width: 100%;
      position: fixed;
      top: 0;
      right: 0;
      left: 0;
      z-index: 1000;
      box-shadow: var(--shadow);
    }

    .tabs-container {
      width: 100%;
      background: white;
      padding: 0.5rem 1rem;
      box-shadow: var(--shadow);
      position: sticky;
      top: 80px;
      z-index: 999;
    }

    .tabs-bar {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      max-width: 1400px;
      margin: 0 auto;
    }

    .main-tab-btn {
      background: transparent;
      color: var(--text-dark);
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      padding: 0.6rem 1.2rem;
      cursor: pointer;
      font-weight: 600;
      transition: var(--transition);
      position: relative;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .main-tab-btn:hover {
      background: #f0f6f9;
      color: var(--primary-color);
    }

    .main-tab-btn.active {
      background: var(--primary-color);
      color: white;
    }

    .main-tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -0.5rem;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 8px solid var(--primary-color);
    }

    .main-content-area {
      width: 95%;
      max-width: 1400px;
      margin: 1.5rem auto 2rem;
      background: #fff;
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 2rem;
      min-height: 500px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 2px solid #f0f6f9;
    }

    .section-title {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--primary-color);
    }

    .btn {
      padding: 0.6rem 1.5rem;
      border-radius: 8px;
      border: none;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.95rem;
    }

    .btn-primary {
      background: var(--primary-color);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
    }

    .btn-danger {
      background: var(--accent-color);
      color: white;
    }

    .btn-danger:hover {
      background: #ff5252;
    }

    .search-box {
      padding: 0.6rem 1rem;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 0.95rem;
      width: 240px;
      transition: var(--transition);
    }

    .search-box:focus {
      outline: none;
      border-color: var(--primary-light);
      box-shadow: 0 0 0 3px rgba(46, 140, 163, 0.1);
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      border-radius: 10px;
      overflow: hidden;
    }

    .data-table th {
      background: #f8f9fa;
      padding: 0.9rem;
      text-align: right;
      font-weight: 700;
      color: var(--text-dark);
      border-bottom: 2px solid var(--border-color);
    }

    .data-table td {
      padding: 0.9rem;
      border-bottom: 1px solid var(--border-color);
    }

    .data-table tr:last-child td {
      border-bottom: none;
    }

    .data-table tr:hover {
      background: #f8f9fa;
    }

    .action-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      margin: 0 0.2rem;
      transition: var(--transition);
    }

    .edit-btn {
      color: var(--primary-color);
    }

    .edit-btn:hover {
      color: var(--primary-dark);
    }

    .delete-btn {
      color: var(--accent-color);
    }

    .delete-btn:hover {
      color: #ff5252;
    }

    /* Modal Styles */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .modal-content {
      background: white;
      border-radius: 14px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
      width: 100%;
      max-width: 500px;
      padding: 2rem;
      position: relative;
      animation: modalFadeIn 0.3s;
    }

    @keyframes modalFadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .modal-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--primary-color);
    }

    .close-modal {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--text-light);
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    .form-label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: var(--text-dark);
    }

    .form-control {
      width: 100%;
      padding: 0.8rem;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 1rem;
      transition: var(--transition);
    }

    .form-control:focus {
      outline: none;
      border-color: var(--primary-light);
      box-shadow: 0 0 0 3px rgba(46, 140, 163, 0.1);
    }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.8rem;
      margin-top: 1.5rem;
    }

    /* Reports Section */
    .reports-container {
      background: #f8f9fa;
      border-radius: 16px;
      padding: 2rem;
      margin-top: 1.5rem;
    }

    .reports-header {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--primary-color);
      margin-bottom: 1rem;
    }

    .reports-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
      margin-top: 1.5rem;
    }

    .report-card {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: var(--shadow);
      transition: var(--transition);
    }

    .report-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
    }

    .report-title {
      font-weight: 700;
      color: var(--primary-color);
      margin-bottom: 1rem;
      font-size: 1.1rem;
    }

    .chart-container {
      height: 250px;
      margin-top: 1rem;
    }

    /* Progress Section */
    .progress-container {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      margin: 2rem 0;
    }

    .progress-percentage {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--primary-color);
      margin: 1rem 0;
    }

    /* Responsive Design */
    @media (max-width: 1200px) {
      .main-content-area {
        width: 97%;
        padding: 1.5rem;
      }
    }

    @media (max-width: 992px) {
      .tabs-bar {
        justify-content: flex-start;
        overflow-x: auto;
        padding-bottom: 0.5rem;
      }
      
      .section-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 1rem;
      }
      
      .reports-grid {
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      }
    }

    @media (max-width: 768px) {
      body {
        padding-top: 70px;
      }
      
      .main-tab-btn {
        padding: 0.5rem 1rem;
        font-size: 0.85rem;
      }
      
      .main-content-area {
        padding: 1.2rem;
        border-radius: 12px;
      }
      
      .section-title {
        font-size: 1.4rem;
      }
      
      .btn {
        padding: 0.5rem 1.2rem;
        font-size: 0.9rem;
      }
      
      .data-table {
        font-size: 0.9rem;
      }
      
      .data-table th, 
      .data-table td {
        padding: 0.7rem;
      }
    }

    @media (max-width: 576px) {
      .tabs-bar {
        gap: 0.3rem;
      }
      
      .main-tab-btn {
        padding: 0.4rem 0.8rem;
        font-size: 0.8rem;
      }
      
      .search-box {
        width: 100%;
        margin-top: 0.5rem;
      }
      
      .reports-grid {
        grid-template-columns: 1fr;
      }
      
      .modal-content {
        padding: 1.5rem;
      }
    }

    /* Utility Classes */
    .text-center {
      text-align: center;
    }
    
    .mt-1 { margin-top: 0.5rem; }
    .mt-2 { margin-top: 1rem; }
    .mt-3 { margin-top: 1.5rem; }
    .mb-1 { margin-bottom: 0.5rem; }
    .mb-2 { margin-bottom: 1rem; }
    .mb-3 { margin-bottom: 1.5rem; }
    
    .d-flex {
      display: flex;
    }
    
    .align-center {
      align-items: center;
    }
    
    .justify-between {
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <div id="mainNavbarContainer"></div>
  
  <div class="tabs-container">
    <div class="tabs-bar">
      <button class="main-tab-btn active" data-tab="project">
        <i class="fas fa-project-diagram"></i> بيانات المشروع
      </button>
      <button class="main-tab-btn" data-tab="contracts">
        <i class="fas fa-file-contract"></i> ملاحق العقود
      </button>
      <button class="main-tab-btn" data-tab="supplies">
        <i class="fas fa-truck-loading"></i> ملاحق التوريدات
      </button>
      <button class="main-tab-btn" data-tab="extracts">
        <i class="fas fa-file-invoice-dollar"></i> المستخلصات
      </button>
      <button class="main-tab-btn" data-tab="letters">
        <i class="fas fa-envelope"></i> الخطابات
      </button>
      <button class="main-tab-btn" data-tab="estimates">
        <i class="fas fa-calculator"></i> المقايسات
      </button>
      <button class="main-tab-btn" data-tab="reports">
        <i class="fas fa-chart-bar"></i> التقارير
      </button>
    </div>
  </div>

  <div class="main-content-area" id="mainContentArea">
    <!-- سيتم تحميل المحتوى هنا ديناميكيًا -->
  </div>

  <!-- Modal Templates -->
  <div class="modal" id="contractModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title"><i class="fas fa-file-contract"></i> إدراج ملحق عقد</h3>
        <button class="close-modal">&times;</button>
      </div>
      <form id="contractForm">
        <div class="form-group">
          <label class="form-label">اسم ملحق العقد</label>
          <input type="text" name="addonName" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">قيمة ملحق العقد</label>
          <input type="number" name="addonValue" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">ملحق العقد (PDF)</label>
          <input type="file" name="addonPdf" class="form-control" accept="application/pdf" required>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-danger" id="closeContractModalBtn">إلغاء</button>
          <button type="submit" class="btn btn-primary">حفظ</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal" id="supplyModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title"><i class="fas fa-truck-loading"></i> إدراج ملحق توريد</h3>
        <button class="close-modal">&times;</button>
      </div>
      <form id="supplyForm">
        <div class="form-group">
          <label class="form-label">اسم ملحق التوريد</label>
          <input type="text" name="addonName" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">قيمة ملحق التوريد</label>
          <input type="number" name="addonValue" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">ملحق التوريد (PDF)</label>
          <input type="file" name="addonPdf" class="form-control" accept="application/pdf" required>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-danger" id="closeSupplyModalBtn">إلغاء</button>
          <button type="submit" class="btn btn-primary">حفظ</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal" id="extractModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title"><i class="fas fa-file-invoice-dollar"></i> إدراج مستخلص</h3>
        <button class="close-modal">&times;</button>
      </div>
      <form id="extractForm">
        <div class="form-group">
          <label class="form-label">رقم المستخلص</label>
          <input type="text" name="extractNumber" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">تاريخ المستخلص</label>
          <input type="date" name="extractDate" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">قيمة المستخلص</label>
          <input type="number" name="extractValue" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">ملف المستخلص (PDF)</label>
          <input type="file" name="extractPdf" class="form-control" accept="application/pdf" required>
        </div>
        <div class="form-group">
          <label class="form-label">ملف المستخلص (Excel)</label>
          <input type="file" name="extractExcel" class="form-control" accept=".xlsx,.xls" required>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-danger" id="closeExtractModalBtn">إلغاء</button>
          <button type="submit" class="btn btn-primary">حفظ</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal" id="letterModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title"><i class="fas fa-envelope"></i> إدراج خطاب</h3>
        <button class="close-modal">&times;</button>
      </div>
      <form id="letterForm">
        <div class="form-group">
          <label class="form-label">بيان الخطاب</label>
          <input type="text" name="statement" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">التاريخ</label>
          <input type="date" name="date" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">موجه إلى</label>
          <input type="text" name="to" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">الخطاب (PDF)</label>
          <input type="file" name="pdf" class="form-control" accept="application/pdf" required>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-danger" id="closeLetterModalBtn">إلغاء</button>
          <button type="submit" class="btn btn-primary">حفظ</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal" id="estimateModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title"><i class="fas fa-calculator"></i> إدراج مقايسة</h3>
        <button class="close-modal">&times;</button>
      </div>
      <form id="estimateForm">
        <div class="form-group">
          <label class="form-label">نموذج المبني</label>
          <input type="text" name="buildingModel" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">كود المبني</label>
          <input type="text" name="buildingCode" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">المكان</label>
          <input type="text" name="location" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">المقايسة (PDF)</label>
          <input type="file" name="estimatePdf" class="form-control" accept="application/pdf" required>
        </div>
        <div class="form-group">
          <label class="form-label">المقايسة (Excel)</label>
          <input type="file" name="estimateExcel" class="form-control" accept=".xlsx,.xls" required>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-danger" id="closeEstimateModalBtn">إلغاء</button>
          <button type="submit" class="btn btn-primary">حفظ</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // بيانات التطبيق
    const state = {
      contractAddons: [],
      suppliesAddons: [],
      extracts: [],
      letters: [],
      estimates: [],
      projectData: null,
      currentTab: 'project',
      searchValues: {
        contracts: '',
        supplies: '',
        extracts: '',
        letters: '',
        estimates: ''
      }
    };

    // تهيئة التطبيق
    document.addEventListener('DOMContentLoaded', function() {
      loadNavbar();
      initEventListeners();
      showTab('project');
    });

    // تحميل شريط التنقل
    function loadNavbar() {
      fetch('components/main-navbar.html')
        .then(res => res.text())
        .then(html => {
          document.getElementById('mainNavbarContainer').innerHTML = html;
          // معالجة أي scripts داخل navbar
          Array.from(document.getElementById('mainNavbarContainer').querySelectorAll('script')).forEach(oldScript => {
            const newScript = document.createElement('script');
            if (oldScript.src) {
              newScript.src = oldScript.src;
            } else {
              newScript.textContent = oldScript.textContent;
            }
            document.body.appendChild(newScript);
          });
        })
        .catch(err => console.error('Error loading navbar:', err));
    }

    // إعداد مستمعي الأحداث
    function initEventListeners() {
      // أحداث أزرار التبويب
      document.querySelectorAll('.main-tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const tab = btn.getAttribute('data-tab');
          showTab(tab);
        });
      });

      // أحداث إغلاق النماذج
      document.querySelectorAll('.close-modal, .btn-danger').forEach(btn => {
        btn.addEventListener('click', closeAllModals);
      });

      // أحداث إغلاق النماذج بالنقر خارجها
      document.querySelectorAll('.modal').forEach(modal => {
        modal.addEventListener('click', (e) => {
          if (e.target === modal) closeAllModals();
        });
      });

      // أحداث إرسال النماذج
      document.getElementById('contractForm').addEventListener('submit', handleContractSubmit);
      document.getElementById('supplyForm').addEventListener('submit', handleSupplySubmit);
      document.getElementById('extractForm').addEventListener('submit', handleExtractSubmit);
      document.getElementById('letterForm').addEventListener('submit', handleLetterSubmit);
      document.getElementById('estimateForm').addEventListener('submit', handleEstimateSubmit);
    }

    // إظهار تبويب معين
    function showTab(tabName) {
      state.currentTab = tabName;
      
      // تحديث حالة أزرار التبويب
      document.querySelectorAll('.main-tab-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      document.querySelector(`.main-tab-btn[data-tab="${tabName}"]`).classList.add('active');
      
      // تحميل محتوى التبويب
      switch(tabName) {
        case 'project':
          renderProjectTab();
          break;
        case 'contracts':
          renderContractsTab();
          break;
        case 'supplies':
          renderSuppliesTab();
          break;
        case 'extracts':
          renderExtractsTab();
          break;
        case 'letters':
          renderLettersTab();
          break;
        case 'estimates':
          renderEstimatesTab();
          break;
        case 'reports':
          renderReportsTab();
          break;
      }
    }

    // عرض محتوى تبويب المشروع
    function renderProjectTab() {
      if (!state.projectData) {
        document.getElementById('mainContentArea').innerHTML = `
          <div class="section-header">
            <h2 class="section-title"><i class="fas fa-project-diagram"></i> بيانات المشروع</h2>
          </div>
          <form id="projectForm" class="project-form">
            <div class="d-flex justify-between" style="gap: 1.5rem; flex-wrap: wrap;">
              <div class="form-group" style="flex: 1; min-width: 300px;">
                <label class="form-label">اسم المشروع</label>
                <input type="text" name="projectName" class="form-control" required>
              </div>
              <div class="form-group" style="flex: 1; min-width: 300px;">
                <label class="form-label">مكان المشروع</label>

            contractValue: formData.get('contractValue'),
            pdfName: formData.get('contractPdf').name || ''
          };
          renderProjectTab();
        });
      } else {
        const progress = calculateProjectProgress();
        document.getElementById('mainContentArea').innerHTML = `
          <div class="section-header">
            <h2 class="section-title"><i class="fas fa-project-diagram"></i> بيانات المشروع</h2>

            </button>

                  <span>${state.projectData.name}</span>
                </div>
                <div class="d-flex justify-between mb-2">
                  <strong>مكان المشروع:</strong>
                  <span>${state.projectData.location}</span>
                </div>
                <div class="d-flex justify-between mb-2">

                  <span>${state.projectData.startDate}</span>

                </div>

                  <strong>عقد المشروع (PDF):</strong>
                  <span>${state.projectData.pdfName || '—'}</span>
                </div>
              </div>
            </div>

                <div class="progress-percentage">${progress}%</div>
                <canvas id="progressChart" width="200" height="200"></canvas>
                <div class="mt-2">
                  <p>قيمة المستخلصات: <strong>${calculateTotalExtracts()} ريال</strong></p>
                </div>
              </div>
            </div>
          </div>
        `;
        
        // رسم مخطط التقدم
        setTimeout(() => {
          const ctx = document.getElementById('progressChart').getContext('2d');
          new Chart(ctx, {
            type: 'doughnut',
            data: {
              labels: ['منجز', 'متبقي'],
              datasets: [{
                data: [progress, 100 - progress],
                backgroundColor: ['#2e8ca3', '#e9f2f6'],
                borderWidth: 0
              }]
            },
            options: {
              cutout: '70%',
              plugins: {
                legend: { display: false },
                tooltip: { enabled: false }

            }

          renderProjectTab();
        });
      }

    // حساب تقدم المشروع
    function calculateProjectProgress() {
      if (!state.projectData || !state.extracts.length) return 0;
      const totalExtracts = state.extracts.reduce((sum, e) => sum + Number(e.value || 0), 0);
      const contractValue = Number(state.projectData.contractValue || 0);
      if (!contractValue) return 0;
      return Math.min(100, Math.round((totalExtracts / contractValue) * 100));
    }

    // حساب إجمالي المستخلصات
    function calculateTotalExtracts() {
      return state.extracts.reduce((sum, e) => sum + Number(e.value || 0), 0);
    }
