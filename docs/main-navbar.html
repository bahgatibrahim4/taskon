<!-- شريط علوي ثابت قابل للإدراج في كل الصفحات -->
<div class="navbar">
  <span class="navbar-taskon">
    TASKON
    <span id="navbarMenuIcon" style="cursor:pointer; margin-right:8px; font-size:1.18em; vertical-align:middle;" title="القائمة">
      &#9776;
    </span>
    <div id="navbarMenuDropdown" style="display:none; position:absolute; right:10px; top:38px; background:#fff; color:#1a3b50; border:1.5px solid #2e8ca3; border-radius:10px; box-shadow:0 2px 12px #0002; min-width:170px; z-index:10000; font-size:1.01em; text-align:right;">
      <!-- سيتم تعبئة القائمة ديناميكياً -->
    </div>
  </span>
  سعيد أحمد بالبيد
  <span class="user-info" id="userInfo">
    <img src="https://www.gravatar.com/avatar/?d=mp&s=60" alt="user" class="user-avatar" id="userAvatar">
    <span class="user-name" id="userName"></span>
    <button id="logoutBtn">تسجيل الخروج</button>
  </span>
</div>
<style>
  .navbar {
    background: #1a3b50;
    color: #fff;
    padding: 2px 0 1px 0;
    text-align: center;
    font-size: 1.05rem;
    font-weight: 900;
    letter-spacing: 2px;
    box-shadow: 0 2px 18px #1a3b5022;
    border-radius: 0;
    border-bottom: 3px solid #2e8ca3;
    margin-bottom: 40px;
    position: relative;
    z-index: 2;
    min-height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .navbar .user-info {
    position: absolute;
    left: 16px;
    right: auto;
    top: 50%;
    transform: translateY(-50%);
    justify-content: flex-start;
    gap: 10px;
    padding: 0;
    height: auto;
  }
  .user-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #bbb;
    display: inline-block;
    vertical-align: middle;
    object-fit: cover;
    cursor: pointer;
    transition: box-shadow 0.2s;
  }
  .user-avatar:hover {
    box-shadow: 0 0 0 2px #2e8ca3;
  }
  .user-name {
    font-size: 0.93rem;
    font-weight: 500;
    color: #fff;
    margin-right: 6px;
    vertical-align: middle;
    display: inline-block;
    letter-spacing: 0.3px;
    font-family: 'Cairo', Arial, sans-serif;
    text-shadow: 0 1px 6px #0002;
    transition: color 0.2s;
    display: inline-block !important;
  }
  .user-avatar:hover + .user-name {
    color: #2e8ca3;
  }
  #logoutBtn {
    display: none;
    color: #2e8ca3;
    font-size: 0.78rem;
    font-weight: 600;
    margin-top: 2px;
    cursor: pointer;
    background: #fff;
    border: none;
    padding: 3px 10px;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    top: 110%;
    white-space: nowrap;
    z-index: 10;
    border-radius: 8px;
    box-shadow: 0 2px 12px #2e8ca322;
    border: 1.2px solid #2e8ca3;
    transition: background 0.2s, color 0.2s;
    font-family: 'Cairo', Arial, sans-serif;
    letter-spacing: 0.3px;
    text-shadow: 0 1px 8px #2e8ca322, 0 1px 6px #0001;
  }
  #logoutBtn:hover {
    background: #2e8ca3;
    color: #fff;
  }
  .show-logout #logoutBtn {
    display: block;
    animation: fadeIn 0.2s;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateX(-50%) translateY(10px);}
    to { opacity: 1; transform: translateX(-50%) translateY(0);}
  }
  .navbar-taskon {
    position: absolute;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'Cairo', Arial, sans-serif;
    font-size: 1.08rem;
    font-weight: 800;
    color: #fff;
    letter-spacing: 2px;
    background: transparent;
    padding: 2px 14px 2px 10px;
    border-radius: 10px;
    box-shadow: none;
    border: none;
    z-index: 10;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  #navbarMenuDropdown {
    /* already styled inline, but you can add more here if needed */
    background: #fff;
    color: #1a3b50;
    border: 1.2px solid #2e8ca3;
    border-radius: 12px;
    box-shadow: 0 4px 24px #0001;
    min-width: 140px;
    padding: 4px 0;
    z-index: 10000;
    font-size: 0.93em;
    text-align: right;
    font-family: 'Tajawal', 'Cairo', Arial, sans-serif;
    margin-top: 2px;
  }
  #navbarMenuDropdown a {
    display: block;
    padding: 7px 16px 7px 8px;
    color: #1976d2;
    text-decoration: none;
    border-bottom: 1px solid #f0f0f0;
    transition: background 0.16s, color 0.16s, font-size 0.16s;
    font-family: 'Tajawal', 'Cairo', Arial, sans-serif;
    font-size: 0.93em;
    cursor: pointer;
    border-radius: 6px;
    margin: 0 4px;
    font-weight: 600;
    letter-spacing: 0.2px;
  }
  #navbarMenuDropdown a:last-child {
    border-bottom: none;
  }
  #navbarMenuDropdown a:hover {
    background: #e3f2fd;
    color: #2e8ca3;
    font-size: 1em;
  }
  /* Responsive styles from index.html */
  @media (max-width: 600px) {
    .navbar { font-size: 1rem; padding: 3px 0 2px 0; border-radius: 0 0 14px 14px; min-height: 22px; }
    .navbar .user-info { left: 4px; font-size: 0.92rem; padding: 2px 6px; height: 22px; }
  }
</style>
<script>
  // حماية الصفحة
  if (!localStorage.getItem('user')) {
    window.location.href = 'login.html';
  }

  // دالة لتحديث اسم المستخدم في الشريط العلوي
  function updateNavbarUserName() {
    // تأكد من وجود العنصر
    var userNameSpan = document.getElementById('userName');
    if (!userNameSpan) return;
    // جلب بيانات المستخدم من localStorage
    var userStr = localStorage.getItem('user');
    var username = '';
    if (userStr) {
      try {
        var userObj = JSON.parse(userStr);
        username = userObj.username || '';
      } catch (e) {
        username = '';
      }
    }
    // تحديث النص
    userNameSpan.textContent = username;
    // إذا لم يوجد اسم، أخفِ العنصر
    userNameSpan.style.display = username ? 'inline-block' : 'none';
  }

  // دالة تفعيل زر تسجيل الخروج وإظهار القائمة
  function setupNavbarLogout() {
    const userAvatar = document.getElementById('userAvatar');
    const userInfo = document.getElementById('userInfo');
    const logoutBtn = document.getElementById('logoutBtn');
    if (userAvatar && userInfo && logoutBtn) {
      userAvatar.onclick = function(e) {
        e.stopPropagation();
        userInfo.classList.toggle('show-logout');
      };
      document.addEventListener('click', function(e) {
        if (!userInfo.contains(e.target)) {
          userInfo.classList.remove('show-logout');
        }
      });
      logoutBtn.onclick = function() {
        localStorage.removeItem('user');
        window.location.href = 'login.html';
      };
    }
  }

  // قائمة الصفحات (يمكنك تعديلها حسب صفحاتك في index.html)
  const NAVBAR_PAGES = [
    { name: "الرئيسية", href: "index.html" },
    { name: "المستخلصات", href: "extracts.html" },
    { name: "المقاولون", href: "contractors.html" },
    { name: "الموردين", href: "suppliers.html" },
    { name: "المخزن", href: "store.html" },
    { name: "العمال", href: "workers.html" },
    { name: "المعدات", href: "equipment.html" },
    { name: "التوريدات", href: "deliveries.html" },
    { name: "المشتريات", href: "purchases.html" },
    { name: "المستخدمون", href: "users.html" }
    // أضف أو عدل حسب صفحاتك
  ];

  // منطق القائمة المنسدلة
  function setupNavbarMenuDropdown() {
    const icon = document.getElementById('navbarMenuIcon');
    const dropdown = document.getElementById('navbarMenuDropdown');
    if (!icon || !dropdown) return;

    // تعبئة القائمة بخط صغير وأنيق
    dropdown.innerHTML = NAVBAR_PAGES.map(page =>
      `<a href="${page.href}">${page.name}</a>`
    ).join('');

    icon.onclick = function(e) {
      e.stopPropagation();
      dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
    };

    // إغلاق عند الضغط خارج القائمة
    document.addEventListener('click', function(e) {
      if (dropdown.style.display === 'block' && !dropdown.contains(e.target) && e.target !== icon) {
        dropdown.style.display = 'none';
      }
    });
  }

  // نفذ عند التحميل (سواء تم إدراج الشريط مباشرة أو ديناميكياً)
  function initMainNavbar() {
    updateNavbarUserName();
    setupNavbarLogout();
    setupNavbarMenuDropdown();
  }

  // نفذ مباشرة إذا تم تحميل الشريط كصفحة مستقلة
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initMainNavbar);
  } else {
    initMainNavbar();
  }

  // إذا تم إدراج الشريط ديناميكياً من صفحة أخرى، يمكن استدعاء window.initMainNavbar()
  window.initMainNavbar = initMainNavbar;
</script>
</script>
