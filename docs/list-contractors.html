<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>عرض المقاولين | سعيد أحمد بالبيد</title>
  <!-- إضافة خط Tajawal من Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      direction: rtl;
      --primary-color: #1a3b50;
      --secondary-color: #2e8ca3;
      --accent-color: #7a5230;
      --light-color: #c5d6db;
      --text-color: #333;
      --white: #fff;
    }
    body {
      margin: 0;
      font-family: 'Tajawal', 'Cairo', sans-serif;
      background: #f5f9fa;
      color: var(--text-color);
    }
    
    /* تحسينات الشريط العلوي */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(135deg, var(--primary-color) 0%, #2a4b63 100%);
      color: var(--white);
      font-size: 1.18rem;
      font-weight: bold;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
      letter-spacing: 0.5px;
      min-height: 65px;
      padding: 0 24px;
      position: relative;
      z-index: 100;
    }
    .navbar::after {
      content: '';
      position: absolute;
      bottom: 0;
      right: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, var(--secondary-color) 0%, var(--accent-color) 100%);
    }
    .navbar-section {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .nav-btn {
      background: var(--white);
      color: var(--secondary-color);
      border: 2px solid var(--secondary-color);
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      padding: 8px 20px;
      border-radius: 6px;
      transition: all 0.3s ease;
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.1);
    }
    .nav-btn:hover {
      background: var(--secondary-color);
      color: var(--white);
      transform: translateY(-2px);
      box-shadow: 0 5px 12px rgba(0, 0, 0, 0.15);
    }
    #username {
      font-size: 1.05rem;
      font-weight: bold;
      margin-left: 8px;
      color: var(--white);
      background: var(--secondary-color);
      padding: 6px 16px;
      border-radius: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      font-family: 'Tajawal', 'Cairo', sans-serif;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #username::before {
      content: "👤";
      font-size: 0.9em;
    }
    .logout-btn {
      background: var(--accent-color);
      color: var(--white);
      border: none;
      border-radius: 6px;
      padding: 8px 20px;
      font-weight: bold;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.3s ease;
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.1);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .logout-btn::before {
      content: "🚪";
      font-size: 0.9em;
    }
    .logout-btn:hover {
      background: #8c6b4d;
      transform: translateY(-2px);
      box-shadow: 0 5px 12px rgba(0, 0, 0, 0.15);
    }
    
    /* تحسينات المحتوى الرئيسي */
    .container {
      max-width: 900px;
      margin: 20px auto;
      background: var(--white);
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
      padding: 30px;
      border: 1px solid #e0e6eb;
      position: relative;
    }
    h2 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 30px;
      color: var(--secondary-color);
      font-size: 1.5rem;
      font-weight: 800;
      position: relative;
      padding-bottom: 15px;
    }
    h2::after {
      content: '';
      position: absolute;
      bottom: 0;
      right: 50%;
      transform: translateX(50%);
      width: 80px;
      height: 3px;
      background: linear-gradient(90deg, var(--secondary-color) 0%, var(--accent-color) 100%);
      border-radius: 3px;
    }
    
    /* تحسينات مربع البحث */
    #searchBox {
      width: 70%;
      margin: 0 auto 25px auto;
      display: block;
      padding: 12px 18px;
      font-size: 1rem;
      border: 1.5px solid var(--secondary-color);
      border-radius: 8px;
      background: var(--white);
      color: var(--text-color);
      font-family: inherit;
      transition: all 0.3s ease;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }
    #searchBox:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 3px 12px rgba(46, 140, 163, 0.15);
    }
    #searchBox::placeholder {
      color: #a0aec0;
    }
    
    /* تحسينات زر التصدير */
    #exportExcelBtn {
      display: block;
      margin: 0 auto 25px auto;
      background: var(--secondary-color);
      color: var(--white);
      border: none;
      padding: 10px 22px;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.3s ease;
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.1);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #exportExcelBtn::before {
      content: "📊";
    }
    #exportExcelBtn:hover {
      background: #3a9cb4;
      transform: translateY(-2px);
      box-shadow: 0 5px 12px rgba(0, 0, 0, 0.15);
    }
    
    /* تحسينات الجدول */
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      background: var(--white);
      margin-top: 10px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
    }
    th, td {
      padding: 12px 10px;
      border-bottom: 1px solid #e2e8f0;
      text-align: right;
      font-size: 0.95rem;
      background: var(--white);
      transition: background 0.2s;
    }
    th {
      background: var(--secondary-color);
      color: var(--white);
      font-weight: 700;
      font-size: 1rem;
      padding: 14px 10px;
      position: relative;
    }
    th::after {
      content: '';
      position: absolute;
      bottom: 0;
      right: 0;
      width: 100%;
      height: 2px;
      background: var(--accent-color);
    }
    tr:hover td {
      background: #f8fafc;
    }
    tr:last-child td {
      border-bottom: none;
    }
    
    /* تحسينات أزرار التعديل والحذف */
    .edit-btn, .delete-btn {
      border: none;
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s ease;
      min-width: 65px;
    }
    .edit-btn {
      background: var(--secondary-color);
      color: var(--white);
      box-shadow: 0 2px 6px rgba(46, 140, 163, 0.2);
    }
    .edit-btn:hover {
      background: #3a9cb4;
      transform: translateY(-1px);
      box-shadow: 0 4px 8px rgba(46, 140, 163, 0.3);
    }
    .delete-btn {
      background: var(--accent-color);
      color: var(--white);
      box-shadow: 0 2px 6px rgba(122, 82, 48, 0.2);
    }
    .delete-btn:hover {
      background: #8c6b4d;
      transform: translateY(-1px);
      box-shadow: 0 4px 8px rgba(122, 82, 48, 0.3);
    }
    
    /* تحسينات نافذة التعديل */
    #editContractorModal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    #editContractorModal .modal-content {
      background: var(--white);
      padding: 30px;
      border-radius: 12px;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      border: 1px solid #e0e6eb;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    #editContractorModal h3 {
      text-align: center;
      color: var(--secondary-color);
      margin-bottom: 20px;
      font-size: 1.3rem;
      font-weight: 700;
      position: relative;
      padding-bottom: 12px;
    }
    #editContractorModal h3::after {
      content: '';
      position: absolute;
      bottom: 0;
      right: 50%;
      transform: translateX(50%);
      width: 60px;
      height: 2px;
      background: var(--accent-color);
      border-radius: 2px;
    }
    #editContractorForm label {
      font-size: 1rem;
      color: var(--primary-color);
      font-weight: 600;
      margin-bottom: 6px;
      display: block;
    }
    #editContractorForm input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1.5px solid #e2e8f0;
      font-size: 1rem;
      margin-bottom: 18px;
      background: var(--white);
      transition: all 0.3s ease;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.03);
    }
    #editContractorForm input[type="text"]:focus {
      outline: none;
      border-color: var(--secondary-color);
      box-shadow: 0 3px 10px rgba(46, 140, 163, 0.15);
    }
    #editContractorForm .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 15px;
    }
    #editContractorForm button {
      padding: 10px 22px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      transition: all 0.3s ease;
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.1);
    }
    #editContractorForm button[type="submit"] {
      background: var(--secondary-color);
      color: var(--white);
    }
    #editContractorForm button[type="submit"]:hover {
      background: #3a9cb4;
      transform: translateY(-2px);
      box-shadow: 0 5px 12px rgba(0, 0, 0, 0.15);
    }
    #editContractorForm button[type="button"] {
      background: #94a3b8;
      color: var(--white);
    }
    #editContractorForm button[type="button"]:hover {
      background: #a0aec0;
      transform: translateY(-2px);
      box-shadow: 0 5px 12px rgba(0, 0, 0, 0.15);
    }
    
    /* تحسينات التجاوب */
    @media (max-width: 768px) {
      .navbar {
        padding: 0 15px;
        flex-direction: column;
        min-height: auto;
        padding: 10px;
      }
      .navbar-section {
        margin: 8px 0;
      }
      .container {
        padding: 20px 15px;
        margin: 15px;
      }
      #searchBox {
        width: 90%;
      }
      #editContractorModal .modal-content {
        padding: 20px 15px;
      }
      #editContractorForm .modal-actions {
        flex-direction: column;
      }
      th, td {
        padding: 10px 8px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <!-- باقي المحتوى يبقى كما هو دون تغيير -->
  <div id="navbar-container"></div>
  <div class="container">
    <h2>عرض المقاولين</h2>
    <!-- مربع البحث -->
    <input
      type="text"
      id="searchBox"
      placeholder="ابحث باسم المقاول أو بند العمل..."
    />
    <!-- زر تصدير إلى Excel -->
    <button id="exportExcelBtn">تصدير إلى Excel</button>
    <table>
      <thead>
        <tr>
          <th>م</th>
          <th>الاسم</th>
          <th>الهاتف</th>
          <th>بند العمل</th>
          <th>تعديل</th>
          <th>حذف</th>
        </tr>
      </thead>
      <tbody id="contractorsList"></tbody>
    </table>
    <!-- نافذة تعديل المقاول -->
    <div id="editContractorModal">
      <div class="modal-content">
        <h3>تعديل بيانات المقاول</h3>
        <form id="editContractorForm">
          <input type="hidden" name="id">
          <div>
            <label>الاسم:</label>
            <input type="text" name="name" required>
          </div>
          <div>
            <label>الهاتف:</label>
            <input type="text" name="phone" required>
          </div>
          <div>
            <label>بند العمل:</label>
            <input type="text" name="address">
          </div>
          <div class="modal-actions">
            <button type="submit">حفظ</button>
            <button type="button" id="cancelEditBtn">إلغاء</button>
          </div>
        </form>
      </div>
    </div>
  </div>
  
  <!-- باقي السكريبتات تبقى كما هي -->
  <script>
    // عرض اسم المستخدم
    let pageUser = JSON.parse(localStorage.getItem('user') || '{}');
    if (!pageUser.username) window.location.href = 'login.html';
    // تسجيل الخروج
    function logout() {
      localStorage.removeItem('user');
      window.location.href = 'login.html';
    }
    // إضافة اسم المستخدم إلى الشريط العلوي بنفس الخط
    document.addEventListener('DOMContentLoaded', function() {
      // انتظر حتى يتم تحميل الشريط العلوي
      setTimeout(function() {
        const usernameEl = document.getElementById('username');
        if (usernameEl && pageUser.username) {
          usernameEl.textContent = pageUser.username;
          usernameEl.style.fontFamily = "'Tajawal', 'Cairo', sans-serif";
        }
      }, 200);
    });

    let allContractors = [];

    async function fetchContractors() {
      const res = await fetch('/contractors');
      const contractors = await res.json();
      allContractors = contractors; // حفظ جميع المقاولين للبحث
      renderContractors(contractors);
    }

    function renderContractors(contractors) {
      const list = document.getElementById('contractorsList');
      list.innerHTML = '';
      let rowNum = 1;
      contractors.forEach((c) => {
        const tr = document.createElement('tr');
        tr.style.cursor = "pointer";
        tr.setAttribute('data-id', c._id);
        tr.innerHTML = `
          <td>${rowNum++}</td>
          <td>${c.name}</td>
          <td>${c.phone}</td>
          <td>${c.workItem || ''}</td>
          <td>
            <button class="edit-btn" data-id="${c._id}" onclick="event.stopPropagation();">تعديل</button>
          </td>
          <td>
            <button class="delete-btn" data-id="${c._id}" onclick="event.stopPropagation();">حذف</button>
          </td>
        `;
        // عند الضغط على الصف (وليس زر التعديل/الحذف) انتقل لصفحة المقاول
        tr.addEventListener('click', function(e) {
          // تجاهل الضغط على زر التعديل أو الحذف
          if (e.target.classList.contains('edit-btn') || e.target.classList.contains('delete-btn')) return;
          window.location.href = `contractor.html?id=${c._id}`;
        });
        list.appendChild(tr);
      });
    }

    // البحث في الاسم أو البند
    document.getElementById('searchBox').addEventListener('input', function() {
      const q = this.value.trim().toLowerCase();
      if (!q) {
        renderContractors(allContractors);
        return;
      }
      const filtered = allContractors.filter(c =>
        (c.name && c.name.toLowerCase().includes(q)) ||
        (c.workItem && c.workItem.toLowerCase().includes(q))
      );
      renderContractors(filtered);
    });

    // حذف مقاول
    document.addEventListener('click', async function(e) {
      if (e.target.classList.contains('delete-btn')) {
        if (confirm('هل أنت متأكد من حذف هذا المقاول؟')) {
          const id = e.target.getAttribute('data-id');
          await fetch(`/contractors/${id}`, { method: 'DELETE' });
          fetchContractors();
        }
      }
    });

    // تعديل مقاول (فتح النموذج)
    document.addEventListener('click', function(e) {
      if (e.target.classList.contains('edit-btn')) {
        const id = e.target.getAttribute('data-id');
        const tr = e.target.closest('tr');
        const tds = tr.querySelectorAll('td');
        // تعبئة النموذج بالبيانات الصحيحة
        const modal = document.getElementById('editContractorModal');
        modal.style.display = 'flex';
        const form = document.getElementById('editContractorForm');
        form.id.value = id;
        form.name.value = tds[1].textContent;    // اسم المقاول
        form.phone.value = tds[2].textContent;   // رقم التليفون
        form.address.value = tds[3].textContent; // بند العمل (الآن workItem)
      }
    });

    // حفظ التعديل
    document.getElementById('editContractorForm').onsubmit = async function(e) {
      e.preventDefault();
      const form = e.target;
      const id = form.id.value;
      const name = form.name.value;
      const phone = form.phone.value;
      const address = form.address.value;
      // تحقق من نجاح التعديل
      const res = await fetch(`/contractors/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, phone, address })
      });
      if (res.ok) {
        document.getElementById('editContractorModal').style.display = 'none';
        localStorage.setItem('contractor-updated', Date.now());
        fetchContractors();
      } else if (res.status === 404) {
        alert('المقاول غير موجود أو رقم المعرف غير صحيح');
      } else {
        alert('حدث خطأ أثناء تعديل المقاول');
      }
    };

    // زر إلغاء
    document.getElementById('cancelEditBtn').onclick = function() {
      document.getElementById('editContractorModal').style.display = 'none';
    };

    fetchContractors();
  </script>
  <!-- أضف مكتبة SheetJS قبل سكريبتاتك -->
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <script>
    // تصدير المقاولين إلى Excel
    document.getElementById('exportExcelBtn').onclick = function() {
      // إعداد البيانات
      const data = [
        ["م", "الاسم", "الهاتف", "بند العمل"]
      ];
      allContractors.forEach((c, i) => {
        data.push([
          i + 1,
          c.name,
          c.phone,
          c.workItem || ''
        ]);
      });
      // إنشاء ملف Excel
      const ws = XLSX.utils.aoa_to_sheet(data);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "المقاولين");
      XLSX.writeFile(wb, "contractors.xlsx");
    };
  </script>
  <script>
    // ربط الصفحة بالشريط العلوي وتنفيذ السكريبتات بداخله
    fetch('components/main-navbar.html')
      .then(res => res.text())
      .then(html => {
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = html;
        const scripts = tempDiv.querySelectorAll('script');
        scripts.forEach(s => s.parentNode.removeChild(s));
        document.getElementById('navbar-container').innerHTML = tempDiv.innerHTML;
        scripts.forEach(oldScript => {
          const newScript = document.createElement('script');
          if (oldScript.src) {
            newScript.src = oldScript.src;
          } else {
            newScript.textContent = oldScript.textContent;
          }
          document.body.appendChild(newScript);
        });
      });
  </script>
</body>
</html>
