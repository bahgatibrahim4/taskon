<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>عرض المقاولين | سعيد أحمد بالبيد</title>
  <style>
    body {
      margin: 0;
      font-family: 'Cairo', Arial, sans-serif;
      background: #c5d6db;
      direction: rtl;
    }
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1a3b50;
      color: #fff;
      font-size: 1.18rem;
      font-weight: bold;
      box-shadow: 0 2px 12px #0002;
      letter-spacing: 1px;
      min-height: 58px;
      padding: 0 24px;
      border-bottom: 3px solid #2e8ca3;
    }
    .navbar-section {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .nav-btn {
      background: #fff;
      color: #2e8ca3;
      border: 2px solid #2e8ca3;
      font-size: 1.08rem;
      font-weight: bold;
      cursor: pointer;
      padding: 7px 18px;
      border-radius: 0px;
      transition: background 0.2s, color 0.2s, border 0.2s;
      box-shadow: 0 2px 10px #0001;
    }
    .nav-btn:hover {
      background: #1a3b50;
      color: #fff;
      border-color: #2e8ca3;
    }
    #username {
      font-size: 1.08rem;
      font-weight: bold;
      margin-left: 8px;
      color: #fff;
      background: #2e8ca3;
      padding: 4px 14px;
      border-radius: 0px;
      box-shadow: 0 1px 6px #0001;
    }
    .logout-btn {
      background: #7a5230;
      color: #fff;
      border: none;
      border-radius: 0px;
      padding: 7px 18px;
      font-weight: bold;
      cursor: pointer;
      font-size: 1.08rem;
      transition: background 0.2s;
      box-shadow: 0 2px 10px #0001;
    }
    .logout-btn:hover {
      background: #8c969a;
    }
    .container {
      max-width: 800px;
      margin: 24px auto 0 auto;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 0 24px #0002;
      padding: 38px 38px 28px 38px;
      border: 2px solid #8c969a;
      position: relative;
    }
    h2 {
      text-align: center;
      margin-bottom: 32px;
      color: #2e8ca3;
      letter-spacing: 1px;
      font-size: 1.35rem;
      font-weight: bold;
      border-bottom: 2px solid #7a5230;
      padding-bottom: 12px;
    }
    .back {
      display: block;
      margin: 0 auto 15px auto;
      text-align: center;
      color: #2e8ca3;
      text-decoration: underline;
      cursor: pointer;
      font-weight: bold;
      transition: color 0.2s;
    }
    .back:hover {
      color: #1a3b50;
    }
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      background: #c5d6db;
      margin-top: 10px;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: none;
    }
    th, td {
      padding: 4px 4px;
      border-bottom: 1px solid #8c969a;
      border-right: 1px solid #8c969a;
      text-align: right;
      font-size: 0.90rem;
      background: #fff;
      transition: background 0.18s;
      height: 26px;
    }
    th:last-child, td:last-child {
      border-right: none;
    }
    th {
      background: #2e8ca3;
      color: #fff;
      font-weight: bold;
      letter-spacing: 1px;
      font-size: 0.95rem;
      border-bottom: 2px solid #7a5230;
      box-shadow: none;
    }
    tr:last-child td {
      border-bottom: none;
    }
    tr:hover td {
      background: #f7fafd;
      transition: background 0.18s;
    }
    .edit-btn {
      background: #2e8ca3;
      color: #fff;
      border: none;
      border-radius: 0px;
      padding: 3px 10px;
      font-size: 0.92rem;
      cursor: pointer;
      font-weight: bold;
      margin-left: 0;
      margin-right: 0;
      transition: background 0.2s;
      box-shadow: none;
      min-width: 60px;
      height: 28px;
    }
    .edit-btn:hover {
      background: #1a3b50;
    }
    .delete-btn {
      background: #7a5230;
      color: #fff;
      border: none;
      border-radius: 0px;
      padding: 3px 10px;
      font-size: 0.92rem;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
      box-shadow: none;
      min-width: 60px;
      height: 24px;
    }
    .delete-btn:hover {
      background: #8c969a;
    }
    /* نافذة التعديل */
    #editContractorModal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: #0005;
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    #editContractorModal .modal-content {
      background: #fff;
      padding: 32px 24px;
      border-radius: 16px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 2px 24px #0003;
      border: 2px solid #2e8ca3;
      position: relative;
    }
    #editContractorModal h3 {
      text-align: center;
      color: #2e8ca3;
      margin-bottom: 18px;
      font-size: 1.15rem;
      font-weight: bold;
      border-bottom: 1.5px solid #7a5230;
      padding-bottom: 8px;
    }
    #editContractorForm label {
      font-size: 1.02rem;
      color: #2e8ca3;
      font-weight: bold;
      margin-bottom: 4px;
      display: block;
    }
    #editContractorForm input[type="text"] {
      width: 100%;
      padding: 7px 10px;
      border-radius: 0px;
      border: 1.5px solid #c5d6db;
      font-size: 1.05rem;
      margin-bottom: 12px;
      background: #f7fafd;
      transition: border 0.2s, background 0.2s;
    }
    #editContractorForm input[type="text"]:focus {
      border-color: #2e8ca3;
      background: #c5d6db;
    }
    #editContractorForm .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 10px;
    }
    #editContractorForm button {
      padding: 7px 18px;
      border-radius: 0px;
      font-weight: bold;
      font-size: 1.05rem;
      cursor: pointer;
      border: none;
      transition: background 0.2s, color 0.2s;
      box-shadow: 0 2px 8px #0001;
    }
    #editContractorForm button[type="submit"] {
      background: #2e8ca3;
      color: #fff;
    }
    #editContractorForm button[type="submit"]:hover {
      background: #1a3b50;
    }
    #editContractorForm button[type="button"] {
      background: #7a5230;
      color: #fff;
    }
    #editContractorForm button[type="button"]:hover {
      background: #8c969a;
    }
    @media (max-width: 600px) {
      .container { padding: 10px; }
      th, td { padding: 8px; font-size: .95rem; }
      #editContractorModal .modal-content { padding: 18px 8px; }
    }
  </style>
</head>
<body>
  <div class="navbar">
    <div class="navbar-section navbar-right">
      <button class="nav-btn" onclick="location.href='index.html'">الرئيسية</button>
    </div>
    <div class="navbar-section navbar-left">
      <span id="username"></span>
      <button class="logout-btn" onclick="logout()">تسجيل الخروج</button>
    </div>
  </div>
  <div class="container">
    <h2>عرض المقاولين</h2>
    <table>
      <thead>
        <tr>
          <th>م</th>
          <th>الاسم</th>
          <th>الهاتف</th>
          <th>بند العمل</th>
          <th>ملاحظات</th>
          <th>تعديل</th>
          <th>حذف</th>
        </tr>
      </thead>
      <tbody id="contractorsList"></tbody>
    </table>
    <!-- نافذة تعديل المقاول -->
    <div id="editContractorModal">
      <div class="modal-content">
        <h3>تعديل بيانات المقاول</h3>
        <form id="editContractorForm">
          <input type="hidden" name="id">
          <div>
            <label>الاسم:</label>
            <input type="text" name="name" required>
          </div>
          <div>
            <label>الهاتف:</label>
            <input type="text" name="phone" required>
          </div>
          <div>
            <label>بند العمل:</label>
            <input type="text" name="address">
          </div>
          <div>
            <label>ملاحظات:</label>
            <input type="text" name="notes">
          </div>
          <div class="modal-actions">
            <button type="submit">حفظ</button>
            <button type="button" id="cancelEditBtn">إلغاء</button>
          </div>
        </form>
      </div>
    </div>
  </div>
  <script>
    // عرض اسم المستخدم
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    if (!user.username) window.location.href = 'login.html';
    document.getElementById('username').textContent = user.username;

    // تسجيل الخروج
    function logout() {
      localStorage.removeItem('user');
      window.location.href = 'login.html';
    }

    async function fetchContractors() {
      const res = await fetch('/contractors');
      const contractors = await res.json();
      const list = document.getElementById('contractorsList');
      list.innerHTML = '';
      contractors.forEach((c, i) => {
        const tr = document.createElement('tr');
        tr.style.cursor = "pointer";
        tr.setAttribute('data-id', c._id);
        tr.innerHTML = `
          <td>${i + 1}</td>
          <td>${c.name}</td>
          <td>${c.phone}</td>
          <td>${c.address || ''}</td>
          <td>${c.notes || ''}</td>
          <td>
            <button class="edit-btn" data-id="${c._id}" onclick="event.stopPropagation();">تعديل</button>
          </td>
          <td>
            <button class="delete-btn" data-id="${c._id}" onclick="event.stopPropagation();">حذف</button>
          </td>
        `;
        // عند الضغط على الصف (وليس زر التعديل/الحذف) انتقل لصفحة المقاول
        tr.addEventListener('click', function(e) {
          // تجاهل الضغط على زر التعديل أو الحذف
          if (e.target.classList.contains('edit-btn') || e.target.classList.contains('delete-btn')) return;
          window.location.href = `contractor.html?id=${c._id}`;
        });
        list.appendChild(tr);
      });
    }

    // حذف مقاول
    document.addEventListener('click', async function(e) {
      if (e.target.classList.contains('delete-btn')) {
        if (confirm('هل أنت متأكد من حذف هذا المقاول؟')) {
          const id = e.target.getAttribute('data-id');
          await fetch(`/contractors/${id}`, { method: 'DELETE' });
          fetchContractors();
        }
      }
    });

    // تعديل مقاول (فتح النموذج)
    document.addEventListener('click', function(e) {
      if (e.target.classList.contains('edit-btn')) {
        const id = e.target.getAttribute('data-id');
        const tr = e.target.closest('tr');
        const tds = tr.querySelectorAll('td');
        // تعبئة النموذج بالبيانات
        const modal = document.getElementById('editContractorModal');
        modal.style.display = 'flex';
        const form = document.getElementById('editContractorForm');
        form.id.value = id;
        form.name.value = tds[0].textContent;
        form.phone.value = tds[1].textContent;
        form.address.value = tds[2].textContent;
        form.notes.value = tds[3].textContent;
      }
    });

    // حفظ التعديل
    document.getElementById('editContractorForm').onsubmit = async function(e) {
      e.preventDefault();
      const form = e.target;
      const id = form.id.value;
      const name = form.name.value;
      const phone = form.phone.value;
      const address = form.address.value;
      const notes = form.notes.value;
      // تحقق من نجاح التعديل
      const res = await fetch(`/contractors/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, phone, address, notes })
      });
      if (res.ok) {
        document.getElementById('editContractorModal').style.display = 'none';
        localStorage.setItem('contractor-updated', Date.now());
        fetchContractors();
      } else if (res.status === 404) {
        alert('المقاول غير موجود أو رقم المعرف غير صحيح');
      } else {
        alert('حدث خطأ أثناء تعديل المقاول');
      }
    };

    // زر إلغاء
    document.getElementById('cancelEditBtn').onclick = function() {
      document.getElementById('editContractorModal').style.display = 'none';
    };

    fetchContractors();
  </script>
</body>
</html>
