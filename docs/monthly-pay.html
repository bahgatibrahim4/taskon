<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>القبض الشهري | صفحة العمال</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Cairo', Arial, sans-serif;
      background: #c5d6db;
      min-height: 100vh;
      direction: rtl;
    }
    .navbar {
      background: #1a3b50;
      color: #fff;
      padding: 14px 0 10px 0;
      text-align: center;
      font-size: 1.6rem;
      font-weight: 900;
      letter-spacing: 2px;
      box-shadow: 0 2px 18px #1a3b5022;
      border-radius: 0 0 24px 24px;
      margin-bottom: 40px;
      position: relative;
      z-index: 2;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 3px solid #2e8ca3;
    }
    .navbar .user-info {
      position: absolute;
      left: 32px;
      top: 50%;
      transform: translateY(-50%);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      background: #2e8ca3;
      padding: 6px 18px;
      border-radius: 18px;
      box-shadow: 0 1px 6px #2e8ca322;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 4px 24px #1a3b5011, 0 1.5px 8px #c5d6dbcc;
      padding: 32px 18px 24px 18px;
      margin-top: 18px;
    }
    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      gap: 12px;
      flex-wrap: wrap;
    }
    .header-row h1 {
      margin: 0;
      font-size: 2rem;
      color: #1a3b50;
      letter-spacing: 1px;
      text-align: right;
      flex: 1 1 auto;
    }
    .back-btn {
      border: 2px solid #2e8ca3;
      background: #fff;
      color: #1a3b50;
      font-family: 'Cairo', Arial, sans-serif;
      font-size: 1.1rem;
      font-weight: 900;
      padding: 8px 22px;
      border-radius: 0;
      cursor: pointer;
      margin-bottom: 0;
      transition: background 0.15s, color 0.15s, border 0.15s;
      letter-spacing: 1px;
      box-shadow: 0 2px 8px #2e8ca311;
      outline: none;
      display: inline-block;
    }
    .back-btn:hover, .back-btn:focus {
      background: #2e8ca3;
      color: #fff;
      border-color: #1a3b50;
    }
    .footer {
      text-align: center;
      color: #2e8ca3;
      font-size: 1.1rem;
      margin-top: 60px;
      padding-bottom: 18px;
      opacity: 0.8;
      letter-spacing: 1px;
      font-weight: 500;
      text-shadow: 0 1px 8px #2e8ca311;
    }
    @media (max-width: 900px) {
      .container { max-width: 99vw; }
      .header-row h1 { font-size: 1.2rem; }
    }
    @media (max-width: 600px) {
      .container { padding: 10px 2px; }
      .header-row { flex-direction: column-reverse; align-items: stretch; gap: 6px; }
      .header-row h1 { font-size: 1.1rem; }
    }
  </style>
</head>
<body>
  <div class="navbar">
    صفحة العمال
    <span class="user-info" id="userInfo">
      <!-- سيتم تعبئة اسم المستخدم هنا -->
      <span id="logoutBtn" style="display:block; color:#fff; font-size:0.95rem; font-weight:400; margin-top:2px; cursor:pointer; text-decoration:underline;">تسجيل الخروج</span>
    </span>
  </div>
  <div class="container">
    <div class="header-row">
      <h1>القبض الشهري</h1>
      <button class="back-btn" id="backBtn">رجوع</button>
      <button class="add-month-btn" id="addMonthBtn" type="button" style="border:2px solid #2e8ca3; border-radius:0; background:#fff; color:#1a3b50; font-family:'Cairo',Arial,sans-serif; font-size:1.1rem; font-weight:900; padding:8px 22px; margin-right:10px; letter-spacing:1px; box-shadow:0 2px 8px #2e8ca311; outline:none; cursor:pointer; transition:background 0.15s, color 0.15s, border 0.15s;">إضافة شهر</button>
    </div>
    <div id="monthsCards" style="display:flex; flex-wrap:wrap; gap:18px; margin-top:32px;"></div>
    <div style="text-align:center; color:#888; font-size:1.2rem; margin-top:40px;">
      <!-- يمكنك إضافة محتوى القبض الشهري هنا -->
      <span>صفحة القبض الشهري تحت التطوير...</span>
    </div>
  </div>
  <div class="footer">
    جميع الحقوق محفوظة &copy; 2025 سعيد أحمد بالبيد
  </div>
  <!-- مودال إضافة شهر -->
  <div id="monthModalOverlay" style="display:none; position:fixed; top:0;left:0;right:0;bottom:0; background:#0006; z-index:2000; align-items:center; justify-content:center;">
    <form id="monthModal" style="background:#fff; border-radius:12px; box-shadow:0 8px 32px #1a3b5044; padding:28px 18px 18px 18px; min-width:320px; max-width:95vw; width:340px; display:flex; flex-direction:column; gap:14px; font-family:'Cairo',Arial,sans-serif;">
      <label style="font-weight:700; color:#1a3b50; font-size:1.1rem;">اسم الشهر</label>
      <input type="text" id="monthNameInput" required style="padding:6px 10px; border:1.5px solid #c5d6db; border-radius:6px; font-size:1rem; margin-bottom:8px;">
      <label style="font-weight:700; color:#1a3b50; font-size:1.1rem;">التاريخ</label>
      <input type="date" id="monthDateInput" required style="padding:6px 10px; border:1.5px solid #c5d6db; border-radius:6px; font-size:1rem; margin-bottom:8px;">
      <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:8px;">
        <button type="button" id="cancelMonthModalBtn" style="border:none; background:#c5d6db; color:#1a3b50; font-weight:700; font-size:1rem; padding:7px 18px; border-radius:6px; cursor:pointer;">إلغاء</button>
        <button type="submit" style="border:none; background:#2e8ca3; color:#fff; font-weight:700; font-size:1rem; padding:7px 18px; border-radius:6px; cursor:pointer;">إضافة</button>
      </div>
    </form>
  </div>
  <script>
    // حماية الصفحة
    if (!localStorage.getItem('user')) {
      window.location.href = 'login.html';
    }
    // عرض اسم المستخدم أعلى يمين الشريط
    const user = localStorage.getItem('user');
    if (user) {
      try {
        const username = JSON.parse(user).username || '';
        document.getElementById('userInfo').childNodes[0].textContent = '👤 ' + username + ' ';
      } catch {}
    }
    // زر تسجيل الخروج
    document.getElementById('logoutBtn').onclick = function() {
      localStorage.removeItem('user');
      window.location.href = 'login.html';
    };
    // زر الرجوع
    document.getElementById('backBtn').onclick = function() {
      window.location.href = 'workers.html';
    };

    // --- إضافة شهر ---
    const addMonthBtn = document.getElementById('addMonthBtn');
    const monthModalOverlay = document.getElementById('monthModalOverlay');
    const monthModal = document.getElementById('monthModal');
    const cancelMonthModalBtn = document.getElementById('cancelMonthModalBtn');
    const monthsCards = document.getElementById('monthsCards');
    let monthsList = [];

    if (addMonthBtn) {
      addMonthBtn.onclick = function(e) {
        e.preventDefault();
        console.log('زر إضافة شهر تم الضغط عليه');
        monthModalOverlay.style.display = 'flex';
        if (monthModal) monthModal.reset();
        setTimeout(() => {
          const input = document.getElementById('monthNameInput');
          if (input) input.focus();
        }, 100);
      };
    }

    if (cancelMonthModalBtn) {
      cancelMonthModalBtn.onclick = function() {
        monthModalOverlay.style.display = 'none';
      };
    }
    if (monthModalOverlay) {
      monthModalOverlay.onclick = function(e) {
        if (e.target === this) this.style.display = 'none';
      };
    }

    // جلب الشهور من السيرفر
    async function fetchMonths() {
      try {
        const res = await fetch('/monthly-pays');
        if (!res.ok) throw new Error('تعذر جلب بيانات الشهور');
        const data = await res.json();
        monthsList = data;
        renderMonthsCards();
      } catch (err) {
        monthsList = [];
        renderMonthsCards();
        alert('حدث خطأ أثناء جلب الشهور: ' + err.message);
      }
    }

    // إضافة شهر جديد
    monthModal.onsubmit = async function(e) {
      e.preventDefault();
      const name = document.getElementById('monthNameInput').value.trim();
      const date = document.getElementById('monthDateInput').value;
      if (!name || !date) return;
      await fetch('/monthly-pays', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, date })
      });
      monthModalOverlay.style.display = 'none';
      await fetchMonths();
    };

    // حذف شهر
    async function deleteMonth(id) {
      if (!confirm('هل أنت متأكد من حذف هذا الشهر؟')) return;
      await fetch('/monthly-pays/' + id, { method: 'DELETE' });
      await fetchMonths();
    }

    function renderMonthsCards() {
      monthsCards.innerHTML = '';
      monthsList.forEach(m => {
        const card = document.createElement('div');
        card.style.cssText = `
          background: #f8fafb;
          border: 2px solid #2e8ca3;
          border-radius: 0;
          padding: 18px 24px 14px 24px;
          min-width: 180px;
          min-height: 80px;
          box-shadow: 0 2px 8px #2e8ca311;
          display: flex;
          flex-direction: column;
          align-items: flex-start;
          font-family: 'Cairo', Arial, sans-serif;
          margin-bottom: 0;
          cursor: pointer;
          transition: box-shadow 0.15s, border-color 0.15s;
          position: relative;
        `;
        card.innerHTML = `
          <div style="font-size:1.15rem; font-weight:900; color:#1a3b50; margin-bottom:6px;">${m.name}</div>
          <div style="font-size:1rem; color:#2e8ca3;">${m.date}</div>
          <button style="position:absolute; left:8px; top:8px; background:#e74c3c; color:#fff; border:none; border-radius:4px; padding:2px 10px; font-size:0.95rem; cursor:pointer;" onclick="event.stopPropagation(); deleteMonth('${m._id}')">حذف</button>
        `;
        card.onclick = function() {
          window.location.href = `month-details.html?name=${encodeURIComponent(m.name)}&date=${encodeURIComponent(m.date)}`;
        };
        card.onmouseover = function() {
          card.style.boxShadow = "0 4px 16px #2e8ca344";
          card.style.borderColor = "#1a3b50";
        };
        card.onmouseout = function() {
          card.style.boxShadow = "0 2px 8px #2e8ca311";
          card.style.borderColor = "#2e8ca3";
        };
        monthsCards.appendChild(card);
      });
    }

    // عند تحميل الصفحة
    fetchMonths();
  </script>
</body>
</html>
