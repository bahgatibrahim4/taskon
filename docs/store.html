  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <script>
    const tableBody = document.querySelector('#storeTable tbody');
    
    // «· ÕÞÞ „‰ «Œ Ì«— «·„‘—Ê⁄
    const currentProjectId = localStorage.getItem('currentProjectId');
    if (!currentProjectId) {
      alert('«·—Ã«¡ «Œ Ì«— „‘—Ê⁄ √Ê·«');
      window.location.href = 'projects.html';
    }

    // ÷»ÿ API_URL Õ”» «·»Ì∆…
    const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
      ? 'http://localhost:4000' 
      : 'https://taskon-qzj8.onrender.com';

    // Ã·» »Ì«‰«  «·„Œ“Ê‰ „‰ «·”Ì—ð— „»«‘—… („·Œ’ «·þ„Ì«  «·„ «Õ…)
    async function fetchStore() {
      const res = await fetch(`/store/summary?projectId=${currentProjectId}`);
      return await res.json();
    }

    // Ã·» «·„Þ«Ê·Ì‰
    async function fetchContractors() {
      const res = await fetch(`/contractors?projectId=${currentProjectId}`);
      return await res.json();
    }

    //  ⁄»∆… Þ«∆„… «·„Þ«Ê·Ì‰
    async function fillContractorsSelect() {
      const contractors = await fetchContractors();
      const select = document.getElementById('contractorSelect');
      select.innerHTML = '<option value="">«Œ — «·„Þ«Ê·</option>';
      contractors.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c._id;
        opt.textContent = c.name || c.contractorName || '';
        select.appendChild(opt);
      });
    }

    //  ⁄»∆… Þ«∆„… «·„Ê«œ „‰ »Ì«‰«  «·„Œ“Ê‰
    let storeCache = [];
    let isItemsSelectInitialized = false; // ⁄·«„… ·„‰⁄ ≈⁄«œ… «· Õ„Ì· €Ì— «·„—€Ê» ðÌÂ«
    
    async function fillItemsSelect() {
      // ðÞÿ ≈⁄«œ…  Õ„Ì· ≈–« ·„ Ì „ «· Õ„Ì· „‰ Þ»· √Ê ≈–« þ«‰ «·þ«‘ ð«—€
      if (isItemsSelectInitialized && storeCache.length > 0) return;
      
      if (!storeCache.length) storeCache = await fetchStore();
      const select = document.getElementById('itemSelect');
      const currentValue = select.value; // «ÕðŸ «·«Œ Ì«— «·Õ«·Ì
      
      select.innerHTML = '<option value="">«Œ — «·„«œ…</option>';
      // «” Œ—«Ã «·„Ê«œ «·ð—Ìœ…
      const items = [...new Set(storeCache.map(s => s.item).filter(Boolean))];
      items.forEach(item => {
        const opt = document.createElement('option');
        opt.value = item;
        opt.textContent = item;
        select.appendChild(opt);
      });
      
      // √⁄œ  ⁄ÌÌ‰ «·«Œ Ì«— «·”«»Þ ≈‰ ÊÃœ
      if (currentValue && items.includes(currentValue)) {
        select.value = currentValue;
      }
      
      isItemsSelectInitialized = true;
    }

    // ≈ŸÂ«— «·þ„Ì… «·„ «Õ… ·„«œ… „⁄Ì‰… „‰ »Ì«‰«  «·„Œ“Ê‰
    function getAvailableQty(itemName) {
      if (!storeCache.length) return '-';
      const item = storeCache.find(s => s.item === itemName);
      return item ? item.quantity : 0;
    }

    // ‰«ð–… ’—ð „Ê«œ
    const openIssueModalBtn = document.getElementById('openIssueModalBtn');
    const issueModal = document.getElementById('issueModal');
    const closeIssueModalBtn = document.getElementById('closeIssueModalBtn');
    const issueForm = document.getElementById('issueForm');
    const itemSelect = document.getElementById('itemSelect');
    const availableQtySpan = document.getElementById('availableQty');
    const issueQtyInput = document.getElementById('issueQtyInput');

    openIssueModalBtn.onclick = async function() {
      // «· ÕÞÞ „‰ ’·«ÕÌ… ’—ð «·„Ê«œ
      if (!hasPermission('store.issue')) {
        alert('? ·Ì” ·œÌþ ’·«ÕÌ… ’—ð «·„Ê«œ');
        return;
      }
      
      await fillContractorsSelect();
      //  ÕœÌÀ «·þ«‘ ðÞÿ° œÊ‰ ≈⁄«œ… „·¡ «·Þ«∆„… ≈–« þ«‰  „„·Ê¡… »«·ð⁄·
      const newStoreCache = await fetchStore();
      if (JSON.stringify(storeCache) !== JSON.stringify(newStoreCache)) {
        storeCache = newStoreCache;
        isItemsSelectInitialized = false; // √⁄œ «· Õ„Ì· ≈–«  €Ì—  «·»Ì«‰« 
      }
      await fillItemsSelect();
      
      // ≈⁄«œ…  ⁄ÌÌ‰ «·ÞÌ„ ðÞÿ ≈–« ·„ Ìþ‰ Â‰«þ «Œ Ì«— „”»Þ
      const itemSelect = document.getElementById('itemSelect');
      if (!itemSelect.value) {
        availableQtySpan.textContent = '-';
        issueQtyInput.value = '';
        issueQtyInput.max = '';
        const unitPriceInput = document.getElementById('unitPriceInput');
        unitPriceInput.value = '';
        unitPriceInput.placeholder = '√œŒ· ”⁄— «·ÊÕœ…';
        unitPriceInput.style.background = '#f9f9f9';
        unitPriceInput.dataset.defaultPrice = '';
        document.getElementById('resetPriceBtn').style.display = 'none';
      }
      
      issueModal.style.display = 'flex';
    };
    closeIssueModalBtn.onclick = function() {
      issueModal.style.display = 'none';
    };
    issueModal.onclick = function(e) {
      if (e.target === issueModal) issueModal.style.display = 'none';
    };
    document.addEventListener('keydown', function(e) {
      if (issueModal.style.display === 'flex' && e.key === 'Escape') issueModal.style.display = 'none';
    });

    // ⁄‰œ «Œ Ì«— „«œ…° √ŸÂ— «·þ„Ì… «·„ «Õ… ÊÕœœ «·Õœ «·√Þ’Ï Ê√ŸÂ— «·ð∆…
    itemSelect.onchange = function() {
      const item = itemSelect.value;
      const unitPriceInput = document.getElementById('unitPriceInput');
      
      if (!item) {
        availableQtySpan.textContent = '-';
        issueQtyInput.max = '';
        unitPriceInput.value = '';
        unitPriceInput.placeholder = '√œŒ· ”⁄— «·ÊÕœ…';
        unitPriceInput.style.background = '#f9f9f9';
        unitPriceInput.dataset.defaultPrice = '';
        document.getElementById('resetPriceBtn').style.display = 'none';
        return;
      }
      
      const itemObj = storeCache.find(s => s.item === item);
      if (!itemObj) {
        availableQtySpan.textContent = '-';
        unitPriceInput.value = '';
        unitPriceInput.placeholder = '√œŒ· ”⁄— «·ÊÕœ…';
        unitPriceInput.style.background = '#f9f9f9';
        unitPriceInput.dataset.defaultPrice = '';
        document.getElementById('resetPriceBtn').style.display = 'none';
        return;
      }
      
      availableQtySpan.textContent = itemObj.quantity;
      issueQtyInput.max = itemObj.quantity;
      if (Number(issueQtyInput.value) > itemObj.quantity) issueQtyInput.value = itemObj.quantity;
      
      //  ⁄»∆… «·ð∆…  ·Þ«∆Ì« Ê≈÷«ð… placeholder
      const defaultPrice = itemObj.unitPrice || itemObj.category || '';
      unitPriceInput.value = defaultPrice;
      unitPriceInput.placeholder = defaultPrice ? `«·”⁄— «·«ð —«÷Ì: ${defaultPrice}` : '√œŒ· ”⁄— «·ÊÕœ…';
      unitPriceInput.style.background = '#f9f9f9'; // ·Ê‰ «ð —«÷Ì
      unitPriceInput.dataset.defaultPrice = defaultPrice; // ÕðŸ «·”⁄— «·«ð —«÷Ì
      document.getElementById('resetPriceBtn').style.display = 'none'; // ≈Œð«¡ “— «·≈⁄«œ…
    };

    // ≈÷«ð… „” „⁄ ·· €ÌÌ— ðÌ ÕÞ· ”⁄— «·ÊÕœ…
    document.getElementById('unitPriceInput').oninput = function() {
      const defaultPrice = this.dataset.defaultPrice || '';
      const resetBtn = document.getElementById('resetPriceBtn');
      
      if (this.value !== defaultPrice && this.value !== '') {
        this.style.background = '#fff3e0'; // ·Ê‰ ÌÊ÷Õ «· ⁄œÌ·
        resetBtn.style.display = 'block'; // ≈ŸÂ«— “— «·≈⁄«œ…
      } else {
        this.style.background = '#f9f9f9'; // ·Ê‰ «ð —«÷Ì
        resetBtn.style.display = 'none'; // ≈Œð«¡ “— «·≈⁄«œ…
      }
    };

    // “— ≈⁄«œ… «·”⁄— «·«ð —«÷Ì
    document.getElementById('resetPriceBtn').onclick = function() {
      const unitPriceInput = document.getElementById('unitPriceInput');
      const defaultPrice = unitPriceInput.dataset.defaultPrice || '';
      unitPriceInput.value = defaultPrice;
      unitPriceInput.style.background = '#f9f9f9';
      this.style.display = 'none';
    };

    // „‰⁄  Ã«Ê“ «·þ„Ì… «·„ «Õ…
    issueQtyInput.oninput = function() {
      const max = Number(issueQtyInput.max);
      if (max && Number(issueQtyInput.value) > max) {
        issueQtyInput.value = max;
      }
      if (Number(issueQtyInput.value) < 1) {
        issueQtyInput.value = 1;
      }
    };

    // «Õ’· ⁄·Ï «”„ «·„” Œœ„ «·Õ«·Ì „‰ localStorage
    let currentUserName = '';
    try {
      const user = JSON.parse(localStorage.getItem('user') || '{}');
      currentUserName = user.name || user.username || localStorage.getItem('username') || '';
    } catch {
      currentUserName = localStorage.getItem('username') || '';
    }

    // ÕðŸ ⁄„·Ì… «·’—ð ( —”· ··”Ì—ð— ðÞÿ)
    issueForm.onsubmit = async function(e) {
      e.preventDefault();
      
      // Check permission before submitting
      if (!hasPermission('store.issue')) {
        alert('·Ì” ·œÌþ ’·«ÕÌ… ’—ð «·„Ê«œ');
        return;
      }
      
      const data = {
        contractor: issueForm.contractor.value,
        date: issueForm.date.value,
        item: issueForm.item.value,
        quantity: issueForm.quantity.value,
        unitPrice: issueForm.unitPrice.value
      };
      
      console.log('»Ì«‰«  «·’—ð:', data);
      
      //  ÕÞÞ „‰ «·ÞÌ„ «·„ÿ·Ê»…
      if (!data.contractor || !data.item || !data.quantity || !data.date) {
        alert('ÌÃ»  ⁄»∆… Ã„Ì⁄ «·ÕÞÊ· «·„ÿ·Ê»…');
        return;
      }
      
      // ≈–« «Œ —  „Þ«Ê·° √—”· contractor/item/quantity/date/unitPrice
      const reqBody = {
        contractor: data.contractor,
        item: data.item,
        quantity: data.quantity,
        date: data.date,
        unitPrice: data.unitPrice, // √÷ð unitPrice
        userName: currentUserName // √÷ð «”„ «·„” Œœ„ Â‰«
      };
      
      console.log('«·»Ì«‰«  «·„—”·… ··”Ì—ð—:', reqBody);
      
      try {
        const res = await fetch(`${API_URL}/store/issue`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(reqBody)
        });
        
        console.log('«” Ã«»… «·”Ì—ð—:', res.status);
        
        if (res.ok) {
          alert(' „ ’—ð «·„Ê«œ »‰Ã«Õ');
          issueModal.style.display = 'none';
          issueForm.reset();
          await renderTable();
        } else {
          let errMsg = 'ÕœÀ Œÿ√ √À‰«¡ «·’—ð';
          try {
            const err = await res.json();
            console.log('Œÿ√ „‰ «·”Ì—ð—:', err);
            errMsg = err.error || errMsg;
          } catch {
            const text = await res.text();
            console.log('‰’ «·Œÿ√:', text);
            errMsg = text || 'ÕœÀ Œÿ√ €Ì— „ ÊÞ⁄ „‰ «·”Ì—ð—';
          }
          alert(errMsg);
        }
      } catch (networkError) {
        console.error('Œÿ√ ðÌ «·‘»þ…:', networkError);
        alert('Œÿ√ ðÌ «·« ’«· »«·”Ì—ð—: ' + networkError.message);
      }
    }

    // ⁄—÷ ÃœÊ· «·„Œ“Ê‰ („·Œ’ «·þ„Ì«  «·„ «Õ…)
    async function renderTable() {
      const store = await fetchStore();
      
      //  ÕœÌÀ «·þ«‘ Ê≈⁄«œ…  ⁄ÌÌ‰ ⁄·«„… «· Õ„Ì· ≈–«  €Ì—  «·»Ì«‰« 
      if (JSON.stringify(storeCache) !== JSON.stringify(store)) {
        storeCache = store;
        isItemsSelectInitialized = false; // √⁄œ «· Õ„Ì· ðÌ «·„—… «·Þ«œ„…
      }
      
      let filtered = store;

      //  ‰»ÌÂ «·„Ê«œ «·Þ—Ì»… „‰ «·‰ð«œ
      const lowStock = store.filter(s => Number(s.quantity) <= 5);
      const alertDiv = document.getElementById('lowStockAlert');
      if (lowStock.length > 0) {
        alertDiv.style.display = '';
        alertDiv.innerHTML = ' ‰»ÌÂ: «·„Ê«œ «· «·Ì… «Þ —»  „‰ «·‰ð«œ:<br>' +
          lowStock.map(s => `<span style="color:#c00;">${s.item}</span> («·þ„Ì… «·„ «Õ…: <b>${s.quantity}</b>)`).join('° ');
      } else {
        alertDiv.style.display = 'none';
        alertDiv.innerHTML = '';
      }

      // »ÕÀ ‰’Ì
      if (lastSearch) {
        const s = lastSearch.toLowerCase();
        filtered = filtered.filter(row =>
          (row.item && row.item.toLowerCase().includes(s))
        );
      }

      // ð· —… „ Þœ„…
      if (lastFilter) {
        if (lastFilter.item) {
          filtered = filtered.filter(row => row.item === lastFilter.item);
        }
      }

      tableBody.innerHTML = '';
      filtered.forEach((s, idx) => {
        const qtyStyle = Number(s.quantity) === 0 ? 'color:#c00;font-weight:bold;' : 
                        Number(s.quantity) <= 5 ? 'color:#ff9800;font-weight:bold;' : '';
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${idx + 1}</td>
          <td>${s.item || ''}</td>
          <td style="${qtyStyle}">${s.quantity || 0}</td>
          <td>${s.unit || ''}</td>
          <td>${s.unitPrice || ''}</td>
          <td>${s.total || ''}</td>
          <td>${s.lastOperationDate || s.date || ''}</td>
        `;
        tableBody.appendChild(tr);
      });
    }
    // ⁄‰œ  Õ„Ì· «·’ðÕ…
    window.onload = renderTable;

    // “—  Þ«—Ì— «·„Œ“‰
    document.addEventListener('DOMContentLoaded', function() {
      const storeReportBtn = document.getElementById('storeReportBtn');
      if (storeReportBtn) {
        storeReportBtn.onclick = function() {
          // «· ÕÞÞ „‰ ’·«ÕÌ… «· Þ«—Ì—
          if (!hasPermission('store.reports')) {
            alert('? ·Ì” ·œÌþ ’·«ÕÌ… «·Ê’Ê· · Þ«—Ì— «·„Œ“‰');
            return;
          }
          
          window.location.href = 'store-report.html';
        };
      }
    });

    //  ⁄»∆… Þ«∆„… «·„Ê«œ ðÌ ‰«ð–… «·ð· —…
    async function fillFilterItemSelect() {
      if (!storeCache.length) storeCache = await fetchStore();
      const select = document.getElementById('filterItemSelect');
      select.innerHTML = '<option value="">þ· «·„Ê«œ</option>';
      const items = [...new Set(storeCache.map(s => s.item).filter(Boolean))];
      items.forEach(item => {
        const opt = document.createElement('option');
        opt.value = item;
        opt.textContent = item;
        select.appendChild(opt);
      });
    }

    // „‰ÿÞ ‰«ð–… «·ð· —…
    const openFilterModalBtn = document.getElementById('openFilterModalBtn');
    const filterModal = document.getElementById('filterModal');
    const closeFilterModalBtn = document.getElementById('closeFilterModalBtn');
    const filterForm = document.getElementById('filterForm');
    openFilterModalBtn.onclick = async function() {
      await fillFilterItemSelect();
      filterModal.style.display = 'flex';
    };
    closeFilterModalBtn.onclick = function() {
      filterModal.style.display = 'none';
    };
    filterModal.onclick = function(e) {
      if (e.target === filterModal) filterModal.style.display = 'none';
    };
    document.addEventListener('keydown', function(e) {
      if (filterModal.style.display === 'flex' && e.key === 'Escape') filterModal.style.display = 'none';
    });

    // „‰ÿÞ «·»ÕÀ Ê«·ð· —…
    let lastSearch = '';
    let lastFilter = {};

    document.getElementById('searchInput').oninput = function() {
      lastSearch = this.value.trim();
      renderTable();
    };

    filterForm.onsubmit = function(e) {
      e.preventDefault();
      lastFilter = {
        item: document.getElementById('filterItemSelect').value
      };
      filterModal.style.display = 'none';
      renderTable();
    };

    // “—  ’œÌ— «·„Œ“Ê‰ ≈·Ï Excel
    document.getElementById('exportExcelBtn').onclick = function() {
      // «· ÕÞÞ „‰ ’·«ÕÌ… «· ’œÌ—
      if (!hasPermission('store.export')) {
        alert('? ·Ì” ·œÌþ ’·«ÕÌ…  ’œÌ— «·„Œ“‰');
        return;
      }
      
      // «” Œœ„ «·ð· —… «·Õ«·Ì…
      let filtered = storeCache;
      if (lastSearch) {
        const s = lastSearch.toLowerCase();
        filtered = filtered.filter(row =>
          (row.item && row.item.toLowerCase().includes(s))
        );
      }
      if (lastFilter) {
        if (lastFilter.item) {
          filtered = filtered.filter(row => row.item === lastFilter.item);
        }
      }
      const data = [
        ["„", "«”„ «·„«œ…", "«·þ„Ì… «·„ «Õ…", "«·ÊÕœ…", "”⁄— «·ÊÕœ…", "≈Ã„«·Ì «·ÞÌ„…", " «—ÌŒ ¬Œ—  ÕœÌÀ"]
      ];
      filtered.forEach((s, idx) => {
        data.push([
          idx + 1,
          s.item || '',
          s.quantity || 0,
          s.unit || '',
          s.unitPrice || '',
          s.total || '',
          s.lastOperationDate || s.date || ''
        ]);
      });
      const ws = XLSX.utils.aoa_to_sheet(data);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "«·„Œ“Ê‰");
      XLSX.writeFile(wb, "store_summary.xlsx");
    };

    // “—  ÕœÌÀ «·»Ì«‰« 
    document.getElementById('updateDataBtn').onclick = async function() {
      // «· ÕÞÞ „‰ ’·«ÕÌ…  ÕœÌÀ «·»Ì«‰« 
      if (!hasPermission('store.update')) {
        alert('? ·Ì” ·œÌþ ’·«ÕÌ…  ÕœÌÀ »Ì«‰«  «·„Œ“‰');
        return;
      }
      
      if (confirm('Â·  —Ìœ  ÕœÌÀ «·»Ì«‰«  «·„ÊÃÊœ… ·œ⁄„ «·‰Ÿ«„ «·ÃœÌœø')) {
        try {
          //  ÕœÌÀ «· Ê—Ìœ« 
          const suppliesRes = await fetch(`${API_URL}/update-existing-supplies`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
          });
          const suppliesResult = await suppliesRes.json();
          
          //  ÕœÌÀ «·„‘ —Ì« 
          const purchasesRes = await fetch(`${API_URL}/update-existing-purchases`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
          });
          const purchasesResult = await purchasesRes.json();
          
          alert(` „  ÕœÌÀ ${suppliesResult.updated}  Ê—Ìœ«  Ê ${purchasesResult.updated} „‘ —Ì« `);
          await renderTable();
        } catch (error) {
          alert('ÕœÀ Œÿ√ √À‰«¡  ÕœÌÀ «·»Ì«‰« : ' + error.message);
        }
      }
    };
  </script>
  <script>
    // —»ÿ «·’ðÕ… »«·‘—Ìÿ «·⁄·ÊÌ Ê ‰ðÌ– «·”þ—Ì» «  »œ«Œ·Â
    fetch('components/main-navbar.html')
      .then(res => res.text())
      .then(html => {
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = html;
        const scripts = tempDiv.querySelectorAll('script');
        scripts.forEach(s => s.parentNode.removeChild(s));
        document.getElementById('navbar-container').innerHTML = tempDiv.innerHTML;
        scripts.forEach(oldScript => {
          const newScript = document.createElement('script');
          if (oldScript.src) {
            newScript.src = oldScript.src;
          } else {
            newScript.textContent = oldScript.textContent;
          }
          document.body.appendChild(newScript);
        });
      });
  </script>
