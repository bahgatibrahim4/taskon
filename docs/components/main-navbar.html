}
  /* Responsive chat modal */
  @media (max-width: 600px) {
    #chatModal { min-width: 90vw; width: 98vw; right: 0 !important; left: 0 !important; }

  /* Responsive styles from index.html */

  flex-direction: row-reverse; /* من اليمين لليسار */

<script>
  // حماية الصفحة
  if (!localStorage.getItem('user')) {
    window.location.href = 'login.html';
  }

  // دالة لتحديث اسم المستخدم في الشريط العلوي
  function updateNavbarUserName() {
    // تأكد من وجود العنصر
    var userNameSpan = document.getElementById('userName');
    if (!userNameSpan) return;
    // جلب بيانات المستخدم من localStorage
    var userStr = localStorage.getItem('user');
    var username = '';
    if (userStr) {
      try {
        var userObj = JSON.parse(userStr);
        username = userObj.username || '';
      } catch (e) {
        username = '';
      }
    }
    // تحديث النص
    userNameSpan.textContent = username;
    // إذا لم يوجد اسم، أخفِ العنصر
    userNameSpan.style.display = username ? 'inline-block' : 'none';
  }

  // دالة تفعيل زر تسجيل الخروج وإظهار القائمة
  function setupNavbarLogout() {
    const userAvatar = document.getElementById('userAvatar');
    const userInfo = document.getElementById('userInfo');
    const logoutBtn = document.getElementById('logoutBtn');
    if (userAvatar && userInfo && logoutBtn) {
      userAvatar.onclick = function(e) {
        e.stopPropagation();
        userInfo.classList.toggle('show-logout');
      };
      document.addEventListener('click', function(e) {
        if (!userInfo.contains(e.target)) {
          userInfo.classList.remove('show-logout');
        }
      });
      logoutBtn.onclick = function() {
        localStorage.removeItem('user');
        window.location.href = 'login.html';
      };
    }
  }

  // قائمة الصفحات (يمكنك تعديلها حسب صفحاتك في index.html)
  const NAVBAR_PAGES = [
    { name: "الرئيسية", href: "index.html" },
    { name: "المستخلصات", href: "extracts.html" },
    { name: "المقاولون", href: "contractors.html" },
    { name: "الموردين", href: "suppliers.html" },
    { name: "المخزن", href: "store.html" },
    { name: "العمال", href: "workers.html" },
    { name: "المعدات", href: "equipment.html" },
    { name: "التوريدات", href: "deliveries.html" },
    { name: "المشتريات", href: "purchases.html" },
    { name: "المستخدمون", href: "users.html" }
    // أضف أو عدل حسب صفحاتك
  ];

  // منطق القائمة المنسدلة
  function setupNavbarMenuDropdown() {
    const icon = document.getElementById('navbarMenuIcon');
    const dropdown = document.getElementById('navbarMenuDropdown');
    if (!icon || !dropdown) return;

    // تعبئة القائمة بخط صغير وأنيق
    dropdown.innerHTML = NAVBAR_PAGES.map(page =>
      `<a href="${page.href}">${page.name}</a>`
    ).join('');

    icon.onclick = function(e) {
      e.stopPropagation();
      dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
    };

    // إغلاق عند الضغط خارج القائمة
    document.addEventListener('click', function(e) {
      if (dropdown.style.display === 'block' && !dropdown.contains(e.target) && e.target !== icon) {
        dropdown.style.display = 'none';
      }
    });
  }

  // دالة لجلب عدد إشعارات الرسائل غير المقروءة للمستخدم الحالي
  async function checkUnreadChats() {
    const badge = document.getElementById('chatNotifBadge');
    if (!badge) return;
    let userObj;
    try {
      userObj = JSON.parse(localStorage.getItem('user') || '{}');
    } catch (e) {
      userObj = {};
    }
    const username = userObj.username;
    if (!username) {
      badge.style.display = 'none';
      return;
    }
    try {
      // جلب الإشعارات من السيرفر
      const res = await fetch(`/notifications/${encodeURIComponent(username)}?t=${Date.now()}`);
      const notifications = await res.json();
      // عدّ فقط إشعارات الرسائل غير المقروءة
      const unreadCount = Array.isArray(notifications)
        ? notifications.filter(n => n.type === 'chat' && !n.read).length
        : 0;
      if (unreadCount > 0) {
        badge.textContent = unreadCount > 9 ? '9+' : unreadCount;
        badge.style.display = 'block';
      } else {
        badge.style.display = 'none';
      }
    } catch (e) {
      badge.style.display = 'none';
    }
  }

  // عند فتح نافذة الدردشة، اعتبر إشعارات الرسائل كمقروءة وأزل الإشعار
  document.getElementById('chatIcon').onclick = async function(e) {
    e.stopPropagation();
    const chatModal = document.getElementById('chatModal');
    const chatIcon = document.getElementById('chatIcon');
    const chatArrow = document.getElementById('chatArrow');
    // إذا كانت النافذة مفتوحة، أغلقها وأخفي السهم
    if (chatModal.style.display === 'block') {
      chatModal.style.display = 'none';
      chatArrow.style.display = 'none';
      return;
    }
    // اجعل القائمة تظهر للداخل أكثر (يمين وأسفل الايقونة)
    chatModal.style.display = 'block';
    chatModal.style.opacity = '1';
    chatModal.style.top = (window.scrollY + chatIcon.getBoundingClientRect().bottom + 6) + 'px';
    chatModal.style.right = (window.innerWidth - chatIcon.getBoundingClientRect().right - 4) + 'px';
    chatModal.style.left = 'auto';

    // أظهر السهم تحت أيقونة الدردشة
    chatArrow.style.display = 'block';
    chatArrow.style.top = (chatIcon.offsetHeight + 4) + 'px';

    // تعديل: اجعل النافذة دائماً داخل الشاشة
    setTimeout(() => {
      const modalRect = chatModal.getBoundingClientRect();
      // إذا خرجت من أسفل الشاشة
      if (modalRect.bottom > window.innerHeight) {
        chatModal.style.top = Math.max(window.innerHeight - modalRect.height - 12, 8) + 'px';
      }
      // إذا خرجت من اليمين
      if (modalRect.right > window.innerWidth) {
        chatModal.style.right = '8px';
      }
      // إذا خرجت من اليسار
      if (modalRect.left < 0) {
        chatModal.style.left = '8px';
        chatModal.style.right = 'auto';
      }
    }, 0);

    // جلب المستخدمين من السيرفر
    let users = [];
    try {
      const res = await fetch('/users');
      users = await res.json();
    } catch (err) {
      users = [];
    }
    const currentUser = JSON.parse(localStorage.getItem('user') || '{}').username;

    // جلب الإشعارات غير المقروءة للمستخدم الحالي
    let notifications = [];
    try {
      const notifRes = await fetch(`/notifications/${encodeURIComponent(currentUser)}`);
      notifications = await notifRes.json();
    } catch (e) {
      notifications = [];
    }

    // جلب آخر رسالة لكل مستخدم
    const usersListContainer = document.getElementById('chatUsersList');
    usersListContainer.innerHTML = '<div style="color:#888;padding:8px;text-align:center;">جاري التحميل...</div>';
    const otherUsers = users.filter(u => u.username !== currentUser);

    const userItems = await Promise.all(otherUsers.map(async u => {
      let lastMsg = null;
      try {
        const res = await fetch(`/chats/last/${currentUser}/${u.username}`);
        lastMsg = await res.json();
      } catch {}
      let msgText = lastMsg && lastMsg.text ? lastMsg.text : 'لا توجد رسائل بعد';
      let msgTime = '';
      if (lastMsg && lastMsg.date) {
        const d = new Date(lastMsg.date);
        msgTime = `<span style="color:#888;font-size:0.82em;">${d.toLocaleDateString('ar-EG')} ${d.toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'})}</span>`;
      }
      // تحقق إذا كان هناك إشعار غير مقروء من هذا المستخدم
      const hasUnread = Array.isArray(notifications) && notifications.some(n =>
        n.type === 'chat' && !n.read && n.from === u.username
      );
      return `
        <div class="chat-user${hasUnread ? ' has-unread' : ''}" data-username="${u.username}">
          <div style="font-weight:600;">
            ${u.username}
            ${hasUnread ? '<span class="chat-unread-dot"></span>' : ''}
          </div>
          <div style="color:#1976d2;font-size:0.93em;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
            ${msgText}
            ${msgTime ? `<div>${msgTime}</div>` : ''}
          </div>
        </div>
      `;
    }));
    usersListContainer.innerHTML = userItems.length ? userItems.join('') : '<div style="color:#888;padding:8px;text-align:center;">لا يوجد مستخدمين آخرين</div>';
    document.getElementById('chatWindow').innerHTML = '';

    // بعد فتح النافذة، عيّن كل إشعار غير مقروء من نوع chat كمقروء
    const userObj = JSON.parse(localStorage.getItem('user') || '{}');
    const username = userObj.username;
    if (username) {
      try {
        const res = await fetch(`/notifications/${encodeURIComponent(username)}`);
        const notifications = await res.json();
        for (const notif of notifications) {
          if (notif.type === 'chat' && !notif.read && notif._id) {
            await fetch(`/notifications/${notif._id}/read`, { method: 'PUT' });
          }
        }
      } catch (e) {}
    }
    document.getElementById('chatNotifBadge').style.display = 'none';
  };

  // إغلاق نافذة الدردشة عند الضغط خارجها + إخفاء السهم
  document.addEventListener('click', function(e) {
    const chatModal = document.getElementById('chatModal');
    const chatArrow = document.getElementById('chatArrow');
    if (chatModal.style.display === 'block' && !chatModal.contains(e.target) && e.target.id !== 'chatIcon') {
      chatModal.style.display = 'none';
      if (chatArrow) chatArrow.style.display = 'none';
    }
  });

  // إعادة ضبط موقع نافذة الدردشة عند تغيير حجم الشاشة + إعادة ضبط السهم
  window.addEventListener('resize', function() {
    const chatModal = document.getElementById('chatModal');
    const chatIcon = document.getElementById('chatIcon');
    const chatArrow = document.getElementById('chatArrow');
    if (chatModal.style.display === 'block') {
      chatModal.style.top = (window.scrollY + chatIcon.getBoundingClientRect().bottom + 6) + 'px';
      chatModal.style.right = (window.innerWidth - chatIcon.getBoundingClientRect().right - 4) + 'px';
      chatModal.style.left = 'auto';
      if (chatArrow) {
        chatArrow.style.top = (chatIcon.offsetHeight + 4) + 'px';
      }
    }
  });

  // فتح نافذة شات جديدة أو إظهار نافذة موجودة عند اختيار مستخدم
  document.getElementById('chatUsersList').onclick = function(e) {
    const userDiv = e.target.closest('.chat-user');
    if (userDiv) {
      const selectedUser = userDiv.dataset.username;
      openChatWindow(selectedUser);
      document.getElementById('chatModal').style.display = 'none';
    }
  };

  // دالة لإنشاء نافذة شات جديدة أو إظهار نافذة موجودة
  async function openChatWindow(username) {
    // تحقق إذا كانت النافذة موجودة بالفعل
    let chatBox = document.querySelector(`.bottomChatBox[data-username="${username}"]`);
    if (!chatBox) {
      // أنشئ نافذة جديدة
      chatBox = document.createElement('div');
      chatBox.className = 'bottomChatBox';
      chatBox.setAttribute('data-username', username);
      chatBox.style.cssText = "display:block; position:fixed; bottom:0; right:0; left:auto; margin:0; width:320px; max-width:96vw; background:#fff; border-radius:0; box-shadow:0 -2px 18px #2e8ca322; z-index:10002; border:none; padding:0; height:370px;";
      chatBox.innerHTML = `
        <div style="display:flex;flex-direction:column;height:100%;">
          <div style="display:flex;align-items:center;justify-content:space-between; margin-bottom:2px; margin-top:-2px; background:#2e8ca3; border-radius:0; padding:4px 8px;">
            <span class="bottomChatSelectedUser"
              style="background:transparent;color:#fff;font-weight:700;font-size:0.97em;border-radius:0;padding:0 8px 0 0;box-shadow:none;cursor:pointer;line-height:1.1;border:none;margin-right:4px;margin-left:2px;min-width:0;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color 0.18s;"
            >${username}</span>
            <button class="closeBottomChatBtn"
              style="background:none;border:none;color:#fff;font-size:1.18em;cursor:pointer;line-height:1.1;padding:0 4px 0 0;border-radius:0;transition:background 0.18s;height:28px;width:28px;display:flex;align-items:center;justify-content:center;"
              title="إغلاق"
            >&#10006;</button>
          </div>
          <div class="bottomChatWindow" style="flex:1 1 auto; border-top:1px solid #eee; padding-top:7px; overflow-y:auto; background:#f8fafd; border-radius:6px; margin-bottom:6px; font-size:0.85em; min-height:0;"></div>
          <div style="display:flex; gap:6px; align-items:center; justify-content:center; padding:8px 12px 10px 12px; background:#fff;">
            <input class="bottomChatInput" type="text" placeholder="اكتب رسالة..." style="flex:1; padding:3px 12px; border-radius:7px; border:1.2px solid #2e8ca3; font-size:1em; font-family:'Cairo','Tajawal',Arial,sans-serif; letter-spacing:0.22px; background:#f7fcff; color:#1a3b50; box-shadow:0 1px 4px #2e8ca322; outline:none; transition:border 0.18s; min-width:0; height:24px;">
            <span class="bottomSendChatBtn" style="display:inline-flex;align-items:center;justify-content:center; background:#2e8ca3; color:#fff; border-radius:50%; width:32px; height:32px; cursor:pointer; font-size:1.35em; box-shadow:0 1px 4px #2e8ca322; transition:background 0.18s;">
              <svg viewBox="0 0 24 24" width="22" height="22" style="margin:auto;" fill="currentColor">
                <path d="M2 21l21-9-21-9v7l15 2-15 2z"/>
              </svg>
            </span>
          </div>
        </div>
      `;
      document.body.appendChild(chatBox);

      // زر الإغلاق للنافذة
      chatBox.querySelector('.closeBottomChatBtn').onclick = function() {
        chatBox.style.display = 'none';
        showMiniChatBtn(username);
      };

      // إرسال الرسالة عند الضغط على الأيقونة أو زر Enter
      const sendBtn = chatBox.querySelector('.bottomSendChatBtn');
      const input = chatBox.querySelector('.bottomChatInput');
      const chatWindow = chatBox.querySelector('.bottomChatWindow');
      sendBtn.onclick = function() {
        sendChatMsg(username, input, chatWindow);
      };
      input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          sendChatMsg(username, input, chatWindow);
          e.preventDefault();
        }
      });
    } else {
      chatBox.style.display = 'block';
      chatBox.style.zIndex = 10002;
      hideMiniChatBtn(username);
    }

    // جلب الرسائل المحفوظة من السيرفر وعرضها دائماً عند فتح الشات
    const chatWindow = chatBox.querySelector('.bottomChatWindow');
    const userObj = JSON.parse(localStorage.getItem('user') || '{}');
    const fromUserId = userObj.username;
    if (fromUserId && username && chatWindow) {
      try {
        const res = await fetch(`/chats/${fromUserId}/${username}`);
        const messages = await res.json();
        chatWindow.innerHTML = '';
        messages.forEach(msg => {
          const msgDiv = document.createElement('div');
          // تنسيق بسيط وسهل القراءة: اسم المرسل على الشمال، الرسالة بجواره، التاريخ بخط أصغر وتحته
          const isMe = msg.from === fromUserId;
          const senderName = isMe ? 'أنت' : msg.from;
          msgDiv.style.cssText =
            "display: flex; flex-direction: column; align-items: " + (isMe ? "flex-end" : "flex-start") +
            "; margin:8px 0 8px 0; padding:6px 10px; background:" + (isMe ? "#e3f7fa" : "#fff") +
            "; border-radius:10px; max-width:92%; min-width:60px; box-shadow:0 1px 4px #2e8ca311; font-size:1em;";

          msgDiv.innerHTML = `
            <div style="display:flex;flex-direction:row;align-items:center;gap:7px;">
              <span style="color:#2e8ca3;font-weight:700;min-width:44px;text-align:left;direction:ltr;display:inline-block;">
                ${senderName}:
              </span>
              <span style="color:#1a3b50;word-break:break-word;">${msg.text}</span>
            </div>
            <div style="color:#888;font-size:0.80em;margin-top:2px;text-align:${isMe ? 'right' : 'left'};">
              ${msg.date ? (new Date(msg.date)).toLocaleDateString('ar-EG') + ' ' + (new Date(msg.date)).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'}) : ''}
            </div>
          `;
          chatWindow.appendChild(msgDiv);
        });
        chatWindow.scrollTop = chatWindow.scrollHeight;
      } catch (err) {
        chatWindow.innerHTML = '<div style="color:#888;text-align:center;">تعذر تحميل الرسائل</div>';
      }
    }

    // ترتيب مربعات الدردشة جنب بعض
    arrangeChatBoxes();
    shiftMiniChatBtns();
  }

  // دالة لترتيب مربعات الدردشة جنب بعض (تفتح جنب بعض وليس فوق بعض)
  function arrangeChatBoxes() {
    const chatBoxes = Array.from(document.querySelectorAll('.bottomChatBox'))
      .filter(box => box.style.display === 'block');
    chatBoxes.forEach((box, idx) => {
      box.style.right = (idx * 340) + 'px'; // 320px عرض + 20px فراغ
      box.style.bottom = '0';
      box.style.left = 'auto';
      box.style.position = 'fixed';
    });
  }

  function shiftMiniChatBtns() {
  const chatBoxes = Array.from(document.querySelectorAll('.bottomChatBox'))
    .filter(box => box.style.display === 'block');
  const miniBtns = Array.from(document.querySelectorAll('.miniChatBtn'))
    .filter(btn => btn.style.display === 'block');

  miniBtns.forEach((btn, idx) => {
    btn.style.position = 'fixed';
    btn.style.bottom = '0'; // ملاصق للأسفل
    btn.style.right = ((chatBoxes.length + idx) * 340) + 22 + 'px';
    btn.style.zIndex = 10003;
    btn.style.margin = '0';
  });
}

  // عند إغلاق نافذة الشات أعد ترتيب مربعات الدردشة
  function showMiniChatBtn(username) {
    let miniBtn = document.querySelector(`.miniChatBtn[data-username="${username}"]`);
    if (!miniBtn) {
      miniBtn = document.createElement('button');
      miniBtn.className = 'miniChatBtn';
      miniBtn.setAttribute('data-username', username);
      miniBtn.style.cssText = `
        min-width:320px;
        width:320px;
        max-width:96vw;
        background:#e3f7fa;
        color:#1976d2;
        border-radius:0 0 0 0;
        box-shadow:0 2px 8px #2e8ca322;
        border:2px solid #b2e2f2;
        border-bottom:none;
        padding:6px 16px 7px 12px;
        font-weight:700;
        font-size:1em;
        cursor:pointer;
        text-align:right;
        font-family:'Tajawal','Cairo',Arial,sans-serif;
        letter-spacing:0.3px;
        transition:background 0.18s, color 0.18s, box-shadow 0.18s;
        white-space:nowrap;
        overflow:hidden;
        text-overflow:ellipsis;
        line-height:1.18;
        margin-bottom:0;
        display:block;
        position:fixed;
        bottom:0;
        z-index:10003;
      `;
      // زر الإغلاق على اليمين والاسم على اليسار مع تباعد مناسب
      miniBtn.innerHTML = `
        <span class="miniChatCloseBtn" style="display:inline-block;vertical-align:middle;margin-left:12px;background:none;border:none;color:#2e8ca3;font-size:1.18em;cursor:pointer;padding:0 4px;">&#10006;</span>
        <span style="vertical-align:middle;">${username}</span>
      `;
      miniBtn.onclick = function(e) {
        if (e.target.classList.contains('miniChatCloseBtn')) {
          miniBtn.style.display = 'none';
          return;
        }
        openChatWindow(username);
        miniBtn.style.display = 'none';
      };
      document.getElementById('miniChatBtnsContainer').appendChild(miniBtn);
    }
    miniBtn.style.display = 'block';
    shiftMiniChatBtns();
    arrangeChatBoxes();
  }

  function hideMiniChatBtn(username) {
    const miniBtn = document.querySelector(`.miniChatBtn[data-username="${username}"]`);
    if (miniBtn) miniBtn.style.display = 'none';
    shiftMiniChatBtns();
    arrangeChatBoxes();
  }

  // نفذ عند التحميل (سواء تم إدراج الشريط مباشرة أو ديناميكياً)
  function initMainNavbar() {
    updateNavbarUserName();
    setupNavbarLogout();
    setupNavbarMenuDropdown();
    // تأكد من تنفيذ الدالة بعد تحميل كل العناصر
    setTimeout(checkUnreadChats, 800);
    setInterval(checkUnreadChats, 15000);
  }

  // نفذ مباشرة إذا تم تحميل الشريط كصفحة مستقلة
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initMainNavbar);
  } else {
    initMainNavbar();
  }

  // إذا تم إدراج الشريط ديناميكياً من صفحة أخرى، يمكن استدعاء window.initMainNavbar()
  window.initMainNavbar = initMainNavbar;

  if (document.getElementById('miniChatBtn')) {
    document.getElementById('miniChatBtn').onclick = function() {
      document.getElementById('bottomChatBox').style.display = 'block';
      this.style.display = 'none';
    };
  }
  if (document.getElementById('bottomChatSelectedUser')) {
    document.getElementById('bottomChatSelectedUser').onclick = function() {
      document.getElementById('bottomChatBox').style.display = 'none';
      const miniBtn = document.getElementById('miniChatBtn');
      if (miniBtn) {
        document.getElementById('miniChatBtnUser').textContent = window._selectedChatUser || '';
        miniBtn.style.display = 'block';
      }
    };
  }
  // دالة لإرسال الرسالة فعلياً للسيرفر
  async function sendChatMsg(username, input, chatWindow) {
    const msg = input.value.trim();
    if (!msg) return;
    input.value = '';
    // جلب بيانات المستخدم الحالي
    const userObj = JSON.parse(localStorage.getItem('user') || '{}');
    const fromUserId = userObj.username;
    const toUserId = username;
    if (!fromUserId || !toUserId) return;

    // إرسال الرسالة للسيرفر
    try {
      await fetch('/chats/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          fromUserId,
          toUserId,
          message: msg
        })
      });
      // بعد الإرسال، أضف الرسالة في نافذة الشات مباشرة
      const msgDiv = document.createElement('div');
      msgDiv.style.cssText =
        "display: flex; flex-direction: column; align-items: flex-end; margin:8px 0 8px 0; padding:6px 10px; background:#e3f7fa; border-radius:10px; max-width:92%; min-width:60px; box-shadow:0 1px 4px #2e8ca311; font-size:1em;";
      msgDiv.innerHTML = `
        <div style="display:flex;flex-direction:row;align-items:center;gap:7px;">
          <span style="color:#2e8ca3;font-weight:700;min-width:44px;text-align:left;direction:ltr;display:inline-block;">
            أنت:
          </span>
          <span style="color:#1a3b50;word-break:break-word;">${msg}</span>
        </div>
        <div style="color:#888;font-size:0.80em;margin-top:2px;text-align:right;">
          ${(new Date()).toLocaleDateString('ar-EG')} ${(new Date()).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'})}
        </div>
      `;
      chatWindow.appendChild(msgDiv);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    } catch (err) {
      // يمكنك عرض رسالة خطأ هنا إذا أردت
    }
  }
</script>
</script>
</script>
</script>
</script>
</script>
</script>
</script>
</script>
</script>
