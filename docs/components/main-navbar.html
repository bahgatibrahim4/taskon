<script>
  // حماية الصفحة
  if (!localStorage.getItem('user')) {
    window.location.href = 'login.html';
  }
  // تحديث اسم المستخدم
  function updateNavbarUserNameModern() {
    var userNameSpan = document.getElementById('userNameModern');
    if (!userNameSpan) return;
    var userStr = localStorage.getItem('user');
    var username = '';
    if (userStr) {
      try {
        var userObj = JSON.parse(userStr);
        username = userObj.username || '';
      } catch (e) { username = ''; }
    }
    userNameSpan.textContent = username;
    userNameSpan.style.display = username ? 'inline-block' : 'none';
  }
  // زر الخروج
  function setupNavbarLogoutModern() {
    const userAvatar = document.getElementById('userAvatarModern');
    const userInfo = document.getElementById('userInfoModern');
    const logoutBtn = document.getElementById('logoutBtnModern');
    if (userAvatar && userInfo && logoutBtn) {
      userAvatar.onclick = function(e) {
        e.stopPropagation();
        userInfo.classList.toggle('show-logout-modern');
      };
      document.addEventListener('click', function(e) {
        if (!userInfo.contains(e.target)) {
          userInfo.classList.remove('show-logout-modern');
        }
      });
      logoutBtn.onclick = function() {
        localStorage.removeItem('user');
        window.location.href = 'login.html';
      };
    }
  }
  // قائمة الصفحات
  const NAVBAR_PAGES = [
    { name: "الرئيسية", href: "index.html" },
    { name: "المستخلصات", href: "extracts.html" },
    { name: "المقاولون", href: "contractors.html" },
    { name: "الموردين", href: "suppliers.html" },
    { name: "المخزن", href: "store.html" },
    { name: "العمال", href: "workers.html" },
    { name: "المعدات", href: "equipment.html" },
    { name: "التوريدات", href: "deliveries.html" },
    { name: "المشتريات", href: "purchases.html" },
    { name: "المستخدمون", href: "users.html" }
    // أضف أو عدل حسب صفحاتك
  ];
  function setupNavbarMenuDropdownModern() {
    const icon = document.getElementById('navbarMenuIconModern');
    const dropdown = document.getElementById('navbarMenuDropdownModern');
    if (!icon || !dropdown) return;
    dropdown.innerHTML = NAVBAR_PAGES.map(page =>
      `<a href="${page.href}">${page.name}</a>`
    ).join('');
    icon.onclick = function(e) {
      e.stopPropagation();
      dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
    };
    document.addEventListener('click', function(e) {
      if (dropdown.style.display === 'block' && !dropdown.contains(e.target) && e.target !== icon) {
        dropdown.style.display = 'none';
      }
    });
  }
  // عدد الرسائل غير المقروءة
  async function checkUnreadChatsModern() {
    const badge = document.getElementById('chatNotifBadgeModern');
    if (!badge) return;
    let userObj;
    try { userObj = JSON.parse(localStorage.getItem('user') || '{}'); } catch (e) { userObj = {}; }
    const username = userObj.username;
    if (!username) { badge.style.display = 'none'; return; }
    try {
      const res = await fetch(`/notifications/${encodeURIComponent(username)}?t=${Date.now()}`);
      const notifications = await res.json();
      const unreadCount = Array.isArray(notifications)
        ? notifications.filter(n => n.type === 'chat' && !n.read).length
        : 0;
      if (unreadCount > 0) {
        badge.textContent = unreadCount > 9 ? '9+' : unreadCount;
        badge.style.display = 'block';
      } else {
        badge.style.display = 'none';
      }
    } catch (e) { badge.style.display = 'none'; }
  }
  // فتح نافذة الدردشة
  document.getElementById('chatIconModern').onclick = async function(e) {
    e.stopPropagation();
    const chatModal = document.getElementById('chatModalModern');
    // إغلاق/فتح
    if (chatModal.style.display === 'block') {
      chatModal.style.display = 'none';
      return;
    }
    chatModal.style.display = 'block';
    // جلب المستخدمين
    let users = [];
    try { const res = await fetch('/users'); users = await res.json(); } catch (err) { users = []; }
    const currentUser = JSON.parse(localStorage.getItem('user') || '{}').username;
    // جلب الإشعارات غير المقروءة للمستخدم الحالي
    let notifications = [];
    try { const notifRes = await fetch(`/notifications/${encodeURIComponent(currentUser)}`); notifications = await notifRes.json(); } catch (e) { notifications = []; }
    // جلب آخر رسالة لكل مستخدم
    const usersListContainer = document.getElementById('chatUsersListModern');
    usersListContainer.innerHTML = '<div style="color:#888;padding:8px;text-align:center;">جاري التحميل...</div>';
    const otherUsers = users.filter(u => u.username !== currentUser);
    const userItems = await Promise.all(otherUsers.map(async u => {
      let lastMsg = null;
      try { const res = await fetch(`/chats/last/${currentUser}/${u.username}`); lastMsg = await res.json(); } catch {}
      let msgText = lastMsg && lastMsg.text ? lastMsg.text : 'لا توجد رسائل بعد';
      let msgTime = '';
      if (lastMsg && lastMsg.date) {
        const d = new Date(lastMsg.date);
        msgTime = `<span style="color:#888;font-size:0.82em;">${d.toLocaleDateString('ar-EG')} ${d.toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'})}</span>`;
      }
      // تحقق إذا كان هناك إشعار غير مقروء من هذا المستخدم
      const hasUnread = Array.isArray(notifications) && notifications.some(n =>
        n.type === 'chat' && !n.read && n.from === u.username
      );
      return `
        <div class="chat-user-modern${hasUnread ? ' has-unread' : ''}" data-username="${u.username}">
          <span style="font-weight:700;">
            ${u.username}
            ${hasUnread ? '<span class="chat-unread-dot-modern"></span>' : ''}
          </span>
          <span style="color:#1976d2;font-size:0.93em;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
            ${msgText}
            ${msgTime ? `<div>${msgTime}</div>` : ''}
          </span>
        </div>
      `;
    }));
    usersListContainer.innerHTML = userItems.length ? userItems.join('') : '<div style="color:#888;padding:8px;text-align:center;">لا يوجد مستخدمين آخرين</div>';
    document.getElementById('chatWindowModern').innerHTML = '';
    // عيّن كل إشعار غير مقروء من نوع chat كمقروء
    const username = currentUser;
    if (username) {
      try {
        const res = await fetch(`/notifications/${encodeURIComponent(username)}`);
        const notifications = await res.json();
        for (const notif of notifications) {
          if (notif.type === 'chat' && !notif.read && notif._id) {
            await fetch(`/notifications/${notif._id}/read`, { method: 'PUT' });
          }
        }
      } catch (e) {}
    }
    document.getElementById('chatNotifBadgeModern').style.display = 'none';
  };
  // إغلاق نافذة الدردشة
  document.getElementById('closeChatModalModern').onclick = function() {
    document.getElementById('chatModalModern').style.display = 'none';
  };
  document.getElementById('chatUsersListModern').onclick = function(e) {
    const userDiv = e.target.closest('.chat-user-modern');
    if (userDiv) {
      const selectedUser = userDiv.dataset.username;
      openChatWindowModern(selectedUser);
      document.getElementById('chatModalModern').style.display = 'none';
    }
  };
  // فتح نافذة شات أنيقة أسفل الصفحة
  async function openChatWindowModern(username) {
    let chatBox = document.querySelector(`.bottom-chat-box-modern[data-username="${username}"]`);
    if (!chatBox) {
      chatBox = document.createElement('div');
      chatBox.className = 'bottom-chat-box-modern';
      chatBox.setAttribute('data-username', username);
      chatBox.style.display = 'block';
      chatBox.innerHTML = `
        <div class="bottom-chat-header-modern">
          <span class="bottom-chat-selected-user-modern">${username}</span>
          <button class="close-bottom-chat-btn-modern" title="إغلاق">&#10006;</button>
        </div>
        <div class="bottom-chat-window-modern"></div>
        <div class="bottom-chat-input-row-modern">
          <input class="bottom-chat-input-modern" type="text" placeholder="اكتب رسالة...">
          <span class="bottom-send-chat-btn-modern" title="إرسال">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="#fff"><path d="M2 21l21-9-21-9v7l15 2-15 2z"/></svg>
          </span>
        </div>
      `;
      document.body.appendChild(chatBox);
      chatBox.querySelector('.close-bottom-chat-btn-modern').onclick = function() {
        chatBox.style.display = 'none';
        showMiniChatBtnModern(username);
      };
      const sendBtn = chatBox.querySelector('.bottom-send-chat-btn-modern');
      const input = chatBox.querySelector('.bottom-chat-input-modern');
      const chatWindow = chatBox.querySelector('.bottom-chat-window-modern');
      sendBtn.onclick = function() {
        sendChatMsgModern(username, input, chatWindow);
      };
      input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          sendChatMsgModern(username, input, chatWindow);
          e.preventDefault();
        }
      });
    } else {
      chatBox.style.display = 'block';
      chatBox.style.zIndex = 10004;
      hideMiniChatBtnModern(username);
    }
    // جلب الرسائل
    const chatWindow = chatBox.querySelector('.bottom-chat-window-modern');
    const userObj = JSON.parse(localStorage.getItem('user') || '{}');
    const fromUserId = userObj.username;
    if (fromUserId && username && chatWindow) {
      try {
        const res = await fetch(`/chats/${fromUserId}/${username}`);
        const messages = await res.json();
        chatWindow.innerHTML = '';
        messages.forEach(msg => {
          const msgDiv = document.createElement('div');
          const isMe = msg.from === fromUserId;
          const senderName = isMe ? 'أنت' : msg.from;
          msgDiv.style.cssText =
            "display: flex; flex-direction: column; align-items: " + (isMe ? "flex-end" : "flex-start") +
            "; margin:8px 0 8px 0; padding:6px 10px; background:" + (isMe ? "#e3f7fa" : "#fff") +
            "; border-radius:12px; max-width:92%; min-width:60px; box-shadow:0 1px 4px #2e8ca311; font-size:1em;";
          msgDiv.innerHTML = `
            <div style="display:flex;flex-direction:row;align-items:center;gap:7px;">
              <span style="color:#2e8ca3;font-weight:700;min-width:44px;text-align:left;direction:ltr;display:inline-block;">
                ${senderName}:
              </span>
              <span style="color:#1a3b50;word-break:break-word;">${msg.text}</span>
            </div>
            <div style="color:#888;font-size:0.80em;margin-top:2px;text-align:${isMe ? 'right' : 'left'};">
              ${msg.date ? (new Date(msg.date)).toLocaleDateString('ar-EG') + ' ' + (new Date(msg.date)).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'}) : ''}
            </div>
          `;
          chatWindow.appendChild(msgDiv);
        });
        chatWindow.scrollTop = chatWindow.scrollHeight;
      } catch (err) {
        chatWindow.innerHTML = '<div style="color:#888;text-align:center;">تعذر تحميل الرسائل</div>';
      }
    }
    arrangeChatBoxesModern();
    shiftMiniChatBtnsModern();
  }
  function arrangeChatBoxesModern() {
    const chatBoxes = Array.from(document.querySelectorAll('.bottom-chat-box-modern'))
      .filter(box => box.style.display === 'block');
    chatBoxes.forEach((box, idx) => {
      box.style.right = (idx * 380) + 'px';
      box.style.bottom = '0';
      box.style.left = 'auto';
      box.style.position = 'fixed';
    });
  }
  function shiftMiniChatBtnsModern() {
    const chatBoxes = Array.from(document.querySelectorAll('.bottom-chat-box-modern'))
      .filter(box => box.style.display === 'block');
    const miniBtns = Array.from(document.querySelectorAll('.mini-chat-btn-modern'))
      .filter(btn => btn.style.display === 'block');
    miniBtns.forEach((btn, idx) => {
      btn.style.position = 'fixed';
      btn.style.bottom = '0';
      btn.style.right = ((chatBoxes.length + idx) * 380) + 22 + 'px';
      btn.style.zIndex = 10006;
      btn.style.margin = '0';
    });
  }
  function showMiniChatBtnModern(username) {
    let miniBtn = document.querySelector(`.mini-chat-btn-modern[data-username="${username}"]`);
    if (!miniBtn) {
      miniBtn = document.createElement('button');
      miniBtn.className = 'mini-chat-btn-modern';
      miniBtn.setAttribute('data-username', username);
      miniBtn.innerHTML = `
        <span class="mini-chat-close-btn-modern">&#10006;</span>
        <span style="vertical-align:middle;">${username}</span>
      `;
      miniBtn.onclick = function(e) {
        if (e.target.classList.contains('mini-chat-close-btn-modern')) {
          miniBtn.style.display = 'none';
          return;
        }
        openChatWindowModern(username);
        miniBtn.style.display = 'none';
      };
      document.getElementById('miniChatBtnsContainerModern').appendChild(miniBtn);
    }
    miniBtn.style.display = 'block';
    shiftMiniChatBtnsModern();
    arrangeChatBoxesModern();
  }
  function hideMiniChatBtnModern(username) {
    const miniBtn = document.querySelector(`.mini-chat-btn-modern[data-username="${username}"]`);
    if (miniBtn) miniBtn.style.display = 'none';
    shiftMiniChatBtnsModern();
    arrangeChatBoxesModern();
  }
  // إرسال الرسالة فعلياً
  async function sendChatMsgModern(username, input, chatWindow) {
    const msg = input.value.trim();
    if (!msg) return;
    input.value = '';
    const userObj = JSON.parse(localStorage.getItem('user') || '{}');
    const fromUserId = userObj.username;
    const toUserId = username;
    if (!fromUserId || !toUserId) return;
    try {
      await fetch('/chats/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fromUserId, toUserId, message: msg })
      });
      // أضف الرسالة مباشرة
      const msgDiv = document.createElement('div');
      msgDiv.style.cssText =
        "display: flex; flex-direction: column; align-items: flex-end; margin:8px 0 8px 0; padding:6px 10px; background:#e3f7fa; border-radius:12px; max-width:92%; min-width:60px; box-shadow:0 1px 4px #2e8ca311; font-size:1em;";
      msgDiv.innerHTML = `
        <div style="display:flex;flex-direction:row;align-items:center;gap:7px;">
          <span style="color:#2e8ca3;font-weight:700;min-width:44px;text-align:left;direction:ltr;display:inline-block;">
            أنت:
          </span>
          <span style="color:#1a3b50;word-break:break-word;">${msg}</span>
        </div>
        <div style="color:#888;font-size:0.80em;margin-top:2px;text-align:right;">
          ${(new Date()).toLocaleDateString('ar-EG')} ${(new Date()).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'})}
        </div>
      `;
      chatWindow.appendChild(msgDiv);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    } catch (err) { }
  }
  // تنفيذ عند التحميل
  function initMainNavbarModern() {
    updateNavbarUserNameModern();
    setupNavbarLogoutModern();
    setupNavbarMenuDropdownModern();
    setTimeout(checkUnreadChatsModern, 800);
    setInterval(checkUnreadChatsModern, 15000);
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initMainNavbarModern);
  } else {
    initMainNavbarModern();
  }
  window.initMainNavbarModern = initMainNavbarModern;
</script>
