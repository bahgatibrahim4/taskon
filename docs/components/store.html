<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>المخزن | سعيد أحمد بالبيد</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { direction: rtl; }
    body {
      margin: 0;
      font-family: 'Cairo', Arial, sans-serif;
      background: #c5d6db;
      min-height: 100vh;
      /* direction: rtl; */ /* تم نقلها إلى :root */
    }
    .container {
      max-width: 1300px;
      margin: 24px auto;
      background: #f7fafd;
      border-radius: 18px;
      box-shadow: 0 0 24px #0002;
      padding: 28px 24px 18px 24px;
      border: 2px solid #8c969a;
    }
    h2 {
      color: #2e8ca3;
      margin-top: 0;
      margin-bottom: 18px;
      font-size: 1.25rem;
      font-weight: bold;
      letter-spacing: 1px;
      text-align: right;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #f7fafd;
      margin-bottom: 8px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 12px #8c969a;
    }
    th, td {
      padding: 8px 4px;
      border-bottom: 1px solid #c5d6db;
      text-align: center;
      vertical-align: middle;
      font-size: 0.95rem;
      background: transparent;
      white-space: nowrap;
      word-break: break-word;
    }
    th {
      background: #2e8ca3 !important;
      color: #fff !important;
      font-weight: bold;
      font-size: 0.95rem;
    }
    tr:last-child td {
      border-bottom: none;
    }
    tr:hover td {
      background: #c5d6db;
      transition: background 0.18s;
    }
    @media (max-width: 900px) {
      .container { padding: 8px; }
      table { font-size: .92rem; }
      th, td { padding: 4px; }
    }
  </style>
</head>
<body>
  <div id="navbar-container"></div>
  <div class="container">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
      <div style="display:flex;gap:8px;">
        <button id="openIssueModalBtn" style="background:#388e3c;color:#fff;border:2px solid #1976d2;border-radius:0;padding:6px 16px;font-size:0.98rem;font-family:'Cairo',Arial,sans-serif;font-weight:600;cursor:pointer;box-shadow:0 2px 10px #0001;transition:background 0.2s, border 0.2s;">
          صرف مواد
        </button>
        <button id="storeReportBtn" style="background:#fff;color:#1976d2;border:2px solid #1976d2;border-radius:0;padding:6px 14px;font-size:0.98rem;font-family:'Cairo',Arial,sans-serif;font-weight:600;cursor:pointer;box-shadow:0 2px 10px #0001;transition:background 0.2s, border 0.2s;">
          تقارير المخزن
        </button>
        <!-- زر تصدير إلى Excel -->
        <button id="exportExcelBtn" style="background:#fff;color:#2e8ca3;border:2px solid #2e8ca3;border-radius:0;padding:6px 14px;font-size:0.98rem;font-family:'Cairo',Arial,sans-serif;font-weight:600;cursor:pointer;box-shadow:0 2px 10px #0001;transition:background 0.2s, border 0.2s;">
          تصدير Excel
        </button>
      </div>
      <div style="flex:1;display:flex;align-items:center;justify-content:center;">
        <h2 style="margin-bottom:0;text-align:center;flex:0 0 auto;">جدول المخزون</h2>
      </div>
      <div style="display:flex;align-items:center;gap:0;">
        <input id="searchInput" type="text" placeholder="بحث..." style="border:2px solid #2e8ca3;border-radius:0 8px 8px 0;padding:7px 12px;font-size:1rem;outline:none;min-width:160px;">
        <button id="openFilterModalBtn" title="فلترة متقدمة" style="background:#fff;border:2px solid #2e8ca3;border-left:none;border-radius:8px 0 0 8px;padding:7px 10px;cursor:pointer;">
          <svg width="18" height="18" viewBox="0 0 20 20" fill="#2e8ca3" xmlns="http://www.w3.org/2000/svg"><path d="M3 5a1 1 0 0 1 1-1h12a1 1 0 0 1 .8 1.6l-4.6 6.4V16a1 1 0 0 1-1.447.894l-2-1A1 1 0 0 1 8 15v-3.01L3.2 6.6A1 1 0 0 1 3 5z"/></svg>
        </button>
      </div>
    </div>
    <!-- نافذة صرف مواد -->
    <div id="issueModal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.18); z-index:1000; align-items:center; justify-content:center;">
      <div style="background:#fff; border-radius:14px; box-shadow:0 2px 16px #0003; padding:28px 18px 18px 18px; min-width:320px; max-width:95vw; margin:auto; position:relative; display:flex; flex-direction:column; align-items:center;">
        <button id="closeIssueModalBtn" style="position:absolute;left:12px;top:8px;background:none;border:none;font-size:1.5rem;color:#e53935;cursor:pointer;">&times;</button>
        <h3 style="color:#1976d2;margin-top:0;margin-bottom:18px;font-family:'Tajawal','Cairo',Arial,sans-serif;">صرف مواد</h3>
        <form id="issueForm" style="display:flex;flex-direction:column;gap:12px;width:100%;max-width:340px;">
          <label style="font-weight:bold;color:#2e8ca3;">اسم المقاول
            <select name="contractor" id="contractorSelect" required style="width:100%;padding:7px 8px;border-radius:6px;border:1px solid #c5d6db;">
              <option value="">اختر المقاول</option>
            </select>
          </label>
          <label style="font-weight:bold;color:#2e8ca3;">التاريخ
            <input type="date" name="date" required style="width:100%;padding:7px 8px;border-radius:6px;border:1px solid #c5d6db;">
          </label>
          <label style="font-weight:bold;color:#2e8ca3;">المادة
            <select name="item" id="itemSelect" required style="width:100%;padding:7px 8px;border-radius:6px;border:1px solid #c5d6db;">
              <option value="">اختر المادة</option>
            </select>
          </label>
          <label style="font-weight:bold;color:#2e8ca3;">الكمية المتاحة: <span id="availableQty" style="color:#1976d2;">-</span></label>
          <label style="font-weight:bold;color:#2e8ca3;">الكمية المصروفة
            <input type="number" name="quantity" id="issueQtyInput" min="1" required style="width:100%;padding:7px 8px;border-radius:6px;border:1px solid #c5d6db;">
          </label>
          <label style="font-weight:bold;color:#2e8ca3;">الفئة (سعر الوحدة)
            <input type="number" name="unitPrice" id="unitPriceInput" min="0" step="any" required style="width:100%;padding:7px 8px;border-radius:6px;border:1px solid #c5d6db;" readonly>
          </label>
          <button type="submit" style="background:#388e3c;color:#fff;border:none;border-radius:7px;font-size:1rem;font-weight:bold;padding:9px 0;margin-top:8px;cursor:pointer;">صرف</button>
        </form>
      </div>
    </div>
    <!-- نافذة الفلترة المتقدمة -->
    <div id="filterModal" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.18);z-index:2000;align-items:center;justify-content:center;">
      <div style="background:#fff;border-radius:14px;box-shadow:0 2px 16px #0003;padding:28px 22px 18px 22px;min-width:320px;max-width:95vw;margin:auto;position:relative;">
        <button id="closeFilterModalBtn" style="position:absolute;left:12px;top:8px;background:none;border:none;font-size:1.5rem;color:#e53935;cursor:pointer;">&times;</button>
        <h3 style="color:#2e8ca3;margin-top:0;margin-bottom:18px;font-family:'Tajawal','Cairo',Arial,sans-serif;">فلترة المخزون</h3>
        <form id="filterForm" style="display:flex;flex-direction:column;gap:14px;">
          <label style="font-weight:bold;color:#2e8ca3;">من تاريخ
            <input type="date" id="filterFromDate" style="width:100%;padding:7px 8px;border-radius:6px;border:1px solid #c5d6db;">
          </label>
          <label style="font-weight:bold;color:#2e8ca3;">إلى تاريخ
            <input type="date" id="filterToDate" style="width:100%;padding:7px 8px;border-radius:6px;border:1px solid #c5d6db;">
          </label>
          <label style="font-weight:bold;color:#2e8ca3;">اسم المادة
            <select id="filterItemSelect" style="width:100%;padding:7px 8px;border-radius:6px;border:1px solid #c5d6db;">
              <option value="">كل المواد</option>
            </select>
          </label>
          <label style="font-weight:bold;color:#2e8ca3;">اسم المورد / المحل
            <input type="text" id="filterSupplierInput" placeholder="اسم المورد أو المحل" style="width:100%;padding:7px 8px;border-radius:6px;border:1px solid #c5d6db;">
          </label>
          <button type="submit" style="background:#2e8ca3;color:#fff;border:none;border-radius:7px;font-size:1rem;font-weight:bold;padding:9px 0;margin-top:8px;cursor:pointer;">تطبيق الفلتر</button>
        </form>
      </div>
    </div>
    <table id="storeTable">
      <thead>
        <tr>
          <th>م</th>
          <th>تاريخ التوريد</th>
          <th>اسم المورد<!-- يعرض من supplier أو store --></th>
          <th>الصنف</th>
          <th>الكمية</th>
          <th>الوحدة</th>
          <th>السعر للوحدة</th>
          <th>الإجمالي</th>
          <th>نوع العملية</th>
        </tr>
      </thead>
      <tbody>
        <!-- الصفوف تضاف ديناميكياً -->
      </tbody>
    </table>
  </div>
  <!-- أضف مكتبة SheetJS قبل السكريبتات -->
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <script>
    const tableBody = document.querySelector('#storeTable tbody');

    // جلب بيانات المخزون من السيرفر مباشرة
    async function fetchStore() {
      const res = await fetch('/store');
      return await res.json();
    }

    // جلب المقاولين
    async function fetchContractors() {
      const res = await fetch('/contractors');
      return await res.json();
    }

    // تعبئة قائمة المقاولين
    async function fillContractorsSelect() {
      const contractors = await fetchContractors();
      const select = document.getElementById('contractorSelect');
      select.innerHTML = '<option value="">اختر المقاول</option>';
      contractors.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c._id;
        opt.textContent = c.name || c.contractorName || '';
        select.appendChild(opt);
      });
    }

    // تعبئة قائمة المواد من بيانات المخزون
    let storeCache = [];
    async function fillItemsSelect() {
      if (!storeCache.length) storeCache = await fetchStore();
      const select = document.getElementById('itemSelect');
      select.innerHTML = '<option value="">اختر المادة</option>';
      // استخراج المواد الفريدة
      const items = [...new Set(storeCache.map(s => s.item).filter(Boolean))];
      items.forEach(item => {
        const opt = document.createElement('option');
        opt.value = item;
        opt.textContent = item;
        select.appendChild(opt);
      });
    }

    // إظهار الكمية المتاحة لمادة معينة من بيانات المخزون
    function getAvailableQty(itemName) {
      if (!storeCache.length) return '-';
      const item = storeCache.find(s => s.item === itemName);
      return item ? item.quantity : 0;
    }

    // نافذة صرف مواد
    const openIssueModalBtn = document.getElementById('openIssueModalBtn');
    const issueModal = document.getElementById('issueModal');
    const closeIssueModalBtn = document.getElementById('closeIssueModalBtn');
    const issueForm = document.getElementById('issueForm');
    const itemSelect = document.getElementById('itemSelect');
    const availableQtySpan = document.getElementById('availableQty');
    const issueQtyInput = document.getElementById('issueQtyInput');

    openIssueModalBtn.onclick = async function() {
      await fillContractorsSelect();
      storeCache = await fetchStore();
      await fillItemsSelect();
      availableQtySpan.textContent = '-';
      issueQtyInput.value = '';
      issueQtyInput.max = '';
      issueModal.style.display = 'flex';
    };
    closeIssueModalBtn.onclick = function() {
      issueModal.style.display = 'none';
    };
    issueModal.onclick = function(e) {
      if (e.target === issueModal) issueModal.style.display = 'none';
    };
    document.addEventListener('keydown', function(e) {
      if (issueModal.style.display === 'flex' && e.key === 'Escape') issueModal.style.display = 'none';
    });

    // عند اختيار مادة، أظهر الكمية المتاحة وحدد الحد الأقصى وأظهر الفئة
    itemSelect.onchange = function() {
      const item = itemSelect.value;
      if (!item) {
        availableQtySpan.textContent = '-';
        issueQtyInput.max = '';
        document.getElementById('unitPriceInput').value = '';
        return;
      }
      const itemObj = storeCache.find(s => s.item === item);
      availableQtySpan.textContent = itemObj ? itemObj.quantity : 0;
      issueQtyInput.max = itemObj ? itemObj.quantity : '';
      if (Number(issueQtyInput.value) > (itemObj ? itemObj.quantity : 0)) issueQtyInput.value = itemObj ? itemObj.quantity : '';
      // تعبئة الفئة تلقائياً
      document.getElementById('unitPriceInput').value = itemObj ? (itemObj.unitPrice || itemObj.category || '') : '';
    };

    // منع تجاوز الكمية المتاحة
    issueQtyInput.oninput = function() {
      const max = Number(issueQtyInput.max);
      if (max && Number(issueQtyInput.value) > max) {
        issueQtyInput.value = max;
      }
      if (Number(issueQtyInput.value) < 1) {
        issueQtyInput.value = 1;
      }
    };

    // احصل على اسم المستخدم الحالي من localStorage أو أي مصدر آخر
    const currentUserName = localStorage.getItem('username') || '';

    // حفظ عملية الصرف (ترسل للسيرفر فقط)
    issueForm.onsubmit = async function(e) {
      e.preventDefault();
      const data = {
        contractor: issueForm.contractor.value,
        date: issueForm.date.value,
        item: issueForm.item.value,
        quantity: issueForm.quantity.value,
        unitPrice: issueForm.unitPrice.value
      };
      // تحقق من القيم المطلوبة
      if (!data.contractor || !data.item || !data.quantity || !data.date) {
        alert('يجب تعبئة جميع الحقول المطلوبة');
        return;
      }
      // إذا اخترت مقاول، أرسل فقط contractor/item/quantity/date (بدون unitPrice)
      const reqBody = {
        contractor: data.contractor,
        item: data.item,
        quantity: data.quantity,
        date: data.date,
        userName: currentUserName // أضف اسم المستخدم هنا
      };
      const res = await fetch('/store/issue', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(reqBody)
      });
      if (res.ok) {
        alert('تم صرف المواد بنجاح');
        issueModal.style.display = 'none';
        issueForm.reset();
        await renderTable();
      } else {
        let errMsg = 'حدث خطأ أثناء الصرف';
        try {
          const err = await res.json();
          errMsg = err.error || errMsg;
        } catch {
          errMsg = 'حدث خطأ غير متوقع من السيرفر';
        }
        alert(errMsg);
      }
    }

    // عرض جدول المخزون من السيرفر مباشرة (فقط من كولكشن المخزن)
    // ملاحظة: الجدول يعرض فقط الداتا الموجودة فعليًا في كولكشن المخزن (store collection)
    async function renderTable() {
      const store = await fetchStore();
      storeCache = store;
      let filtered = store;

      // بحث نصي
      if (lastSearch) {
        const s = lastSearch.toLowerCase();
        filtered = filtered.filter(row =>
          (row.item && row.item.toLowerCase().includes(s)) ||
          (row.supplier && row.supplier.toLowerCase().includes(s)) ||
          (row.store && row.store.toLowerCase().includes(s))
        );
      }

      // فلترة متقدمة
      if (lastFilter) {
        if (lastFilter.from) {
          filtered = filtered.filter(row => row.date && new Date(row.date) >= new Date(lastFilter.from));
        }
        if (lastFilter.to) {
          filtered = filtered.filter(row => row.date && new Date(row.date) <= new Date(lastFilter.to));
        }
        if (lastFilter.item) {
          filtered = filtered.filter(row => row.item === lastFilter.item);
        }
        if (lastFilter.supplier) {
          const s = lastFilter.supplier.toLowerCase();
          filtered = filtered.filter(row =>
            (row.supplier && row.supplier.toLowerCase().includes(s)) ||
            (row.store && row.store.toLowerCase().includes(s))
          );
        }
      }

      tableBody.innerHTML = '';
      filtered.forEach((s, idx) => {
        const qtyStyle = Number(s.quantity) === 0 ? 'color:#c00;font-weight:bold;' : '';
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${idx + 1}</td>
          <td>${s.date || ''}</td>
          <td>${s.supplier || s.store || ''}</td>
          <td>${s.item || ''}</td>
          <td style="${qtyStyle}">${s.quantity || 0}</td>
          <td>${s.unit || ''}</td>
          <td>${s.unitPrice || s.category || ''}</td>
          <td>${s.total || ''}</td>
          <td>${s.operationType || ''}</td>
        `;
        tableBody.appendChild(tr);
      });
    }
    // عند تحميل الصفحة
    window.onload = renderTable;

    // زر تقارير المخزن
    document.addEventListener('DOMContentLoaded', function() {
      const storeReportBtn = document.getElementById('storeReportBtn');
      if (storeReportBtn) {
        storeReportBtn.onclick = function() {
          window.location.href = 'store-report.html';
        };
      }
    });

    // تعبئة قائمة المواد في نافذة الفلترة
    async function fillFilterItemSelect() {
      if (!storeCache.length) storeCache = await fetchStore();
      const select = document.getElementById('filterItemSelect');
      select.innerHTML = '<option value="">كل المواد</option>';
      const items = [...new Set(storeCache.map(s => s.item).filter(Boolean))];
      items.forEach(item => {
        const opt = document.createElement('option');
        opt.value = item;
        opt.textContent = item;
        select.appendChild(opt);
      });
    }

    // منطق نافذة الفلترة
    const openFilterModalBtn = document.getElementById('openFilterModalBtn');
    const filterModal = document.getElementById('filterModal');
    const closeFilterModalBtn = document.getElementById('closeFilterModalBtn');
    const filterForm = document.getElementById('filterForm');
    openFilterModalBtn.onclick = async function() {
      await fillFilterItemSelect();
      filterModal.style.display = 'flex';
    };
    closeFilterModalBtn.onclick = function() {
      filterModal.style.display = 'none';
    };
    filterModal.onclick = function(e) {
      if (e.target === filterModal) filterModal.style.display = 'none';
    };
    document.addEventListener('keydown', function(e) {
      if (filterModal.style.display === 'flex' && e.key === 'Escape') filterModal.style.display = 'none';
    });

    // منطق البحث والفلترة
    let lastSearch = '';
    let lastFilter = {};

    document.getElementById('searchInput').oninput = function() {
      lastSearch = this.value.trim();
      renderTable();
    };

    filterForm.onsubmit = function(e) {
      e.preventDefault();
      lastFilter = {
        from: document.getElementById('filterFromDate').value,
        to: document.getElementById('filterToDate').value,
        item: document.getElementById('filterItemSelect').value,
        supplier: document.getElementById('filterSupplierInput').value.trim()
      };
      filterModal.style.display = 'none';
      renderTable();
    };

    // زر تصدير المخزون إلى Excel
    document.getElementById('exportExcelBtn').onclick = function() {
      // استخدم الفلترة الحالية
      let filtered = storeCache;
      if (lastSearch) {
        const s = lastSearch.toLowerCase();
        filtered = filtered.filter(row =>
          (row.item && row.item.toLowerCase().includes(s)) ||
          (row.supplier && row.supplier.toLowerCase().includes(s)) ||
          (row.store && row.store.toLowerCase().includes(s))
        );
      }
      if (lastFilter) {
        if (lastFilter.from) {
          filtered = filtered.filter(row => row.date && new Date(row.date) >= new Date(lastFilter.from));
        }
        if (lastFilter.to) {
          filtered = filtered.filter(row => row.date && new Date(row.date) <= new Date(lastFilter.to));
        }
        if (lastFilter.item) {
          filtered = filtered.filter(row => row.item === lastFilter.item);
        }
        if (lastFilter.supplier) {
          const s = lastFilter.supplier.toLowerCase();
          filtered = filtered.filter(row =>
            (row.supplier && row.supplier.toLowerCase().includes(s)) ||
            (row.store && row.store.toLowerCase().includes(s))
          );
        }
      }
      const data = [
        ["م", "تاريخ التوريد", "اسم المورد", "الصنف", "الكمية", "الوحدة", "السعر للوحدة", "الإجمالي", "نوع العملية"]
      ];
      filtered.forEach((s, idx) => {
        data.push([
          idx + 1,
          s.date || '',
          s.supplier || s.store || '',
          s.item || '',
          s.quantity || 0,
          s.unit || '',
          s.unitPrice || s.category || '',
          s.total || '',
          s.operationType || ''
        ]);
      });
      const ws = XLSX.utils.aoa_to_sheet(data);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "المخزون");
      XLSX.writeFile(wb, "store.xlsx");
    };
  </script>
  <script>
    // ربط الصفحة بالشريط العلوي وتنفيذ السكريبتات بداخله
    fetch('components/main-navbar.html')
      .then(res => res.text())
      .then(html => {
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = html;
        const scripts = tempDiv.querySelectorAll('script');
        scripts.forEach(s => s.parentNode.removeChild(s));
        document.getElementById('navbar-container').innerHTML = tempDiv.innerHTML;
        scripts.forEach(oldScript => {
          const newScript = document.createElement('script');
          if (oldScript.src) {
            newScript.src = oldScript.src;
          } else {
            newScript.textContent = oldScript.textContent;
          }
          document.body.appendChild(newScript);
        });
      });
  </script>
</body>
</html>
