<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>المعدات</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Cairo', Arial, sans-serif;
      background: #c5d6db;
      min-height: 100vh;
      direction: rtl;
    }
    .navbar {
      background: #1a3b50;
      color: #fff;
      padding: 14px 0 10px 0;
      text-align: center;
      font-size: 1.6rem;
      font-weight: 900;
      letter-spacing: 2px;
      box-shadow: 0 2px 18px #1a3b5022;
      border-radius: 0 0 24px 24px;
      margin-bottom: 40px;
      position: relative;
      z-index: 2;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 3px solid #2e8ca3;
    }
    .navbar .back-btn {
      position: absolute;
      left: 24px;
      top: 50%;
      transform: translateY(-50%);
      background: #fff;
      color: #2e8ca3;
      border: 2px solid #2e8ca3;
      border-radius: 6px;
      padding: 6px 18px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border 0.15s;
    }
    .navbar .back-btn:hover {
      background: #2e8ca3;
      color: #fff;
      border-color: #1a3b50;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 4px 24px #1a3b5011, 0 1.5px 8px #c5d6dbcc;
      padding: 32px 18px 24px 18px;
      margin-top: 32px;
      text-align: center;
    }
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }
    .equipments-title {
      font-size: 1.25rem;
      color: #1a3b50;
      font-weight: 900;
      margin-bottom: 0;
      letter-spacing: 1px;
      text-align: center;
      flex: 1;
    }
    .add-btn {
      border: 2px solid #2e8ca3;
      background: #fff;
      color: #1a3b50;
      font-family: 'Cairo', Arial, sans-serif;
      font-size: 1.05rem;
      font-weight: 900;
      padding: 7px 22px;
      border-radius: 0;
      cursor: pointer;
      margin-bottom: 0;
      transition: background 0.15s, color 0.15s, border 0.15s;
      letter-spacing: 1px;
      box-shadow: 0 2px 8px #2e8ca311;
      outline: none;
      display: inline-block;
    }
    .add-btn:hover, .add-btn:focus {
      background: #2e8ca3;
      color: #fff;
      border-color: #1a3b50;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 24px 0 18px 0;
      background: #f8fafb;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px #2e8ca311;
    }
    th, td {
      padding: 10px 6px;
      text-align: center;
      font-size: 1rem;
      color: #333;
      border-bottom: 1px solid #ddd;
    }
    th {
      background: #2e8ca3;
      color: #fff;
      font-weight: bold;
      font-size: 1.05rem;
    }
    tr:hover {
      background: #f1f1f1;
    }
    button.delete-btn {
      color: #fff;
      background: #e74c3c;
      border: none;
      border-radius: 5px;
      padding: 4px 10px;
      cursor: pointer;
    }
    .footer {
      text-align: center;
      color: #2e8ca3;
      font-size: 1.1rem;
      margin-top: 60px;
      padding-bottom: 18px;
      opacity: 0.8;
      letter-spacing: 1px;
      font-weight: 500;
      text-shadow: 0 1px 8px #2e8ca311;
    }
  </style>
</head>
<body>
  <div class="navbar">
    المعدات
    <button class="back-btn" onclick="window.location.href='index.html'">العودة للرئيسية</button>
  </div>
  <div class="container">
    <div class="header-row">
      <button id="addEquipmentBtn" class="add-btn">إضافة معدات</button>
      <div class="equipments-title">قائمة المعدات</div>
      <div style="width:120px;"></div>
    </div>
    <table id="equipmentsTable">
      <thead>
        <tr>
          <th>م</th>
          <th>اسم المعدة</th>
          <th>النوع</th>
          <th>الموديل</th>
          <th>المالك</th>
          <th>ملاحظات</th>
          <th>حذف</th>
        </tr>
      </thead>
      <tbody id="equipmentsTbody">
        <!-- صفوف المعدات ستضاف ديناميكياً -->
      </tbody>
    </table>
  </div>
  <!-- مودال إضافة معدات -->
  <div id="equipmentModalOverlay" style="display:none; position:fixed; top:0;left:0;right:0;bottom:0; background:#0006; z-index:2000; align-items:center; justify-content:center;">
    <form id="equipmentModal" style="background:#fff; border-radius:16px; box-shadow:0 8px 32px #1a3b5044; padding:32px 32px 24px 32px; min-width:320px; max-width:99vw; width:420px; display:flex; flex-direction:column; gap:18px; font-family:'Cairo',Arial,sans-serif;">
      <label style="font-weight:700; color:#1a3b50; font-size:1.1rem;">اسم المعدة</label>
      <input type="text" id="equipmentName" required style="padding:7px 12px; border:1.5px solid #c5d6db; border-radius:6px; font-size:1rem;">
      <label style="font-weight:700; color:#1a3b50; font-size:1.1rem;">النوع</label>
      <input type="text" id="equipmentType" style="padding:7px 12px; border:1.5px solid #c5d6db; border-radius:6px; font-size:1rem;">
      <label style="font-weight:700; color:#1a3b50; font-size:1.1rem;">الموديل</label>
      <input type="text" id="equipmentModel" style="padding:7px 12px; border:1.5px solid #c5d6db; border-radius:6px; font-size:1rem;">
      <label style="font-weight:700; color:#1a3b50; font-size:1.1rem;">المالك</label>
      <input type="text" id="equipmentOwner" style="padding:7px 12px; border:1.5px solid #c5d6db; border-radius:6px; font-size:1rem;">
      <label style="font-weight:700; color:#1a3b50; font-size:1.1rem;">ملاحظات</label>
      <input type="text" id="equipmentNotes" style="padding:7px 12px; border:1.5px solid #c5d6db; border-radius:6px; font-size:1rem;">
      <div style="display:flex; justify-content:flex-end; gap:12px; margin-top:8px;">
        <button type="button" id="cancelEquipmentModalBtn" style="border:none; background:#c5d6db; color:#1a3b50; font-weight:700; font-size:1rem; padding:8px 22px; border-radius:6px; cursor:pointer;">إلغاء</button>
        <button type="submit" style="border:none; background:#2e8ca3; color:#fff; font-weight:700; font-size:1rem; padding:8px 22px; border-radius:6px; cursor:pointer;">حفظ</button>
      </div>
    </form>
  </div>
  <div class="footer">
    جميع الحقوق محفوظة &copy; 2025 سعيد أحمد بالبيد
  </div>
  <script>
    // بيانات المعدات (واجهة فقط)
    let equipments = [];

    function renderEquipmentsTable() {
      const tbody = document.getElementById('equipmentsTbody');
      tbody.innerHTML = '';
      equipments.forEach((eq, idx) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${idx+1}</td>
          <td>${eq.name}</td>
          <td>${eq.type || ''}</td>
          <td>${eq.model || ''}</td>
          <td>${eq.owner || ''}</td>
          <td>${eq.notes || ''}</td>
          <td><button class="delete-btn" onclick="deleteEquipment(${idx})">حذف</button></td>
        `;
        tbody.appendChild(tr);
      });
    }

    window.deleteEquipment = function(idx) {
      if (!confirm('هل أنت متأكد من حذف هذه المعدة؟')) return;
      equipments.splice(idx, 1);
      renderEquipmentsTable();
    };

    // فتح وغلق المودال
    document.getElementById('addEquipmentBtn').onclick = function() {
      document.getElementById('equipmentModal').reset();
      document.getElementById('equipmentModalOverlay').style.display = 'flex';
    };
    document.getElementById('cancelEquipmentModalBtn').onclick = function() {
      document.getElementById('equipmentModalOverlay').style.display = 'none';
    };
    document.getElementById('equipmentModalOverlay').onclick = function(e) {
      if (e.target === this) this.style.display = 'none';
    };

    // إضافة معدات
    document.getElementById('equipmentModal').onsubmit = function(e) {
      e.preventDefault();
      const eq = {
        name: document.getElementById('equipmentName').value,
        type: document.getElementById('equipmentType').value,
        model: document.getElementById('equipmentModel').value,
        owner: document.getElementById('equipmentOwner').value,
        notes: document.getElementById('equipmentNotes').value
      };
      equipments.push(eq);
      document.getElementById('equipmentModalOverlay').style.display = 'none';
      renderEquipmentsTable();
    };

    // عند تحميل الصفحة
    renderEquipmentsTable();
  </script>
</body>
</html>
