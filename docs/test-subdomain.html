<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>اختبار النطاق الفرعي - TASKON</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .container {
      background: white;
      padding: 3rem;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 600px;
      width: 100%;
    }

    h1 {
      color: #667eea;
      margin-bottom: 2rem;
      text-align: center;
      font-size: 2rem;
    }

    .info-box {
      background: #f7fafc;
      padding: 1.5rem;
      border-radius: 10px;
      margin-bottom: 1.5rem;
      border-right: 4px solid #667eea;
    }

    .info-box h3 {
      color: #2d3748;
      margin-bottom: 0.5rem;
      font-size: 1.1rem;
    }

    .info-box p {
      color: #4a5568;
      font-size: 1rem;
      word-break: break-all;
    }

    .info-box code {
      background: #edf2f7;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      color: #667eea;
    }

    .success {
      background: #c6f6d5;
      border-right-color: #48bb78;
    }

    .warning {
      background: #fef5e7;
      border-right-color: #f6ad55;
    }

    .status {
      font-size: 3rem;
      text-align: center;
      margin-bottom: 1rem;
    }

    .btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 1rem 2rem;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-family: 'Cairo', sans-serif;
      cursor: pointer;
      width: 100%;
      margin-top: 1rem;
      font-weight: 600;
      transition: transform 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌐 اختبار نظام النطاقات الفرعية</h1>
    
    <div class="status" id="status">⏳</div>

    <div class="info-box">
      <h3>🌍 المضيف (Hostname)</h3>
      <p id="hostname">جارٍ التحميل...</p>
    </div>

    <div class="info-box">
      <h3>🔗 النطاق الفرعي (Subdomain)</h3>
      <p id="subdomain">جارٍ التحميل...</p>
    </div>

    <div class="info-box">
      <h3>📍 الرابط الكامل (Full URL)</h3>
      <p id="fullUrl">جارٍ التحميل...</p>
    </div>

    <div class="info-box" id="companyInfo" style="display: none;">
      <h3>🏢 معلومات الشركة</h3>
      <p id="companyDetails">جارٍ التحميل...</p>
    </div>

    <button class="btn" onclick="window.location.href='/admin-dashboard.html'">
      ⚙️ الذهاب إلى لوحة التحكم
    </button>

    <button class="btn" onclick="window.location.href='/projects.html'">
      📊 الذهاب إلى المشاريع
    </button>
  </div>

  <script>
    const API_URL = 'http://localhost:4000';

    async function checkSubdomain() {
      // Get hostname info
      const hostname = window.location.hostname;
      const fullUrl = window.location.href;
      
      document.getElementById('hostname').innerHTML = `<code>${hostname}</code>`;
      document.getElementById('fullUrl').innerHTML = `<code>${fullUrl}</code>`;

      // Extract subdomain
      const parts = hostname.split('.');
      let subdomain = null;
      
      if (parts.length >= 2 && parts[0] !== 'localhost' && parts[0] !== 'www') {
        subdomain = parts[0];
      }

      if (subdomain) {
        document.getElementById('status').textContent = '✅';
        document.getElementById('subdomain').innerHTML = `<code style="color: #48bb78; font-weight: bold;">${subdomain}</code>`;
        
        // Change subdomain box to success
        document.getElementById('subdomain').closest('.info-box').classList.add('success');

        // Try to fetch company info
        try {
          const response = await fetch(`${API_URL}/companies`);
          const companies = await response.json();
          
          const company = companies.find(c => c.subdomain === subdomain);
          
          if (company) {
            document.getElementById('companyInfo').style.display = 'block';
            document.getElementById('companyDetails').innerHTML = `
              <strong>اسم الشركة:</strong> ${company.companyName}<br>
              <strong>البريد الإلكتروني:</strong> ${company.email}<br>
              <strong>نوع الاشتراك:</strong> <code>${company.subscription || 'غير محدد'}</code><br>
              <strong>تاريخ الإنشاء:</strong> ${new Date(company.createdAt).toLocaleDateString('ar-EG')}
            `;
            document.getElementById('companyInfo').classList.add('success');
          } else {
            document.getElementById('companyInfo').style.display = 'block';
            document.getElementById('companyDetails').innerHTML = `
              ⚠️ لم يتم العثور على شركة بهذا النطاق الفرعي في قاعدة البيانات
            `;
            document.getElementById('companyInfo').classList.add('warning');
          }
        } catch (err) {
          console.error('Error fetching companies:', err);
        }

      } else {
        document.getElementById('status').textContent = '⚠️';
        document.getElementById('subdomain').innerHTML = '<strong style="color: #f6ad55;">لا يوجد نطاق فرعي</strong>';
        document.getElementById('subdomain').closest('.info-box').classList.add('warning');
        
        // Show instructions
        const instructionsBox = document.createElement('div');
        instructionsBox.className = 'info-box warning';
        instructionsBox.innerHTML = `
          <h3>📝 كيفية الاختبار</h3>
          <p style="margin-bottom: 0.5rem;">لاختبار النطاقات الفرعية، قم بما يلي:</p>
          <ol style="margin-right: 1.5rem; color: #4a5568;">
            <li>أضف شركة جديدة من لوحة التحكم</li>
            <li>انسخ النطاق الفرعي المولد (مثل: company1)</li>
            <li>أضف السطر التالي لملف hosts:<br>
                <code>127.0.0.1 [subdomain].taskon.local</code>
            </li>
            <li>افتح الرابط: <code>http://[subdomain].taskon.local:4000</code></li>
          </ol>
        `;
        document.querySelector('.container').insertBefore(
          instructionsBox, 
          document.querySelector('.btn')
        );
      }
    }

    // Run check on page load
    checkSubdomain();

    // Console info
    console.log('🌐 Subdomain Detection Test');
    console.log('Current hostname:', window.location.hostname);
    console.log('Current origin:', window.location.origin);
  </script>
</body>
</html>
