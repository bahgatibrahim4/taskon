<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>المشتريات | سعيد أحمد بالبيد</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { direction: rtl; }
    body {
      margin: 0;
      font-family: 'Cairo', Arial, sans-serif;
      background: #c5d6db;
      min-height: 100vh;
      /* direction: rtl; */ /* تم نقلها إلى :root */
    }
    .container {
      max-width: 1100px;
      margin: 24px auto;
      background: #f7fafd;
      border-radius: 18px;
      box-shadow: 0 0 24px #0002;
      padding: 28px 24px 18px 24px;
      border: 2px solid #8c969a;
    }
    h2 {
      color: #2e8ca3;
      margin-top: 0;
      margin-bottom: 18px;
      font-size: 1.25rem;
      font-weight: bold;
      letter-spacing: 1px;
      text-align: right;
    }
    .purchases-form {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      margin-bottom: 24px;
      align-items: center;
      background: #e8f5e9;
      border-radius: 10px;
      padding: 12px 10px;
      border: 1.5px solid #1b5e20;
      justify-content: flex-start;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      min-width: 160px;
      flex: 1 1 180px;
      margin-bottom: 0;
    }
    .form-group label {
      color: #2e8ca3;
      font-weight: 600;
      margin-bottom: 3px;
      font-size: 0.95rem;
      letter-spacing: 0.5px;
    }
    .form-group input {
      padding: 4px 8px;
      font-size: 1.03rem;
      border-radius: 6px;
      border: 1.5px solid #2e8ca3;
      outline: none;
      background: #fff;
      color: #1a3b50;
      font-family: 'Cairo', Arial, sans-serif;
      font-weight: 600;
      letter-spacing: 0.5px;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-shadow: 0 1px 4px #2e8ca311;
      height: 28px;
      min-height: 28px;
      max-height: 32px;
    }
    .form-group input:focus {
      border-color: #1976d2;
      background: #e3f2fd;
      color: #1976d2;
      box-shadow: 0 2px 8px #1976d222;
    }
    .add-btn {
      background: #2e8ca3;
      color: #fff;
      border: none;
      border-radius: 0; /* حواف حادة */
      font-size: 1rem;
      font-weight: bold;
      padding: 8px 24px;
      cursor: pointer;
      margin-top: 18px;
      transition: background 0.2s;
      box-shadow: 0 2px 10px #0001;
    }
    .add-btn:hover {
      background: #1a3b50;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #f7fafd;
      margin-bottom: 8px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 12px #8c969a;
    }
    th, td {
      padding: 4px 2px;
      border-bottom: 1px solid #c5d6db;
      text-align: center;
      vertical-align: middle;
      font-size: 0.95rem;
      background: transparent;
      white-space: nowrap;
      word-break: break-word;
      height: 28px;
      line-height: 1.2;
    }
    th {
      background: #2e8ca3 !important;
      color: #fff !important;
      font-weight: bold;
      font-size: 0.95rem;
    }
    tr:last-child td {
      border-bottom: none;
    }
    tr:hover td {
      background: #c5d6db;
      transition: background 0.18s;
    }
    .delete-btn {
      background: #e53935;
      color: #fff;
      border: none;
      border-radius: 5px;
      padding: 4px 12px;
      cursor: pointer;
      font-size: 0.95rem;
    }
    .delete-btn:hover {
      background: #b71c1c;
    }
    /* Styles for the modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(80, 80, 80, 0.18);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      background: #fff;
      border-radius: 22px;
      box-shadow: 0 8px 32px #1976d233, 0 1.5px 0 #2e8ca3;
      padding: 22px 40px 18px 40px;
      min-width: 480px;
      max-width: 700px;
      width: 99vw;
      margin: auto;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 2.5px solid #2e8ca3;
      transition: box-shadow 0.2s;
    }
    .close-modal {
      position: absolute;
      right: 12px; /* بدلاً من left */
      left: unset;
      top: 10px;
      background: linear-gradient(135deg,#e53935 60%,#ffb4a2 100%);
      border: none;
      font-size: 1.5rem;
      color: #fff;
      cursor: pointer;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      box-shadow: 0 2px 8px #e5393533;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.18s;
    }
    /* صف الإجمالي أسفل الجدول */
    .summary-row {
      background: #2e8ca3;
      color: #fff;
      font-size: 1.08rem;
      font-family: 'Cairo', Arial, sans-serif;
      font-weight: bold;
      text-align: center;
      height: 34px;
      border-radius: 0 0 10px 10px;
      letter-spacing: 1px;
      border-top: 2px solid #1976d2;
    }
    .summary-row td {
      padding: 4px 0 !important;
      font-size: 1.08rem;
      background: #2e8ca3 !important;
      color: #fff !important;
      font-weight: bold;
      border-bottom: none !important;
    }
    @media (max-width: 900px) {
      .modal-content {
        min-width: 98vw;
        max-width: 98vw;
        padding: 10px 2vw 10px 2vw;
      }
      .summary-row td {
        font-size: 0.98rem;
        padding: 2px 0 !important;
      }
    }
    .modal-form {
      background: none;
      border-radius: 12px;
      border: none;
      box-shadow: none;
      padding: 10px 4px;
      margin: 0;
      gap: 10px;
      width: 100%;
      flex-direction: column;
      align-items: stretch;
    }
  </style>
</head>
<body>
  <div id="navbar-container"></div>
  <div class="container">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
      <div style="display:flex;align-items:center;gap:6px;">
        <button id="openAddPurchaseModalBtn" style="background:#2e8ca3;color:#fff;border:2px solid #2e8ca3;border-radius:0;padding:6px 22px;font-size:1.05rem;font-family:'Cairo',Arial,sans-serif;font-weight:700;cursor:pointer;box-shadow:none;transition:background 0.2s, color 0.2s, border-color 0.2s;">
          + إضافة شراء جديد
        </button>
      </div>
      <div style="flex:1;display:flex;align-items:center;justify-content:center;">
        <h2 style="margin:0;text-align:center;font-size:1.35rem;letter-spacing:1px;color:#2e8ca3;">سجل المشتريات</h2>
      </div>
      <div style="display:flex;align-items:center;gap:6px;">
        <input id="purchaseSearchBox" type="text" placeholder="ابحث بالاسم أو الصنف أو المحل..."
          style="width:200px;max-width:30vw;padding:3px 8px;font-size:1.02rem;font-family:'Cairo',Arial,sans-serif;font-weight:600;border-radius:0;border:2px solid #2e8ca3;outline:none;box-shadow:none;text-align:center;letter-spacing:0.5px;transition:border-color 0.18s;color:#1a3b50;background:#fafdff;height:24px;">
        <div style="position:relative;display:flex;align-items:center;">
          <div id="filterBox"
            style="display:none;position:absolute;top:40px;right:0;background:#fff;border:1.5px solid #2e8ca3;border-radius:10px;box-shadow:0 2px 12px #0002;padding:14px 18px 12px 18px;z-index:10;min-width:260px;max-width:320px;">
            <div style="display:flex;flex-direction:column;gap:10px;width:100%;">
              <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
                <label for="filterFrom" style="font-size:0.97rem;color:#2e8ca3;font-weight:600;">من</label>
                <input type="date" id="filterFrom"
                  style="flex:1;padding:4px 8px;font-size:0.97rem;border:1px solid #8c969a;border-radius:6px;background:#f7fafd;">
              </div>
              <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
                <label for="filterTo" style="font-size:0.97rem;color:#2e8ca3;font-weight:600;">إلى</label>
                <input type="date" id="filterTo"
                  style="flex:1;padding:4px 8px;font-size:0.97rem;border:1px solid #8c969a;border-radius:6px;background:#f7fafd;">
              </div>
              <button id="filterApplyBtn"
                style="margin-top:6px;background:#2e8ca3;color:#fff;border:none;border-radius:6px;padding:6px 0;font-size:1rem;font-family:'Cairo',Arial,sans-serif;font-weight:700;cursor:pointer;width:100%;letter-spacing:1px;transition:background 0.18s;">
                تطبيق
              </button>
            </div>
          </div>
          <button id="filterToggleBtn" title="فلترة بالتاريخ"
            style="background:#fff;border:2px solid #2e8ca3;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <path d="M3 5h14M7 10h6M9 15h2" stroke="#1976d2" stroke-width="1.7" stroke-linecap="round"
                stroke-linejoin="round" />
            </svg>
          </button>
        </div>
        <!-- زر تصدير إلى Excel -->
        <button id="exportExcelBtn" style="background:#fff;color:#2e8ca3;border:2px solid #2e8ca3;border-radius:0;padding:3px 10px;font-size:0.98rem;font-family:'Cairo',Arial,sans-serif;font-weight:700;cursor:pointer;box-shadow:none;transition:background 0.2s, color 0.2s, border-color 0.2s;min-width:0;">
          تصدير Excel
        </button>
      </div>
    </div>
    <!-- نافذة إضافة شراء -->
    <div id="addPurchaseModal" class="modal">
      <div class="modal-content">
        <button id="closeAddPurchaseModalBtn" class="close-modal">&times;</button>
        <h3 class="modal-title">إضافة عملية شراء</h3>
        <form id="purchaseForm" class="purchases-form modal-form" enctype="multipart/form-data">
          <div style="display:flex;gap:10px;width:100%;">
            <div class="form-group" style="flex:1;">
              <label>تاريخ الشراء</label>
              <input type="date" name="date" required>
            </div>
            <div class="form-group" style="flex:1;">
              <label>اسم المحل / المكان</label>
              <input type="text" name="store" required placeholder="اسم المحل أو المكان">
            </div>
            <div class="form-group" style="flex:1;">
              <label>الصنف</label>
              <input type="text" name="item" required placeholder="اسم الصنف">
            </div>
          </div>
          <div style="display:flex;gap:10px;width:100%;">
            <div class="form-group" style="flex:1;">
              <label>الكمية</label>
              <input type="number" name="quantity" min="1" step="any" required placeholder="الكمية">
            </div>
            <div class="form-group" style="flex:1;">
              <label>الوحدة</label>
              <input type="text" name="unit" required placeholder="الوحدة">
            </div>
            <div class="form-group" style="flex:1;">
              <label>الفئة</label>
              <input type="number" name="category" min="0" step="any" required placeholder="الفئة">
            </div>
          </div>
          <div style="display:flex;gap:10px;width:100%;">
            <div class="form-group" style="flex:1;">
              <label>الإجمالي</label>
              <input type="number" name="total" min="0" step="any" required placeholder="الإجمالي" readonly>
            </div>
            <div class="form-group" style="flex:1;">
              <label>فاتورة الشراء (PDF أو صورة)</label>
              <input type="file" name="invoice" accept=".pdf,image/*">
            </div>
          </div>
          <button type="submit" class="add-btn">إضافة الشراء</button>
        </form>
      </div>
    </div>
    <table id="purchasesTable">
      <thead>
        <tr>
          <th>م</th>
          <th>التاريخ</th>
          <th>المحل / المكان</th>
          <th>الصنف</th>
          <th>الكمية</th>
          <th>الوحدة</th>
          <th>سعر الوحدة</th> <!-- عدل اسم العمود هنا -->
          <th>الإجمالي</th>
          <th>الفاتورة</th>
          <th>حذف</th>
        </tr>
      </thead>
      <tbody>
        <!-- الصفوف تضاف ديناميكياً -->
      </tbody>
      <tfoot>
        <tr class="summary-row">
          <td colspan="4">الإجمالي</td>
          <td id="totalQuantity">0</td>
          <td></td>
          <td></td>
          <td id="totalAmount">0</td>
          <td colspan="2"></td>
        </tr>
      </tfoot>
    </table>
  </div>
  <!-- أضف مكتبة SheetJS قبل السكريبتات -->
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <script>
    // بيانات المشتريات في الذاكرة فقط (بدون backend)
    // let purchases = [];
    let purchases = [];
    const purchasesTable = document.getElementById('purchasesTable').querySelector('tbody');

    // عند تحميل الصفحة: جلب المشتريات من السيرفر
    async function fetchPurchasesFromServer() {
      const res = await fetch('/purchases');
      purchases = await res.json();
      renderPurchases(purchaseSearchBox.value);
    }
    window.addEventListener('DOMContentLoaded', fetchPurchasesFromServer);

    // نافذة الإضافة
    const openAddPurchaseModalBtn = document.getElementById('openAddPurchaseModalBtn');
    const addPurchaseModal = document.getElementById('addPurchaseModal');
    const closeAddPurchaseModalBtn = document.getElementById('closeAddPurchaseModalBtn');
    const purchaseForm = document.getElementById('purchaseForm');

    openAddPurchaseModalBtn.onclick = function() {
      addPurchaseModal.style.display = 'flex';
      setTimeout(() => {
        purchaseForm.date.focus();
      }, 100);
    };
    closeAddPurchaseModalBtn.onclick = function() {
      addPurchaseModal.style.display = 'none';
    };
    addPurchaseModal.onclick = function(e) {
      if (e.target === addPurchaseModal) addPurchaseModal.style.display = 'none';
    };
    document.addEventListener('keydown', function(e) {
      if (addPurchaseModal.style.display === 'flex' && e.key === 'Escape') addPurchaseModal.style.display = 'none';
    });

    // حساب الإجمالي تلقائياً عند تغيير الكمية أو الفئة
    const quantityInput = document.querySelector('input[name="quantity"]');
    const categoryInput = document.querySelector('input[name="category"]');
    const totalInput = document.querySelector('input[name="total"]');
    function updateTotal() {
      const qty = parseFloat(quantityInput.value) || 0;
      const cat = parseFloat(categoryInput.value) || 0;
      totalInput.value = (qty * cat).toFixed(2);
    }
    quantityInput.oninput = categoryInput.oninput = updateTotal;

    // فلتر التاريخ
    const filterToggleBtn = document.getElementById('filterToggleBtn');
    const filterBox = document.getElementById('filterBox');
    const filterFrom = document.getElementById('filterFrom');
    const filterTo = document.getElementById('filterTo');
    const filterApplyBtn = document.getElementById('filterApplyBtn');
    let dateFilter = { from: '', to: '' };

    filterToggleBtn.onclick = function(e) {
      filterBox.style.display = filterBox.style.display === 'none' ? 'block' : 'none';
      e.stopPropagation();
    };
    document.body.onclick = function(e) {
      if (filterBox.style.display === 'block' && !filterBox.contains(e.target) && e.target !== filterToggleBtn) {
        filterBox.style.display = 'none';
      }
    };

    filterApplyBtn.onclick = function() {
      dateFilter.from = filterFrom.value;
      dateFilter.to = filterTo.value;
      renderPurchases(purchaseSearchBox.value);
      filterBox.style.display = 'none';
    };

    // مربع البحث
    const purchaseSearchBox = document.getElementById('purchaseSearchBox');
    purchaseSearchBox.oninput = function() {
      renderPurchases(this.value);
    };

    purchaseForm.onsubmit = async function(e) {
      e.preventDefault();
      const formData = new FormData(purchaseForm);
      // ملاحظة: هذا الكود فقط يعرض اسم الملف في الجدول، لا يرفع الملف فعلياً للباك اند
      const data = {
        date: formData.get('date'),
        store: formData.get('store'),
        item: formData.get('item'),
        quantity: formData.get('quantity'),
        unit: formData.get('unit'),
        category: formData.get('category'),
        total: formData.get('total'),
        invoice: formData.get('invoice') && formData.get('invoice').name ? formData.get('invoice').name : '',
        supplier: formData.get('store') // أضف هذا السطر ليصل اسم المحل أيضاً في خاصية supplier
      };
      // أرسل البيانات للسيرفر
      await fetch('/purchases', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      await fetchPurchasesFromServer();
      purchaseForm.reset();
      addPurchaseModal.style.display = 'none';
    };

    function renderPurchases(filter = '') {
      purchasesTable.innerHTML = '';
      let sumQty = 0, sumTotal = 0;
      let filtered = purchases;
      // فلترة بالبحث
      if (filter) {
        const f = filter.trim().toLowerCase();
        filtered = filtered.filter(p =>
          (p.item && p.item.toLowerCase().includes(f)) ||
          (p.store && p.store.toLowerCase().includes(f)) ||
          (p.category && p.category.toString().includes(f))
        );
      }
      // فلترة بالتاريخ
      if (dateFilter.from) {
        filtered = filtered.filter(p => p.date && p.date >= dateFilter.from);
      }
      if (dateFilter.to) {
        filtered = filtered.filter(p => p.date && p.date <= dateFilter.to);
      }
      filtered.forEach((p, idx) => {
        const invoiceCell = p.invoice
          ? `<span style="color:#2e8ca3;font-size:1.1em;">${p.invoice}</span>`
          : '';
        sumQty += parseFloat(p.quantity) || 0;
        sumTotal += parseFloat(p.total) || 0;
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${idx + 1}</td>
          <td>${p.date || ''}</td>
          <td>${p.store || ''}</td>
          <td>${p.item || ''}</td>
          <td>${p.quantity || ''}</td>
          <td>${p.unit || ''}</td>
          <td>${p.category || ''}</td> <!-- هنا تظهر الفئة كسعر الوحدة -->
          <td>${p.total || ''}</td>
          <td>${invoiceCell}</td>
          <td><button class="delete-btn" data-id="${p._id}">حذف</button></td>
        `;
        purchasesTable.appendChild(tr);
      });
      document.getElementById('totalQuantity').textContent = sumQty;
      document.getElementById('totalAmount').textContent = sumTotal.toFixed(2);
    }

    purchasesTable.onclick = async function(e) {
      if (e.target.classList.contains('delete-btn')) {
        const id = e.target.dataset.id;
        await fetch(`/purchases/${id}`, { method: 'DELETE' });
        await fetchPurchasesFromServer();
      }
    };

    // زر تصدير المشتريات إلى Excel
    document.getElementById('exportExcelBtn').onclick = function() {
      let filtered = purchases;
      const filter = purchaseSearchBox.value.trim().toLowerCase();
      if (filter) {
        filtered = filtered.filter(p =>
          (p.item && p.item.toLowerCase().includes(filter)) ||
          (p.store && p.store.toLowerCase().includes(filter)) ||
          (p.category && p.category.toString().includes(filter))
        );
      }
      if (dateFilter.from) {
        filtered = filtered.filter(p => p.date && p.date >= dateFilter.from);
      }
      if (dateFilter.to) {
        filtered = filtered.filter(p => p.date && p.date <= dateFilter.to);
      }
      const data = [
        ["م", "التاريخ", "المحل / المكان", "الصنف", "الكمية", "الوحدة", "سعر الوحدة", "الإجمالي", "الفاتورة"]
      ];
      filtered.forEach((p, idx) => {
        data.push([
          idx + 1,
          p.date || '',
          p.store || '',
          p.item || '',
          p.quantity || '',
          p.unit || '',
          p.category || '',
          p.total || '',
          p.invoice || ''
        ]);
      });
      const ws = XLSX.utils.aoa_to_sheet(data);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "المشتريات");
      XLSX.writeFile(wb, "purchases.xlsx");
    };

    // ربط الصفحة بالشريط العلوي وتنفيذ السكريبتات بداخله
    fetch('components/main-navbar.html')
      .then(res => res.text())
      .then(html => {
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = html;
        const scripts = tempDiv.querySelectorAll('script');
        scripts.forEach(s => s.parentNode.removeChild(s));
        document.getElementById('navbar-container').innerHTML = tempDiv.innerHTML;
        scripts.forEach(oldScript => {
          const newScript = document.createElement('script');
          if (oldScript.src) {
            newScript.src = oldScript.src;
          } else {
            newScript.textContent = oldScript.textContent;
          }
          document.body.appendChild(newScript);
        });
      });
  </script>
</body>
</html>
