<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>الموردين | سعيد أحمد بالبيد</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { direction: rtl; }
    body {
      margin: 0;
      font-family: 'Cairo', Arial, sans-serif;
      background: #c5d6db;
      direction: rtl;
      min-height: 100vh;
      width: 100vw;
      overflow-x: hidden;
    }
    .container {
      width: 95vw;
      max-width: 1400px;
      margin: 0 auto;
      background: #f7fafd;
      border-radius: 18px;
      padding: 28px 2vw 18px 2vw;
      border: 2.5px solid #8c969a;
      margin-top: 32px;
      box-shadow: 0 2px 16px #0001;
    }
    h2 {
      color: #2e8ca3;
      margin-top: 0;
      margin-bottom: 18px;
      font-size: 1.25rem;
      font-weight: bold;
      letter-spacing: 1px;
      text-align: right;
    }
    .suppliers-cards {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 6px;
      margin-top: 14px;
      justify-content: flex-start;
    }
    .supplier-card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 6px #2e8ca322;
      padding: 8px 8px 6px 8px;
      min-width: 120px;
      max-width: 150px;
      flex: 1 1 120px;
      display: flex;
      flex-direction: column;
      margin-bottom: 4px;
      border-right: 3px solid #2e8ca3;
      position: relative;
      transition: box-shadow 0.18s, transform 0.18s;
      overflow: hidden;
    }
    .supplier-card:hover {
      box-shadow: 0 2px 10px #2e8ca344;
      transform: translateY(-1px) scale(1.01);
    }
    .supplier-card .delete-btn {
      position: absolute;
      top: 5px;
      left: 5px;
      background: none;
      border: none;
      color: #e53935;
      font-size: 1.1rem;
      cursor: pointer;
      z-index: 2;
      padding: 0;
      transition: color 0.18s;
    }
    .supplier-card .delete-btn:hover {
      color: #b71c1c;
    }
    .supplier-card .supplier-title {
      color: #1976d2;
      font-weight: bold;
      font-size: 0.93rem;
      margin-bottom: 5px;
      text-decoration: underline;
      cursor: pointer;
      display: inline-block;
      z-index: 1;
      position: relative;
      letter-spacing: 0.3px;
      transition: color 0.18s;
      word-break: break-word;
    }
    .supplier-card .supplier-title:hover {
      color: #2e8ca3;
    }
    .supplier-card .supplier-row {
      margin-bottom: 3px;
      font-size: 0.85rem;
      color: #1a3b50;
      display: flex;
      gap: 2px;
      align-items: center;
      z-index: 1;
      position: relative;
      word-break: break-word;
    }
    .supplier-card .label {
      color: #2e8ca3;
      min-width: 38px;
      font-size: 0.82rem;
      font-weight: bold;
      letter-spacing: 0.1px;
    }
    .add-supplier-btn {
      background: #2e8ca3;
      color: #fff;
      border: none;
      border-radius: 0;
      font-size: 1.02rem;
      font-family: 'Tajawal', 'Cairo', Arial, sans-serif;
      font-weight: 700;
      padding: 6px 18px;
      cursor: pointer;
      margin-bottom: 18px;
      margin-top: 6px;
      transition: background 0.2s, box-shadow 0.2s, letter-spacing 0.18s;
      box-shadow: 0 2px 8px #2e8ca344;
      letter-spacing: 1px;
      display: inline-block;
      text-shadow: 0 1px 2px #0001;
    }
    .add-supplier-btn:hover {
      background: #1a3b50;
      box-shadow: 0 4px 18px #2e8ca366;
      letter-spacing: 1.5px;
    }
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.25);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.active {
      display: flex;
    }
    .modal-box {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 12px #0002;
      padding: 18px 18px 16px 18px;
      min-width: 0;
      max-width: 520px;
      width: 98vw;
      position: relative;
      animation: fadeInModal 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-sizing: border-box;
      overflow-x: hidden;
    }
    @keyframes fadeInModal {
      from { transform: scale(0.96) translateY(30px); opacity: 0; }
      to { transform: scale(1) translateY(0); opacity: 1; }
    }
    .modal-close-btn {
      position: absolute;
      left: 18px;
      top: 12px;
      background: none;
      border: none;
      color: #e53935;
      font-size: 1.6rem;
      font-weight: bold;
      cursor: pointer;
      transition: color 0.18s;
    }
    .modal-close-btn:hover {
      color: #b71c1c;
    }
    .tab-bar {
      display: flex;
      gap: 0;
      border-bottom: 2px solid #2e8ca3;
      margin-bottom: 24px;
      background: #e8f5e9;
      border-radius: 10px 10px 0 0;
      overflow: hidden;
      width: 100%;
    }
    .tab-btn {
      flex: 1 1 0;
      background: none;
      border: none;
      outline: none;
      padding: 16px 0;
      font-size: 1.1rem;
      font-weight: bold;
      color: #2e8ca3;
      cursor: pointer;
      transition: background 0.18s, color 0.18s;
      border-left: 1px solid #c5d6db;
    }
    .tab-btn:first-child {
      border-right: 1px solid #c5d6db;
    }
    .tab-btn.active {
      background: #2e8ca3;
      color: #fff;
    }
    .tab-content {
      display: none;
      padding: 0;
      margin: 0;
    }
    .tab-content.active {
      display: block;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      min-width: 160px;
      flex: 1 1 180px;
      margin-bottom: 0;
      margin-left: 18px;
    }
    .form-inline {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      margin-bottom: 18px;
      align-items: center;
      background: #e8f5e9;
      border-radius: 10px;
      padding: 12px 10px;
      border: 1.5px solid #1b5e20;
      justify-content: flex-start;
    }
    #supplierForm.form-inline {
      background: none;
      border: none;
      box-shadow: none;
      padding: 0;
      margin: 0 auto 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 18px 12px;
      justify-content: flex-start;
      align-items: flex-start;
      max-width: 520px;
      width: 100%;
      flex-direction: row;
      box-sizing: border-box;
    }
    #supplierForm .form-group {
      background: none;
      border-radius: 0;
      box-shadow: none;
      padding: 0;
      min-width: 0;
      flex: 1 1 48%;
      margin-bottom: 0;
      margin-left: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      border: none;
      margin-top: 0;
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
    }
    #supplierForm .form-group label {
      color: #2e8ca3;
      font-weight: bold;
      font-size: 1.05rem;
      margin-bottom: 4px;
      letter-spacing: 0.2px;
      margin-top: 10px;
    }
    #supplierForm .form-group input[type="text"] {
      width: 100%;
      border: 1px solid #c5d6db;
      border-radius: 6px;
      padding: 9px 10px;
      font-size: 1.04rem;
      font-family: 'Tajawal', 'Cairo', Arial, sans-serif;
      background: #f7fafd;
      transition: border 0.18s;
      margin-bottom: 0;
      outline: none;
      margin-top: 0;
    }
    #supplierForm .form-group input[type="text"]:focus {
      border: 1.5px solid #2e8ca3;
      background: #e3f2fd;
    }
    .add-btn {
      background: #2e8ca3;
      color: #fff;
      border: none;
      border-radius: 0;
      font-size: 1.13rem;
      font-family: 'Tajawal', 'Cairo', Arial, sans-serif;
      font-weight: 700;
      padding: 10px 36px;
      cursor: pointer;
      margin-top: 18px;
      margin-bottom: 0;
      transition: background 0.2s, box-shadow 0.2s, letter-spacing 0.18s;
      box-shadow: 0 2px 12px #2e8ca344;
      letter-spacing: 1.2px;
      display: block;
      align-self: flex-end;
      text-shadow: 0 1px 2px #0001;
    }
    .add-btn:hover {
      background: #1a3b50;
      box-shadow: 0 4px 18px #2e8ca366;
      letter-spacing: 2px;
    }
    @media (max-width: 900px) {
      .container {
        width: 100vw;
        max-width: 100vw;
        padding: 8px 2vw;
      }
      table { font-size: .92rem; }
      th, td { padding: 4px; }
      .add-btn { padding: 8px 12px; font-size: 0.92rem; }
      .form-inline { flex-direction: column; gap: 10px; padding: 10px 4px; }
      .supplier-card { min-width: 0; max-width: 100%; padding: 7px 2px 5px 2px; }
      .modal-box {
        padding: 8px 1vw 6px 1vw;
        min-width: 0;
        max-width: 94vw;
      }
      #supplierForm.form-inline {
        flex-direction: column;
        gap: 10px;
        padding: 0;
        max-width: 100%;
      }
      #supplierForm .form-group {
        min-width: 0;
        width: 100%;
        padding: 0;
        max-width: 100%;
      }
      .modal-box {
        padding: 12px 2vw 10px 2vw;
      }
    }
    @media (max-width: 700px) {
      .modal-box {
        min-width: 0;
        max-width: 99vw;
        width: 99vw;
        padding: 8px 2vw 10px 2vw;
        box-sizing: border-box;
      }
      #supplierForm.form-inline {
        flex-direction: column;
        gap: 10px;
        max-width: 100%;
        width: 100%;
      }
      #supplierForm .form-group {
        min-width: 0;
        width: 100%;
        padding: 0;
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div id="navbar-container"></div>
  <div class="container">
    <div style="display:flex; flex-direction:row-reverse; justify-content:space-between; align-items:center; margin-bottom:0;">
      <h2 style="margin-bottom:0;">سجل الموردين</h2>
      <button class="add-supplier-btn" id="openAddSupplierModalBtn">+ إضافة مورد</button>
    </div>
    <!-- <table id="suppliersTable">
      <thead>
        <tr>
          <th>م</th>
          <th>اسم المورد</th>
          <th>اسم الممثل</th>
          <th>رقم الجوال</th>
          <th>البند</th>
          <th>ملاحظات</th>
        </tr>
      </thead>
      <tbody>
      </tbody>
    </table> -->
    <div id="suppliersCards" class="suppliers-cards"></div>
  </div>
  <!-- نافذة إضافة مورد -->
  <div class="modal-overlay" id="addSupplierModal">
    <div class="modal-box">
      <button class="modal-close-btn" id="closeAddSupplierModalBtn" title="إغلاق">&times;</button>
      <h2 style="margin-top:0;text-align:center;color:#2e8ca3;">إضافة مورد جديد</h2>
      <form id="supplierForm" class="form-inline" style="margin-bottom:0;">
        <div class="form-group">
          <label>اسم المورد</label>
          <input type="text" name="name" required placeholder="اسم المورد">
        </div>
        <div class="form-group">
          <label>اسم الممثل</label>
          <input type="text" name="representative" placeholder="اسم الممثل">
        </div>
        <div class="form-group">
          <label>رقم الجوال</label>
          <input type="text" name="phone" placeholder="رقم الجوال">
        </div>
        <div class="form-group">
          <label>البند</label>
          <input type="text" name="item" placeholder="البند">
        </div>
        <div class="form-group" style="flex-basis:100%;max-width:100%;">
          <label>ملاحظات</label>
          <input type="text" name="notes" placeholder="ملاحظات">
        </div>
        <button type="submit" class="add-btn" style="margin-top:18px;">إضافة المورد</button>
      </form>
    </div>
  </div>
  <script>
    const form = document.getElementById('supplierForm');
    const cardsContainer = document.getElementById('suppliersCards');
    let suppliers = [];

    function renderCards() {
      cardsContainer.innerHTML = '';
      suppliers.forEach((s, idx) => {
        const card = document.createElement('div');
        card.className = 'supplier-card';
        card.innerHTML = `
          <button class="delete-btn" title="حذف المورد" onclick="deleteSupplier('${s._id}')">
            <span style="font-size:1.1rem;">🗑️</span>
          </button>
          <div class="supplier-title">
            <a href="supplier-details.html?id=${s._id}" style="color:inherit;text-decoration:underline;">${s.name}</a>
          </div>
          <div class="supplier-row"><span class="label">الممثل:</span> ${s.representative || ''}</div>
          <div class="supplier-row"><span class="label">الجوال:</span> ${s.phone || ''}</div>
          <div class="supplier-row"><span class="label">البند:</span> ${s.item || ''}</div>
        `;
        cardsContainer.appendChild(card);
      });
    }

    // حذف مورد
    window.deleteSupplier = async function(id) {
      if (confirm('هل أنت متأكد من حذف هذا المورد؟')) {
        await fetch(`/suppliers/${id}`, { method: 'DELETE' });
        await loadSuppliers();
      }
    }

    // تحميل الموردين من قاعدة البيانات
    async function loadSuppliers() {
      const res = await fetch('/suppliers');
      suppliers = await res.json();
      renderCards();
    }

    // إضافة مورد جديد
    form.onsubmit = async function(e) {
      e.preventDefault();
      const data = {
        name: form.name.value,
        representative: form.representative.value,
        phone: form.phone.value,
        item: form.item.value,
        notes: form.notes.value
      };
      const res = await fetch('/suppliers', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      const result = await res.json();
      // بعد الإضافة، أعد تحميل الموردين
      await loadSuppliers();
      form.reset();
      closeAddSupplierModal();
    };

    // عند تحميل الصفحة، جلب الموردين من قاعدة البيانات
    window.addEventListener('DOMContentLoaded', function() {
      loadSuppliers();

      // ربط أحداث المودال بعد التأكد من وجود العناصر
      const addSupplierModal = document.getElementById('addSupplierModal');
      const openAddSupplierModalBtn = document.getElementById('openAddSupplierModalBtn');
      const closeAddSupplierModalBtn = document.getElementById('closeAddSupplierModalBtn');

      window.closeAddSupplierModal = function() {
        addSupplierModal.classList.remove('active');
      };
      function openAddSupplierModal() {
        addSupplierModal.classList.add('active');
        setTimeout(() => {
          form.name.focus();
        }, 100);
      }
      if (openAddSupplierModalBtn) openAddSupplierModalBtn.onclick = openAddSupplierModal;
      if (closeAddSupplierModalBtn) closeAddSupplierModalBtn.onclick = window.closeAddSupplierModal;
      if (addSupplierModal) {
        addSupplierModal.onclick = function(e) {
          if (e.target === addSupplierModal) window.closeAddSupplierModal();
        };
      }
      document.addEventListener('keydown', function(e) {
        if (addSupplierModal && addSupplierModal.classList.contains('active') && e.key === 'Escape') window.closeAddSupplierModal();
      });
    });
  </script>
  <script>
    // ربط الصفحة بالشريط العلوي وتنفيذ السكريبتات بداخله
    fetch('components/main-navbar.html')
      .then(res => res.text())
      .then(html => {
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = html;
        const scripts = tempDiv.querySelectorAll('script');
        scripts.forEach(s => s.parentNode.removeChild(s));
        document.getElementById('navbar-container').innerHTML = tempDiv.innerHTML;
        scripts.forEach(oldScript => {
          const newScript = document.createElement('script');
          if (oldScript.src) {
            newScript.src = oldScript.src;
          } else {
            newScript.textContent = oldScript.textContent;
          }
          document.body.appendChild(newScript);
        });
      });
  </script>
</body>
</html>
